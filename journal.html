<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал ордеров — Forex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #131722;
            color: #d1d4dc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-left h1 { font-size: 18px; font-weight: 700; color: #fff; }
        .header-left a { color: #2962ff; text-decoration: none; font-size: 13px; }
        .header-left a:hover { text-decoration: underline; }
        .content { max-width: 1400px; margin: 0 auto; padding: 20px; }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat {
            background: #1e222d;
            border: 1px solid #2a2e39;
            border-radius: 6px;
            padding: 12px 14px;
        }
        .stat-label { font-size: 11px; color: #787b86; text-transform: uppercase; }
        .stat-value { font-size: 22px; font-weight: 700; color: #fff; margin-top: 4px; }
        .stat-positive { color: #26a69a; }
        .stat-negative { color: #ef5350; }

        .filters {
            background: #1e222d;
            border: 1px solid #2a2e39;
            border-radius: 6px;
            padding: 12px 14px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: end;
        }
        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .filter-label { font-size: 11px; color: #787b86; }
        .filter-input, .filter-select {
            background: #2a2e39;
            color: #fff;
            border: 1px solid #363a45;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-family: monospace;
            outline: none;
            min-width: 100px;
        }
        .filter-input:focus, .filter-select:focus { border-color: #2962ff; }

        .filter-hint {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #2a2e39;
            border: 1px solid #363a45;
            color: #787b86;
            font-size: 10px;
            font-weight: 700;
            margin-left: 5px;
            cursor: help;
        }
        .filter-hint:hover { color: #d1d4dc; border-color: #2962ff; }
        .filter-hint-popup {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            left: -8px;
            background: #161a25;
            border: 1px solid #2a2e39;
            border-radius: 6px;
            padding: 10px 14px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 12px;
            font-weight: 400;
            color: #d1d4dc;
            line-height: 1.75;
            letter-spacing: normal;
            z-index: 100;
            max-width: 380px;
            min-width: 260px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            text-align: left;
        }
        .filter-hint:hover .filter-hint-popup { display: block; }
        .filter-hint-popup b { color: #fff; font-weight: 700; }
        .filter-hint-popup > div { margin-bottom: 2px; }
        .filter-hint-popup .hint-divider {
            margin: 6px 0;
            border-top: 1px solid #2a2e39;
        }
        .filter-hint-popup .hint-section-title {
            color: #787b86;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .btn {
            background: #2962ff;
            color: #fff;
            border: 1px solid #2962ff;
            padding: 7px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn:hover { background: #1e4fd6; }
        .btn-secondary {
            background: #2a2e39;
            border-color: #363a45;
            color: #d1d4dc;
        }
        .btn-secondary:hover { background: #363a45; }

        .table-wrap {
            background: #1e222d;
            border: 1px solid #2a2e39;
            border-radius: 6px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            font-family: monospace;
        }
        thead {
            background: #161a25;
            position: sticky;
            top: 0;
        }
        th {
            text-align: left;
            padding: 10px 8px;
            color: #787b86;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2a2e39;
            white-space: nowrap;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #2a2e39;
            white-space: nowrap;
        }
        tr:hover { background: #1a1e2a; }
        tr.expanded-row { background: #1a1e2a; }
        .ctx-cell { padding: 12px 18px !important; white-space: pre-wrap; font-size: 11px; color: #9aa0a8; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .b-placed   { background: rgba(41,98,255,0.2);  color: #2962ff; }
        .b-filled   { background: rgba(255,152,0,0.2);  color: #ff9800; }
        .b-closed   { background: rgba(120,123,134,0.2); color: #787b86; }
        .b-cancelled{ background: rgba(120,123,134,0.2); color: #787b86; }
        .b-expired  { background: rgba(120,123,134,0.2); color: #787b86; }
        .b-failed   { background: rgba(239,83,80,0.2);  color: #ef5350; }
        .b-rejected { background: rgba(239,83,80,0.2);  color: #ef5350; }
        .b-unknown  { background: rgba(120,123,134,0.2); color: #787b86; }

        .b-buy  { background: rgba(38,166,154,0.2); color: #26a69a; }
        .b-sell { background: rgba(239,83,80,0.2);  color: #ef5350; }
        .b-up   { background: rgba(38,166,154,0.2); color: #26a69a; }
        .b-down { background: rgba(239,83,80,0.2);  color: #ef5350; }

        .b-pending { background: rgba(41,98,255,0.15); color: #2962ff; }
        .b-market  { background: rgba(255,152,0,0.15); color: #ff9800; }

        .p-pos { color: #26a69a; font-weight: 700; }
        .p-neg { color: #ef5350; font-weight: 700; }
        .muted { color: #4a4e59; }

        .toggle { cursor: pointer; color: #787b86; user-select: none; }
        .toggle:hover { color: #fff; }

        .error {
            background: rgba(239,83,80,0.15);
            border: 1px solid #ef5350;
            border-radius: 6px;
            padding: 12px 16px;
            color: #ef5350;
            margin-bottom: 16px;
        }
        .empty {
            text-align: center;
            color: #787b86;
            padding: 40px 20px;
            font-size: 13px;
        }

        /* Hover-tooltip with order outcome explanation */
        .order-tooltip {
            position: fixed;
            background: #1e222d;
            border: 1px solid #363a45;
            border-radius: 8px;
            padding: 14px 18px;
            font-size: 12px;
            color: #d1d4dc;
            z-index: 9999;
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            line-height: 1.6;
        }
        .order-tooltip.pinned {
            pointer-events: auto;
            user-select: text;
            border-color: #2962ff;
        }
        .order-tooltip .tt-close {
            position: absolute;
            top: 6px;
            right: 8px;
            background: transparent;
            border: none;
            color: #787b86;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
            line-height: 1;
            display: none;
        }
        .order-tooltip .tt-close:hover { color: #fff; }
        .order-tooltip.pinned .tt-close { display: block; }
        .order-tooltip .tt-hint {
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid #2a2e39;
            font-size: 10px;
            color: #4a4d57;
            text-align: center;
        }
        .order-tooltip.pinned .tt-hint { color: #787b86; }
        tr[data-idx] { cursor: pointer; }
        .order-tooltip h4 {
            color: #787b86;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 8px 0 4px;
            border-bottom: 1px solid #2a2e39;
            padding-bottom: 3px;
        }
        .order-tooltip h4:first-child { margin-top: 0; }
        .order-tooltip .tt-title {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .order-tooltip .tt-body {
            display: flex;
            gap: 18px;
            align-items: flex-start;
        }
        .order-tooltip .tt-col-left  { flex: 0 0 360px; min-width: 0; }
        .order-tooltip .tt-col-right { flex: 0 0 340px; min-width: 0; }
        .order-tooltip .tt-col-right h4:first-child { margin-top: 0; }
        .order-tooltip .tt-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 11.5px;
        }
        .order-tooltip .tt-label { color: #787b86; }
        .order-tooltip .tt-val { color: #fff; font-weight: 600; }
        .order-tooltip .tt-check {
            display: flex; align-items: flex-start; gap: 6px;
            margin: 3px 0; font-size: 11.5px; line-height: 1.4;
        }
        .order-tooltip .tt-check .mark {
            width: 14px; flex: 0 0 14px; font-weight: 700;
            text-align: center;
        }
        .order-tooltip .tt-check .mark.ok { color: #00e676; }
        .order-tooltip .tt-check .mark.no { color: #ef5350; }
        .order-tooltip .tt-check .mark.skip { color: #4a4d57; }
        .order-tooltip .tt-check .txt { flex: 1; color: #d1d4dc; }
        .order-tooltip .tt-check .txt b { color: #fff; }
        .order-tooltip .tt-narrative {
            margin-top: 6px; padding: 8px 10px;
            background: #131722; border-left: 3px solid #2962ff;
            border-radius: 4px; font-size: 11.5px;
            line-height: 1.55; color: #d1d4dc;
        }
        .order-tooltip .tt-narrative.ok   { border-left-color: #00e676; }
        .order-tooltip .tt-narrative.no   { border-left-color: #ef5350; }
        .order-tooltip .tt-narrative.warn { border-left-color: #ff9800; }
        .order-tooltip .tt-narrative.neutral { border-left-color: #787b86; }
        .order-tooltip .tt-narrative b { color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>Журнал ордеров</h1>
            <a href="index.html">&larr; График</a>
            <a href="scanner.html">Сканер</a>
            <a href="settings.html">Настройки</a>
        </div>
    </div>

    <div class="content">
        <div id="errorBox"></div>

        <div class="summary" id="summary"></div>

        <div class="filters">
            <div class="filter-group">
                <label class="filter-label">Период (дней)</label>
                <input type="number" class="filter-input" id="days" value="30" min="1" max="365">
            </div>
            <div class="filter-group">
                <label class="filter-label">Пара</label>
                <input type="text" class="filter-input" id="pair" placeholder="EUR/USD или пусто">
            </div>
            <div class="filter-group">
                <label class="filter-label">Статус<span class="filter-hint">?<span class="filter-hint-popup"><div class="hint-section-title">Жизненный цикл ордера</div><div><b>placed</b> — лимитник в MT5, ждёт цену</div><div><b>filled</b> — pending сработал, позиция открыта</div><div><b>closed</b> — позиция закрыта, есть финальный профит</div><div class="hint-divider"></div><div class="hint-section-title">Не дошло до сделки</div><div><b>cancelled</b> — pending сняли до срабатывания</div><div><b>expired</b> — pending протух по TTL</div><div><b>failed</b> — MT5 не принял ордер</div><div><b>rejected</b> — отклонён ещё до отправки в MT5</div><div><b>unknown</b> — лог говорит «размещено», MT5 не подтверждает</div></span></span></label>
                <select class="filter-select" id="status">
                    <option value="">Все</option>
                    <option value="placed">Placed (активен)</option>
                    <option value="filled">Filled (исполнен)</option>
                    <option value="closed">Closed (закрыт)</option>
                    <option value="cancelled">Cancelled</option>
                    <option value="expired">Expired</option>
                    <option value="failed">Failed</option>
                    <option value="rejected">Rejected</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Тип<span class="filter-hint">?<span class="filter-hint-popup"><div class="hint-section-title">Способ входа в сделку</div><div><b>pending</b> — лимитник (limit/stop): висит в MT5, ждёт пока цена коснётся entry. Сейчас сканер так и работает по умолчанию.</div><div><b>market</b> — рыночный ордер: открывается мгновенно по текущей цене, без ожидания.</div></span></span></label>
                <select class="filter-select" id="kind">
                    <option value="">Все</option>
                    <option value="pending">Pending</option>
                    <option value="market">Market</option>
                </select>
            </div>
            <button class="btn" onclick="loadJournal()">Обновить</button>
            <button class="btn btn-secondary" onclick="exportCSV()">Экспорт CSV</button>
        </div>

        <div class="table-wrap">
            <table id="journalTable">
                <thead>
                    <tr>
                        <th></th>
                        <th>Время</th>
                        <th>Пара</th>
                        <th>Тип</th>
                        <th>Напр.</th>
                        <th>Entry</th>
                        <th>SL</th>
                        <th>TP</th>
                        <th>R:R</th>
                        <th>Объём</th>
                        <th>Тикет</th>
                        <th>Статус</th>
                        <th>Fill цена</th>
                        <th>Close цена</th>
                        <th>Профит</th>
                        <th>Причина / Заметка</th>
                    </tr>
                </thead>
                <tbody id="journalBody">
                    <tr><td colspan="16" class="empty">Введите admin secret в настройках и нажмите «Обновить»</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="order-tooltip" id="orderTooltip" style="display:none;"></div>

    <script>
    let lastRows = [];
    let displayedRows = [];

    function adminSecret() {
        return localStorage.getItem('scannerAdminSecret') || '';
    }

    function showError(msg) {
        const box = document.getElementById('errorBox');
        box.innerHTML = msg ? `<div class="error">${msg}</div>` : '';
    }

    function fmtTime(iso) {
        if (!iso) return '<span class="muted">—</span>';
        const d = new Date(iso);
        if (isNaN(d.getTime())) return iso;
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function fmtUnix(t) {
        if (!t) return '<span class="muted">—</span>';
        return fmtTime(new Date(t * 1000).toISOString());
    }
    function fmtNum(v, digits = 5) {
        if (v === null || v === undefined || v === '') return '<span class="muted">—</span>';
        if (typeof v !== 'number') return v;
        return v.toFixed(digits);
    }
    function fmtProfit(v) {
        if (v === null || v === undefined) return '<span class="muted">—</span>';
        const cls = v >= 0 ? 'p-pos' : 'p-neg';
        return `<span class="${cls}">${v.toFixed(2)}</span>`;
    }
    function badge(value, prefix = 'b-') {
        if (!value) return '<span class="muted">—</span>';
        const cls = prefix + value.toLowerCase().replace(/[^a-z]/g, '');
        return `<span class="badge ${cls}">${value}</span>`;
    }
    function escapeHtml(s) {
        if (s === null || s === undefined) return '';
        return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c]));
    }

    // ─── Order tooltip helpers ───
    function fpPrice(v) {
        if (v == null || !isFinite(v)) return '—';
        return v >= 10 ? v.toFixed(2) : v.toFixed(5);
    }
    function fmtMoney(v) {
        if (v == null || !isFinite(v)) return '—';
        const sign = v > 0 ? '+' : '';
        return sign + v.toFixed(2);
    }
    function markChar(m) {
        return m === 'ok' ? '✓' : m === 'no' ? '✗' : '—';
    }
    // Returns hours between two times where each may be ISO string or unix-seconds.
    function hoursBetween(start, end) {
        const toMs = (t) => {
            if (t == null) return null;
            if (typeof t === 'number') return t * 1000;
            const d = new Date(t);
            return isNaN(d.getTime()) ? null : d.getTime();
        };
        const a = toMs(start), b = toMs(end);
        if (a == null || b == null) return null;
        return (b - a) / 3600000;
    }
    function fmtHours(h) {
        if (h == null) return '—';
        if (h < 1) return Math.round(h * 60) + ' мин';
        if (h < 48) return h.toFixed(1) + ' ч';
        return (h / 24).toFixed(1) + ' дн';
    }
    function fmtTimeFlex(t) {
        if (t == null) return '—';
        if (typeof t === 'number') return fmtTime(new Date(t * 1000).toISOString());
        return fmtTime(t);
    }
    function dirLabel(d) {
        if (!d) return '—';
        const x = String(d).toLowerCase();
        if (x === 'buy' || x === 'up') return 'LONG ↑';
        if (x === 'sell' || x === 'down') return 'SHORT ↓';
        return d.toUpperCase();
    }

    function inferOutcome(o) {
        const s = o.status;
        if (s === 'failed' || s === 'rejected') return 'failed';
        if (s === 'placed') return 'pending';
        if (s === 'cancelled') return 'cancelled';
        if (s === 'expired') return 'expired';
        if (s === 'filled') return 'active';
        if (s === 'closed') {
            if (o.close_price == null) return 'closed_unknown';
            const ref = Math.abs(o.entry || o.close_price);
            const tol = ref * 0.001;
            const p = o.profit;
            if (o.stop != null && Math.abs(o.close_price - o.stop) <= tol && (p == null || p <= 0)) return 'sl_hit';
            if (o.take != null && Math.abs(o.close_price - o.take) <= tol && (p == null || p > 0)) return 'tp_hit';
            return 'manual_close';
        }
        return 'unknown';
    }

    function buildOrderContextItems(o) {
        const ctx = o.signal_context || {};
        const items = [];
        // Trend
        if (ctx.trend) {
            const t = String(ctx.trend).toLowerCase();
            const label = t === 'up' ? 'восходящий ↑' : t === 'down' ? 'нисходящий ↓' : t === 'range' ? 'боковик ↔' : ctx.trend;
            items.push(`<div class="tt-row"><span class="tt-label">Тренд:</span><span class="tt-val">${escapeHtml(label)}</span></div>`);
        }
        if (ctx.phase) {
            items.push(`<div class="tt-row"><span class="tt-label">Фаза:</span><span class="tt-val">${escapeHtml(ctx.phase)}</span></div>`);
        }
        // Source / kind
        let source = ctx.source;
        if (!source) {
            if (ctx.manual === true || ctx.manual === 'true') source = 'manual';
            else if (o.source === 'mt5_only') source = 'external';
            else if (o.signal_context) source = 'auto-scanner';
            else source = '—';
        }
        items.push(`<div class="tt-row"><span class="tt-label">Источник:</span><span class="tt-val">${escapeHtml(source)}</span></div>`);

        if (ctx.note) {
            items.push(`<div class="tt-row"><span class="tt-label">Заметка:</span><span class="tt-val" style="text-align:right;white-space:normal">${escapeHtml(ctx.note)}</span></div>`);
        }

        // Order summary line
        const dir = dirLabel(o.direction);
        const summary = [
            `<b>${dir}</b>`,
            `Entry ${fpPrice(o.entry)}`,
            `SL ${fpPrice(o.stop)}`,
            `TP ${fpPrice(o.take)}`,
        ];
        if (o.rr != null) summary.push(`R:R 1:${o.rr.toFixed(2)}`);
        if (o.volume != null) summary.push(`vol ${Number(o.volume).toFixed(2)}`);
        items.push(`<div style="margin-top:6px;font-size:11.5px;color:#d1d4dc">${summary.join(' · ')}</div>`);

        return items.join('');
    }

    function buildOrderOutcomeItems(o) {
        const outcome = inferOutcome(o);
        const status = o.status;
        const list = [];

        // 1. Placed?
        if (status === 'failed' || status === 'rejected') {
            list.push({ mark: 'no', text: `Ордер <b>не размещён</b> (${escapeHtml(status)})` });
        } else {
            list.push({ mark: 'ok', text: `Ордер размещён в MT5 (${escapeHtml(o.kind || '—')})` });
        }

        // 2. Filled?
        const filled = o.fill_price != null;
        if (filled) {
            list.push({ mark: 'ok', text: `Сработал по цене <b>${fpPrice(o.fill_price)}</b>` });
        } else if (status === 'placed') {
            list.push({ mark: 'skip', text: 'Ждёт исполнения' });
        } else if (status === 'cancelled' || status === 'expired') {
            list.push({ mark: 'no', text: `Не сработал — ${status === 'expired' ? 'истёк TTL' : 'отменён'}` });
        } else if (status === 'failed' || status === 'rejected') {
            list.push({ mark: 'skip', text: '— (ордер не дошёл до рынка)' });
        } else {
            list.push({ mark: 'skip', text: 'Статус исполнения неизвестен' });
        }

        // 3. Closed?
        if (status === 'closed') {
            list.push({ mark: 'ok', text: `Позиция закрыта (${fpPrice(o.close_price)})` });
        } else if (status === 'filled') {
            list.push({ mark: 'skip', text: 'Ещё в рынке (открытая позиция)' });
        } else {
            list.push({ mark: 'skip', text: '— (позиция не открывалась)' });
        }

        // 4. Close reason
        if (outcome === 'tp_hit') {
            list.push({ mark: 'ok', text: `Закрытие по <b>тейку</b> (${fpPrice(o.take)})` });
        } else if (outcome === 'sl_hit') {
            list.push({ mark: 'no', text: `Закрытие по <b>стопу</b> (${fpPrice(o.stop)})` });
        } else if (outcome === 'manual_close') {
            list.push({ mark: 'no', text: `Закрытие <b>вручную</b> до тейка/стопа` });
        } else if (outcome === 'cancelled') {
            const r = o.reason || '';
            if (/watcher|age/i.test(r)) list.push({ mark: 'no', text: `Pending отменён watcher'ом: ${escapeHtml(r)}` });
            else if (/bid|sl|stop/i.test(r)) list.push({ mark: 'no', text: `Pending отменён (пробой стопа до открытия): ${escapeHtml(r)}` });
            else list.push({ mark: 'no', text: `Отменён: ${escapeHtml(r || 'без причины')}` });
        } else if (outcome === 'expired') {
            list.push({ mark: 'no', text: 'Истёк TTL — цена не дошла до уровня' });
        } else if (outcome === 'failed') {
            list.push({ mark: 'no', text: `Сбой размещения: ${escapeHtml(o.reason || '—')}` });
        } else {
            list.push({ mark: 'skip', text: 'Причина закрытия — позиция ещё активна' });
        }

        // 5. Financial result
        if (o.profit == null) {
            list.push({ mark: 'skip', text: 'Финансовый результат не зафиксирован' });
        } else if (o.profit > 0) {
            list.push({ mark: 'ok', text: `Прибыль: <b>${fmtMoney(o.profit)}</b>` });
        } else if (o.profit < 0) {
            list.push({ mark: 'no', text: `Убыток: <b>${fmtMoney(o.profit)}</b>` });
        } else {
            list.push({ mark: 'skip', text: 'Результат: 0 (безубыток)' });
        }

        return list;
    }

    function buildOrderVerdict(o) {
        const outcome = inferOutcome(o);
        const pair = escapeHtml(o.pair || '');
        const dir = dirLabel(o.direction);
        const reason = o.reason ? escapeHtml(o.reason) : '';

        const heldH = hoursBetween(o.fill_time || o.timestamp, o.close_time);
        const placedAgoH = hoursBetween(o.timestamp, new Date().toISOString());

        switch (outcome) {
            case 'failed':
                return {
                    kind: 'no',
                    text: `Ордер по <b>${pair}</b> <b>не был размещён</b>: ${reason || 'нет описания'}. Никаких действий по нему в рынке не было.`
                };
            case 'pending':
                return {
                    kind: 'neutral',
                    text: `Pending-ордер <b>${dir}</b> по <b>${pair}</b> выставлен ${fmtHours(placedAgoH)} назад по цене ${fpPrice(o.entry)}, стоп ${fpPrice(o.stop)}, цель ${fpPrice(o.take)}. <b>Ждёт исполнения</b>.`
                };
            case 'cancelled': {
                let why;
                if (/watcher|age/i.test(reason)) why = 'watcher отменил pending по возрасту — цена не дошла до уровня входа за отведённое время';
                else if (/bid|sl|stop/i.test(reason)) why = 'цена пробила уровень стопа ещё до исполнения — watcher закрыл pending, чтобы не входить в уже отменённый сценарий';
                else why = `причина: ${reason || 'не указана'}`;
                return {
                    kind: 'neutral',
                    text: `Pending <b>${dir}</b> по <b>${pair}</b> был выставлен и <b>отменён</b>: ${why}. Реальной позиции не было, P&L = 0.`
                };
            }
            case 'expired':
                return {
                    kind: 'neutral',
                    text: `Pending <b>${dir}</b> по <b>${pair}</b> <b>истёк по TTL</b> через ${fmtHours(placedAgoH)} после выставления. Цена так и не дошла до уровня входа ${fpPrice(o.entry)} — сценарий не реализовался.`
                };
            case 'active':
                return {
                    kind: 'warn',
                    text: `Ордер <b>${dir}</b> по <b>${pair}</b> <b>сработал</b> по цене ${fpPrice(o.fill_price)} (${fmtTimeFlex(o.fill_time)}). Позиция <b>в рынке</b>, стоп ${fpPrice(o.stop)}, цель ${fpPrice(o.take)}. Время в позиции: ${fmtHours(hoursBetween(o.fill_time || o.timestamp, new Date().toISOString()))}.`
                };
            case 'tp_hit':
                return {
                    kind: 'ok',
                    text: `Ордер <b>${dir}</b> по <b>${pair}</b> сработал по ${fpPrice(o.fill_price)}, цена дошла до <b>тейка</b> ${fpPrice(o.take)} и закрылась по ${fpPrice(o.close_price)}. <b>Результат: ${fmtMoney(o.profit)}</b>${o.rr != null ? ` (R:R 1:${o.rr.toFixed(2)} отработал полностью)` : ''}. Время в сделке: ${fmtHours(heldH)}.`
                };
            case 'sl_hit':
                return {
                    kind: 'no',
                    text: `Ордер <b>${dir}</b> по <b>${pair}</b> сработал по ${fpPrice(o.fill_price)}, цена пробила <b>стоп</b> ${fpPrice(o.stop)} и закрылась по ${fpPrice(o.close_price)}. <b>Результат: ${fmtMoney(o.profit)}</b> — сценарий отменён, сработала защита стопа. Время в сделке: ${fmtHours(heldH)}.`
                };
            case 'manual_close': {
                const profitKind = o.profit > 0 ? 'ok' : (o.profit < 0 ? 'no' : 'neutral');
                return {
                    kind: profitKind,
                    text: `Ордер <b>${dir}</b> по <b>${pair}</b> сработал по ${fpPrice(o.fill_price)}, <b>закрыт вручную</b> по ${fpPrice(o.close_price)} (не дошёл ни до стопа ${fpPrice(o.stop)}, ни до цели ${fpPrice(o.take)}). <b>Результат: ${fmtMoney(o.profit)}</b>. Время в сделке: ${fmtHours(heldH)}.`
                };
            }
            case 'closed_unknown':
                return {
                    kind: 'neutral',
                    text: `Ордер по <b>${pair}</b> закрыт, но цена закрытия не зафиксирована. ${o.profit != null ? `Результат: ${fmtMoney(o.profit)}.` : ''}`
                };
            default:
                return {
                    kind: 'neutral',
                    text: `Статус ордера: ${escapeHtml(o.status || 'неизвестен')}. Дополнительных данных нет.`
                };
        }
    }

    function buildOrderTooltipHtml(o) {
        const statusBadge = badge(o.status);
        const ticket = o.ticket ? `· Тикет ${o.ticket}` : '';
        let html = `<div class="tt-title"><span>${escapeHtml(o.pair || '—')}</span><span style="font-weight:400;color:#787b86;font-size:12px">${ticket}</span>${statusBadge}</div>`;
        html += `<div class="tt-body"><div class="tt-col-left">`;

        html += `<h4>Контекст открытия</h4>`;
        html += buildOrderContextItems(o);

        html += `<h4>Чек-лист исхода</h4>`;
        for (const item of buildOrderOutcomeItems(o)) {
            html += `<div class="tt-check"><span class="mark ${item.mark}">${markChar(item.mark)}</span><span class="txt">${item.text}</span></div>`;
        }

        html += `</div><div class="tt-col-right">`;
        const v = buildOrderVerdict(o);
        html += `<h4>Что случилось</h4>`;
        html += `<div class="tt-narrative ${v.kind}">${v.text}</div>`;

        // Timing
        const timingRows = [];
        if (o.timestamp) timingRows.push(`<div class="tt-row"><span class="tt-label">Выставлен:</span><span class="tt-val">${fmtTimeFlex(o.timestamp)}</span></div>`);
        if (o.fill_time)  timingRows.push(`<div class="tt-row"><span class="tt-label">Открыт:</span><span class="tt-val">${fmtTimeFlex(o.fill_time)}</span></div>`);
        if (o.close_time) timingRows.push(`<div class="tt-row"><span class="tt-label">Закрыт:</span><span class="tt-val">${fmtTimeFlex(o.close_time)}</span></div>`);
        if (timingRows.length) {
            html += `<h4>Время</h4>` + timingRows.join('');
        }
        html += `</div></div>`;
        return html;
    }

    // ─── Tooltip handlers ───
    const orderTooltipEl = document.getElementById('orderTooltip');
    let orderTooltipVisible = false;
    let orderTooltipPinned = false;

    function renderTooltipInto(o, pinned) {
        const close = `<button class="tt-close" onclick="unpinOrderTooltip()" title="Закрыть">✕</button>`;
        const hint = pinned
            ? `<div class="tt-hint">Закреплено — выделите и скопируйте текст. Esc или ✕ — закрыть.</div>`
            : `<div class="tt-hint">Клик на строке закрепит подсказку для копирования</div>`;
        orderTooltipEl.innerHTML = close + buildOrderTooltipHtml(o) + hint;
    }
    function showOrderTooltip(idx, event) {
        if (orderTooltipPinned) return;
        const o = displayedRows[idx];
        if (!o) return;
        renderTooltipInto(o, false);
        orderTooltipEl.classList.remove('pinned');
        orderTooltipEl.style.display = 'block';
        orderTooltipVisible = true;
        positionOrderTooltip(event);
    }
    function positionOrderTooltip(event) {
        if (!orderTooltipVisible || orderTooltipPinned) return;
        const pad = 16;
        let x = event.clientX + pad;
        let y = event.clientY + pad;
        const rect = orderTooltipEl.getBoundingClientRect();
        if (x + rect.width > window.innerWidth)  x = event.clientX - rect.width  - pad;
        if (y + rect.height > window.innerHeight) y = event.clientY - rect.height - pad;
        if (x < 0) x = pad;
        if (y < 0) y = pad;
        orderTooltipEl.style.left = x + 'px';
        orderTooltipEl.style.top  = y + 'px';
    }
    function hideOrderTooltip() {
        if (orderTooltipPinned) return;
        orderTooltipEl.style.display = 'none';
        orderTooltipVisible = false;
    }
    function pinOrderTooltip(idx, event) {
        const o = displayedRows[idx];
        if (!o) return;
        // Position relative to mouse for first render, then freeze
        renderTooltipInto(o, true);
        orderTooltipEl.classList.add('pinned');
        orderTooltipEl.style.display = 'block';
        orderTooltipVisible = true;
        // Snap position to current mouse so user knows where it locked
        const fakeEvt = { clientX: event.clientX, clientY: event.clientY };
        orderTooltipPinned = false;       // temporarily allow positioning
        positionOrderTooltip(fakeEvt);
        orderTooltipPinned = true;
    }
    window.unpinOrderTooltip = function() {
        orderTooltipPinned = false;
        orderTooltipEl.classList.remove('pinned');
        orderTooltipEl.style.display = 'none';
        orderTooltipVisible = false;
    };
    window.rowMouseEnter = function(idx, ev) { showOrderTooltip(idx, ev); };
    window.rowMouseMove  = function(ev) { positionOrderTooltip(ev); };
    window.rowMouseLeave = function() { hideOrderTooltip(); };
    window.rowClick = function(idx, ev) {
        // Ignore clicks on toggle arrow (it has its own onclick)
        if (ev.target.classList && ev.target.classList.contains('toggle')) return;
        pinOrderTooltip(idx, ev);
        ev.stopPropagation();
    };
    // Esc to unpin
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && orderTooltipPinned) unpinOrderTooltip();
    });
    // Click outside the pinned tooltip → close it
    document.addEventListener('mousedown', (e) => {
        if (!orderTooltipPinned) return;
        if (orderTooltipEl.contains(e.target)) return;
        // Don't close if user clicked another row — that row's onclick will repin
        const onRow = e.target.closest && e.target.closest('tr[data-idx]');
        if (onRow) return;
        unpinOrderTooltip();
    });

    function renderSummary(s) {
        const tiles = [
            ['Всего попыток', s.total_attempts, ''],
            ['Активных (placed)', s.placed, ''],
            ['Исполнено (filled)', s.filled, ''],
            ['Закрыто', s.closed, ''],
            ['Wins / Losses', `${s.wins} / ${s.losses}`, ''],
            ['Winrate', `${(s.winrate * 100).toFixed(0)}%`, ''],
            ['Профит', s.total_profit.toFixed(2),
             s.total_profit > 0 ? 'positive' : (s.total_profit < 0 ? 'negative' : '')],
            ['Cancelled', s.cancelled, ''],
            ['Expired', s.expired, ''],
            ['Failed', s.failed, ''],
        ];
        document.getElementById('summary').innerHTML = tiles.map(([l, v, k]) => `
            <div class="stat">
                <div class="stat-label">${l}</div>
                <div class="stat-value ${k ? 'stat-' + k : ''}">${v}</div>
            </div>
        `).join('');
    }

    function applyClientFilter(rows) {
        const kind = document.getElementById('kind').value;
        if (!kind) return rows;
        return rows.filter(r => r.kind === kind);
    }

    function renderRows(rows) {
        displayedRows = rows;
        const tbody = document.getElementById('journalBody');
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="16" class="empty">Нет данных за выбранный период</td></tr>';
            return;
        }
        tbody.innerHTML = rows.map((r, i) => {
            const dir = r.direction ? r.direction.toLowerCase() : '';
            return `
                <tr data-idx="${i}" onmouseenter="rowMouseEnter(${i}, event)" onmousemove="rowMouseMove(event)" onmouseleave="rowMouseLeave()" onclick="rowClick(${i}, event)">
                    <td><span class="toggle" onclick="toggleCtx(${i})">${r.signal_context ? '▸' : ''}</span></td>
                    <td>${fmtTime(r.timestamp)}</td>
                    <td><strong>${escapeHtml(r.pair || '')}</strong></td>
                    <td>${badge(r.kind)}</td>
                    <td>${badge(dir === 'up' || dir === 'buy' ? 'buy' : (dir === 'down' || dir === 'sell' ? 'sell' : dir))}</td>
                    <td>${fmtNum(r.entry)}</td>
                    <td>${fmtNum(r.stop)}</td>
                    <td>${fmtNum(r.take)}</td>
                    <td>${r.rr ? r.rr.toFixed(2) : '<span class="muted">—</span>'}</td>
                    <td>${fmtNum(r.volume, 2)}</td>
                    <td>${r.ticket || '<span class="muted">—</span>'}</td>
                    <td>${badge(r.status)}</td>
                    <td>${fmtNum(r.fill_price)}</td>
                    <td>${fmtNum(r.close_price)}</td>
                    <td>${fmtProfit(r.profit)}</td>
                    <td>${escapeHtml(r.reason || '')}</td>
                </tr>
                ${r.signal_context ? `
                    <tr id="ctx-${i}" style="display:none">
                        <td colspan="16" class="ctx-cell">${escapeHtml(JSON.stringify(r.signal_context, null, 2))}</td>
                    </tr>
                ` : ''}
            `;
        }).join('');
    }

    window.toggleCtx = function(i) {
        const row = document.getElementById('ctx-' + i);
        if (!row) return;
        const visible = row.style.display !== 'none';
        row.style.display = visible ? 'none' : 'table-row';
        const tr = document.querySelector(`tr[data-idx="${i}"]`);
        const tog = tr.querySelector('.toggle');
        if (tog) tog.textContent = visible ? '▸' : '▾';
        if (tr) tr.classList.toggle('expanded-row', !visible);
    };

    window.loadJournal = async function() {
        if (!adminSecret()) {
            showError('Не задан admin secret. Перейди в <a href="settings.html" style="color:#2962ff">настройки</a>, введи его и сохрани.');
            return;
        }
        showError('');
        const days = document.getElementById('days').value || 30;
        const pair = document.getElementById('pair').value.trim();
        const status = document.getElementById('status').value;
        const params = new URLSearchParams({ days });
        if (pair) params.set('pair', pair);
        if (status) params.set('status', status);
        try {
            const res = await fetch('/api/journal?' + params.toString(), {
                headers: { 'X-Admin-Secret': adminSecret() },
            });
            const data = await res.json();
            if (!data.success) {
                showError('Ошибка: ' + (data.error || 'fail'));
                return;
            }
            lastRows = data.rows || [];
            renderSummary(data.summary);
            renderRows(applyClientFilter(lastRows));
        } catch (err) {
            showError('Сеть: ' + err.message);
        }
    };

    window.exportCSV = function() {
        if (!lastRows.length) return;
        const cols = ['timestamp','pair','kind','direction','entry','stop','take','rr','volume','ticket','status','fill_price','close_price','profit','reason'];
        const header = cols.join(',');
        const lines = lastRows.map(r => cols.map(c => {
            const v = r[c];
            if (v === null || v === undefined) return '';
            const s = String(v).replace(/"/g, '""');
            return /[",\n]/.test(s) ? `"${s}"` : s;
        }).join(','));
        const csv = [header, ...lines].join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `journal_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    };

    document.getElementById('kind').addEventListener('change', () => renderRows(applyClientFilter(lastRows)));

    loadJournal();
    </script>
</body>
</html>
