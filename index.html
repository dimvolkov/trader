<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex Chart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #131722;
            color: #d1d4dc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
            flex-wrap: wrap;
            gap: 8px;
        }
        .pair-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .pair-name {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        .price {
            font-size: 24px;
            font-weight: 700;
            transition: color 0.3s;
        }
        .price.up { color: #26a69a; }
        .price.down { color: #ef5350; }
        .change {
            font-size: 14px;
            padding: 3px 8px;
            border-radius: 4px;
        }
        .change.up { background: rgba(38,166,154,0.15); color: #26a69a; }
        .change.down { background: rgba(239,83,80,0.15); color: #ef5350; }
        .controls {
            display: flex;
            gap: 8px;
        }
        .controls button {
            background: #2a2e39;
            color: #d1d4dc;
            border: 1px solid #363a45;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .controls button:hover { background: #363a45; }
        .controls button.active {
            background: #2962ff;
            border-color: #2962ff;
            color: #fff;
        }
        .advisor-btn.active {
            background: #ff9800 !important;
            border-color: #ff9800 !important;
            color: #fff !important;
        }
        .pair-select {
            background: #2a2e39;
            color: #fff;
            border: 1px solid #363a45;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            outline: none;
        }
        .pair-select:hover { border-color: #2962ff; }
        .pair-select:focus { border-color: #2962ff; }
        .chart-wrapper {
            flex: 1;
            display: flex;
            min-height: 0;
        }
        .chart-container {
            flex: 1;
            position: relative;
            min-width: 0;
        }
        .advisor-panel {
            width: 320px;
            background: #1e222d;
            border-left: 1px solid #2a2e39;
            overflow-y: auto;
            padding: 16px;
            font-size: 13px;
            line-height: 1.6;
            display: none;
            flex-shrink: 0;
        }
        .advisor-panel.visible {
            display: block;
        }
        .advisor-panel h3 {
            color: #fff;
            font-size: 14px;
            margin: 14px 0 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #2a2e39;
        }
        .advisor-panel h3:first-child {
            margin-top: 0;
        }
        .advisor-panel .val { color: #fff; font-weight: 600; }
        .advisor-panel .up { color: #26a69a; }
        .advisor-panel .down { color: #ef5350; }
        .advisor-panel .neutral { color: #787b86; }
        .advisor-panel .signal-ok { color: #00e676; }
        .advisor-panel .signal-wait { color: #ff9800; }
        .advisor-panel .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #1a1e2a;
            font-size: 12px;
            color: #787b86;
        }
        .advisor-panel .entry-box {
            background: #131722;
            border: 1px solid #363a45;
            border-radius: 6px;
            padding: 10px;
            margin-top: 8px;
        }
        .advisor-panel .entry-box .label { color: #787b86; font-size: 11px; }
        .advisor-panel .entry-box .value { color: #fff; font-size: 15px; font-weight: 700; }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 20px;
            background: #1e222d;
            border-top: 1px solid #2a2e39;
            font-size: 12px;
            color: #787b86;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef5350;
        }
        .status-dot.connected { background: #26a69a; }
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(19,23,34,0.85);
            z-index: 10;
        }
        .overlay.hidden { display: none; }
        .overlay-content {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2a2e39;
            border-top-color: #2962ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <div class="pair-info">
            <select class="pair-select" id="pairSelect"></select>
            <span class="price" id="currentPrice">--</span>
            <span class="change" id="priceChange">--</span>
        </div>
        <div class="controls timeframes">
            <button data-tf="1" class="active">1м</button>
            <button data-tf="15">15м</button>
            <button data-tf="30">30м</button>
            <button data-tf="60">1ч</button>
            <button data-tf="W">1Н</button>
            <button data-tf="M">1М</button>
            <button data-tf="Y">1Г</button>
        </div>
        <div class="controls">
            <button data-type="line">Line</button>
            <button data-type="candle" class="active">Candle</button>
            <button class="advisor-btn" id="advisorBtn">Советник</button>
            <a href="scanner.html" style="background:#2a2e39;color:#d1d4dc;border:1px solid #363a45;padding:6px 14px;border-radius:4px;font-size:13px;text-decoration:none;display:inline-block;transition:background 0.2s;" onmouseover="this.style.background='#363a45'" onmouseout="this.style.background='#2a2e39'">Сканер</a>
            <a href="settings.html" style="background:#2a2e39;color:#d1d4dc;border:1px solid #363a45;padding:6px 14px;border-radius:4px;font-size:13px;text-decoration:none;display:inline-block;transition:background 0.2s;" onmouseover="this.style.background='#363a45'" onmouseout="this.style.background='#2a2e39'">&#9881; API</a>
        </div>
    </div>
    <div class="chart-wrapper">
        <div class="chart-container" id="chartContainer">
            <div class="overlay" id="overlay">
                <div class="overlay-content">
                    <div style="font-size:15px;color:#d1d4dc;margin-bottom:12px">Нажмите для загрузки графика</div>
                    <button id="loadChartBtn" style="background:#2962ff;border:none;color:#fff;padding:10px 24px;border-radius:6px;font-size:14px;cursor:pointer">Загрузить график</button>
                    <div style="margin-top:8px;font-size:12px;color:#787b86" id="overlaySourceInfo"></div>
                </div>
            </div>
        </div>
        <div class="advisor-panel" id="advisorPanel">
            <h3>Советник</h3>
            <div id="advisorContent"><span class="neutral">Загрузка данных...</span></div>
        </div>
    </div>
    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
        <span style="margin-left: auto" id="lastUpdate">--</span>
    </div>

    <script src="lightweight-charts.js"></script>
    <script>
    (function() {
        // --- Data source configs ---
        const DATA_SOURCES = {
            twelvedata: { label: 'Twelve Data', defaultKey: '8694f4e28a974a0eba808458ceb33bfb' },
            tradermade: { label: 'TraderMade', defaultKey: '' },
            polygon:    { label: 'Polygon.io', defaultKey: '' },
        };
        const CHART_SOURCE_KEY = 'chartDataSource';
        const CHART_APIKEYS_KEY = 'chartApiKeys';

        function loadChartSource() {
            try { const s = localStorage.getItem(CHART_SOURCE_KEY); if (s && DATA_SOURCES[s]) return s; } catch {}
            return 'twelvedata';
        }
        function loadChartApiKeys() {
            try { const k = JSON.parse(localStorage.getItem(CHART_APIKEYS_KEY)); if (k && typeof k === 'object') return k; } catch {}
            return {};
        }
        function getChartApiKey(src) {
            const keys = loadChartApiKeys();
            return keys[src] || DATA_SOURCES[src].defaultKey || '';
        }
        function currentSource() { return loadChartSource(); }

        let currentSymbol = new URLSearchParams(window.location.search).get('pair') || 'USD/RUB';
        const POLL_INTERVAL = 60000;

        const PAIRS = {
            'RUB пары': [
                'USD/RUB', 'EUR/RUB', 'GBP/RUB', 'CNY/RUB', 'CHF/RUB', 'JPY/RUB',
                'CAD/RUB', 'AUD/RUB', 'BRL/RUB', 'INR/RUB', 'PLN/RUB', 'SEK/RUB',
                'SGD/RUB', 'ZAR/RUB', 'UAH/RUB', 'AZN/RUB', 'GEL/RUB', 'KGS/RUB',
                'TJS/RUB', 'MDL/RUB', 'BGN/RUB',
            ],
            'Мажоры': [
                'EUR/USD', 'GBP/USD', 'USD/JPY', 'USD/CHF', 'AUD/USD', 'USD/CAD', 'NZD/USD',
            ],
            'Кроссы EUR': [
                'EUR/GBP', 'EUR/JPY', 'EUR/CHF', 'EUR/AUD', 'EUR/CAD', 'EUR/NZD',
            ],
            'Кроссы GBP': [
                'GBP/JPY', 'GBP/CHF', 'GBP/AUD', 'GBP/CAD', 'GBP/NZD',
            ],
            'Экзотика': [
                'USD/TRY', 'USD/ZAR', 'USD/MXN', 'USD/BRL', 'USD/INR', 'USD/CNY',
                'USD/SGD', 'USD/HKD', 'USD/PLN', 'USD/SEK', 'USD/NOK', 'USD/DKK',
                'USD/THB', 'USD/KRW', 'USD/ARS', 'USD/CLP',
            ],
        };

        // --- Chart setup ---
        const container = document.getElementById('chartContainer');
        const chart = LightweightCharts.createChart(container, {
            layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
            grid: {
                vertLines: { color: '#1e222d' },
                horzLines: { color: '#1e222d' },
            },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#2a2e39' },
            timeScale: {
                borderColor: '#2a2e39',
                timeVisible: true,
                secondsVisible: false,
            },
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#26a69a',
            downColor: '#ef5350',
            borderDownColor: '#ef5350',
            borderUpColor: '#26a69a',
            wickDownColor: '#ef5350',
            wickUpColor: '#26a69a',
        });

        const lineSeries = chart.addLineSeries({
            color: '#2962ff',
            lineWidth: 2,
            visible: false,
        });

        // Resize
        const ro = new ResizeObserver(() => {
            chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
        });
        ro.observe(container);

        // --- State ---
        let currentCandle = null;
        let openPrice = null;
        let chartType = 'candle';
        let currentTF = '1';
        let priceLines = [];

        const TF_CONFIG = {
            '1':  { interval: '1min',   outputsize: 500,  seconds: 60 },
            '15': { interval: '15min',  outputsize: 500,  seconds: 900 },
            '30': { interval: '30min',  outputsize: 500,  seconds: 1800 },
            '60': { interval: '1h',     outputsize: 500,  seconds: 3600 },
            'W':  { interval: '1day',   outputsize: 365,  seconds: 86400 },
            'M':  { interval: '1week',  outputsize: 156,  seconds: 604800 },
            'Y':  { interval: '1month', outputsize: 240,  seconds: 2592000 },
        };

        // --- Advisor State ---
        let advisorActive = false;
        let advisorTimer = null;
        let advisorState = {
            h1Candles: [], m30Candles: [],
            swings: [],
            trend: null,
            trendSwings: [],
            impulses: [],
            levels: {},
            slom: null,
            entry: null,
            status: '',
            log: []
        };
        let advisorSegmentSeries = [];
        let advisorPriceLines = [];
        let advisorMarkers = [];

        // --- UI refs ---
        const priceEl = document.getElementById('currentPrice');
        const changeEl = document.getElementById('priceChange');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const lastUpdateEl = document.getElementById('lastUpdate');
        const overlay = document.getElementById('overlay');
        const pairSelect = document.getElementById('pairSelect');
        const advisorBtn = document.getElementById('advisorBtn');
        const advisorPanel = document.getElementById('advisorPanel');
        const advisorContent = document.getElementById('advisorContent');

        // --- Populate pair selector ---
        for (const [group, pairs] of Object.entries(PAIRS)) {
            const optgroup = document.createElement('optgroup');
            optgroup.label = group;
            for (const pair of pairs) {
                const opt = document.createElement('option');
                opt.value = pair;
                opt.textContent = pair;
                if (pair === currentSymbol) opt.selected = true;
                optgroup.appendChild(opt);
            }
            pairSelect.appendChild(optgroup);
        }

        pairSelect.addEventListener('change', () => {
            currentSymbol = pairSelect.value;
            document.title = currentSymbol + ' — Forex Chart';
            currentCandle = null;
            openPrice = null;
            stopPolling();
            overlay.classList.remove('hidden');
            init();
        });

        // --- Chart type toggle ---
        document.querySelectorAll('.controls:not(.timeframes) button:not(.advisor-btn)').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.controls:not(.timeframes) button:not(.advisor-btn)').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                chartType = btn.dataset.type;
                candleSeries.applyOptions({ visible: chartType === 'candle' });
                lineSeries.applyOptions({ visible: chartType === 'line' });
            });
        });

        // --- Timeframe toggle ---
        document.querySelectorAll('.timeframes button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.timeframes .active').classList.remove('active');
                btn.classList.add('active');
                currentTF = btn.dataset.tf;
                currentCandle = null;
                loadHistory();
            });
        });

        // --- Advisor button toggle ---
        advisorBtn.addEventListener('click', () => {
            advisorActive = !advisorActive;
            advisorBtn.classList.toggle('active', advisorActive);
            if (advisorActive) {
                advisorPanel.classList.add('visible');
                chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
                runAdvisor();
                advisorTimer = setInterval(() => runAdvisor(), 60000);
            } else {
                advisorPanel.classList.remove('visible');
                chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
                clearAdvisorMarkup();
                if (advisorTimer) { clearInterval(advisorTimer); advisorTimer = null; }
            }
        });

        function updatePrice(price) {
            priceEl.textContent = price.toFixed(4);
            if (openPrice !== null) {
                const diff = price - openPrice;
                const pct = (diff / openPrice * 100).toFixed(2);
                const up = diff >= 0;
                priceEl.className = 'price ' + (up ? 'up' : 'down');
                changeEl.className = 'change ' + (up ? 'up' : 'down');
                changeEl.textContent = `${up ? '+' : ''}${diff.toFixed(4)} (${up ? '+' : ''}${pct}%)`;
            }
            lastUpdateEl.textContent = new Date().toLocaleTimeString();
        }

        function parseDatetime(dt) {
            const parts = dt.split(' ');
            const d = parts[0].split('-');
            if (parts.length === 1) {
                return Date.UTC(+d[0], +d[1] - 1, +d[2]) / 1000;
            }
            const t = parts[1].split(':');
            return Date.UTC(+d[0], +d[1] - 1, +d[2], +t[0], +t[1], +t[2] || 0) / 1000;
        }

        // --- Multi-source fetch ---
        function pairConcat(symbol) { return symbol.replace('/', ''); }

        async function fetchTwelveDataTS(symbol, interval, outputsize) {
            const url = `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=${interval}&outputsize=${outputsize || 500}&apikey=${getChartApiKey('twelvedata')}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.status === 'ok' && data.values) {
                return data.values.reverse().map(v => ({
                    time: parseDatetime(v.datetime),
                    open: parseFloat(v.open), high: parseFloat(v.high),
                    low: parseFloat(v.low), close: parseFloat(v.close),
                }));
            }
            if (data.code === 429) throw new Error('API лимит исчерпан (429)');
            return [];
        }

        async function fetchTraderMadeTS(symbol, interval) {
            const pair = pairConcat(symbol);
            let tmInterval, tmPeriod = '';
            if (interval === '1h') { tmInterval = 'hourly'; }
            else if (interval === '30min') { tmInterval = 'minute'; tmPeriod = '&period=30'; }
            else if (interval === '15min') { tmInterval = 'minute'; tmPeriod = '&period=15'; }
            else if (interval === '1min') { tmInterval = 'minute'; tmPeriod = '&period=1'; }
            else if (interval === '1day') { tmInterval = 'daily'; }
            else if (interval === '1week') { tmInterval = 'daily'; }
            else if (interval === '1month') { tmInterval = 'daily'; }
            else { tmInterval = 'hourly'; }
            const daysBack = tmInterval === 'minute' ? 4 : 60;
            const now = new Date();
            const from = new Date(now.getTime() - daysBack * 86400000);
            const url = `https://marketdata.tradermade.com/api/v1/timeseries?currency=${pair}&api_key=${getChartApiKey('tradermade')}&start_date=${from.toISOString().slice(0,10)}&end_date=${now.toISOString().slice(0,10)}&interval=${tmInterval}${tmPeriod}&format=records`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.quotes && Array.isArray(data.quotes)) {
                return data.quotes.map(q => ({
                    time: parseDatetime(q.date),
                    open: parseFloat(q.open), high: parseFloat(q.high),
                    low: parseFloat(q.low), close: parseFloat(q.close),
                }));
            }
            if (data.error) throw new Error(data.error);
            return [];
        }

        async function fetchPolygonTS(symbol, interval) {
            const ticker = 'C:' + pairConcat(symbol);
            let multiplier, timespan;
            if (interval === '1min') { multiplier = 1; timespan = 'minute'; }
            else if (interval === '15min') { multiplier = 15; timespan = 'minute'; }
            else if (interval === '30min') { multiplier = 30; timespan = 'minute'; }
            else if (interval === '1h') { multiplier = 1; timespan = 'hour'; }
            else if (interval === '1day') { multiplier = 1; timespan = 'day'; }
            else if (interval === '1week') { multiplier = 1; timespan = 'week'; }
            else if (interval === '1month') { multiplier = 1; timespan = 'month'; }
            else { multiplier = 1; timespan = 'hour'; }
            const now = new Date();
            const from = new Date(now.getTime() - 90 * 86400000);
            const url = `https://api.polygon.io/v2/aggs/ticker/${ticker}/range/${multiplier}/${timespan}/${from.toISOString().slice(0,10)}/${now.toISOString().slice(0,10)}?adjusted=true&sort=asc&limit=5000&apiKey=${getChartApiKey('polygon')}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.status === 'OK' && data.results) {
                return data.results.map(r => ({
                    time: Math.floor(r.t / 1000),
                    open: r.o, high: r.h, low: r.l, close: r.c,
                }));
            }
            if (data.status === 'ERROR') throw new Error(data.error || data.message || 'API error');
            return [];
        }

        // --- Finnhub ---
        async function fetchFinnhubTS(symbol, interval) {
            const fhSymbol = 'OANDA:' + pairConcat(symbol).slice(0,3) + '_' + pairConcat(symbol).slice(3);
            let resolution;
            if (interval === '1min') resolution = '1';
            else if (interval === '15min') resolution = '15';
            else if (interval === '30min') resolution = '30';
            else if (interval === '1h') resolution = '60';
            else if (interval === '1day') resolution = 'D';
            else if (interval === '1week') resolution = 'W';
            else if (interval === '1month') resolution = 'M';
            else resolution = '60';
            const to = Math.floor(Date.now() / 1000);
            const from = to - 90 * 86400;
            const url = `https://finnhub.io/api/v1/forex/candle?symbol=${fhSymbol}&resolution=${resolution}&from=${from}&to=${to}&token=${getChartApiKey('finnhub')}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.s === 'ok' && data.c && data.c.length > 0) {
                return data.t.map((t, i) => ({
                    time: t,
                    open: data.o[i], high: data.h[i],
                    low: data.l[i], close: data.c[i],
                }));
            }
            if (data.error) throw new Error(data.error);
            return [];
        }

        // --- FCS API ---
        async function fetchFcsApiTS(symbol, interval) {
            let period;
            if (interval === '1min') period = '1m';
            else if (interval === '15min') period = '15m';
            else if (interval === '30min') period = '30m';
            else if (interval === '1h') period = '1h';
            else if (interval === '1day') period = '1d';
            else if (interval === '1week') period = '1w';
            else if (interval === '1month') period = '1M';
            else period = '1h';
            const url = `https://fcsapi.com/api-v3/forex/history?symbol=${symbol}&period=${period}&access_key=${getChartApiKey('fcsapi')}`;
            const res = await fetch(url);
            const data = await res.json();
            let candles = data.response;
            if (candles && !Array.isArray(candles)) candles = Object.values(candles);
            if (candles && candles.length > 0 && candles[0].o) {
                return candles.map(q => ({
                    time: parseInt(q.t) || parseDatetime(q.tm),
                    open: parseFloat(q.o), high: parseFloat(q.h),
                    low: parseFloat(q.l), close: parseFloat(q.c),
                }));
            }
            if (data.status === false || data.code) throw new Error(data.msg || 'FCS API error');
            if (!candles || candles.length === 0) throw new Error('Нет данных от FCS API');
            return [];
        }

        // --- Alpha Vantage ---
        async function fetchAlphaVantageTS(symbol, interval) {
            const parts = symbol.split('/');
            const from = parts[0], to = parts[1];
            let func, ivParam;
            if (['1day','1week','1month'].includes(interval)) {
                func = interval === '1week' ? 'FX_WEEKLY' : interval === '1month' ? 'FX_MONTHLY' : 'FX_DAILY';
                const url = `https://www.alphavantage.co/query?function=${func}&from_symbol=${from}&to_symbol=${to}&apikey=${getChartApiKey('alphavantage')}`;
                const res = await fetch(url);
                const data = await res.json();
                const tsKey = Object.keys(data).find(k => k.startsWith('Time Series'));
                if (tsKey && data[tsKey]) {
                    return Object.entries(data[tsKey]).reverse().map(([dt, v]) => ({
                        time: parseDatetime(dt),
                        open: parseFloat(v['1. open']), high: parseFloat(v['2. high']),
                        low: parseFloat(v['3. low']), close: parseFloat(v['4. close']),
                    }));
                }
                if (data['Error Message']) throw new Error(data['Error Message']);
                if (data['Note']) throw new Error('Rate limit');
                return [];
            } else {
                if (interval === '1min') ivParam = '1min';
                else if (interval === '15min') ivParam = '15min';
                else if (interval === '30min') ivParam = '30min';
                else ivParam = '60min';
                const url = `https://www.alphavantage.co/query?function=FX_INTRADAY&from_symbol=${from}&to_symbol=${to}&interval=${ivParam}&outputsize=full&apikey=${getChartApiKey('alphavantage')}`;
                const res = await fetch(url);
                const data = await res.json();
                const tsKey = Object.keys(data).find(k => k.startsWith('Time Series'));
                if (tsKey && data[tsKey]) {
                    return Object.entries(data[tsKey]).reverse().map(([dt, v]) => ({
                        time: parseDatetime(dt),
                        open: parseFloat(v['1. open']), high: parseFloat(v['2. high']),
                        low: parseFloat(v['3. low']), close: parseFloat(v['4. close']),
                    }));
                }
                if (data['Error Message']) throw new Error(data['Error Message']);
                if (data['Note']) throw new Error('Rate limit');
                return [];
            }
        }

        async function fetchCandles(symbol, interval, outputsize) {
            const src = currentSource();
            if (src === 'tradermade') return fetchTraderMadeTS(symbol, interval);
            if (src === 'polygon') return fetchPolygonTS(symbol, interval);
            if (src === 'finnhub') return fetchFinnhubTS(symbol, interval);
            if (src === 'fcsapi') return fetchFcsApiTS(symbol, interval);
            if (src === 'alphavantage') return fetchAlphaVantageTS(symbol, interval);
            return fetchTwelveDataTS(symbol, interval, outputsize);
        }

        function getCandleTime(ts) {
            const sec = Math.floor(ts / 1000);
            const tf = TF_CONFIG[currentTF];
            return sec - (sec % tf.seconds);
        }

        function handleTick(price, timestamp) {
            let time = getCandleTime(timestamp);

            if (currentCandle && time < currentCandle.time) {
                time = currentCandle.time;
            }

            if (!currentCandle || currentCandle.time !== time) {
                currentCandle = { time, open: price, high: price, low: price, close: price };
            } else {
                currentCandle.close = price;
                currentCandle.high = Math.max(currentCandle.high, price);
                currentCandle.low = Math.min(currentCandle.low, price);
            }

            candleSeries.update(currentCandle);
            lineSeries.update({ time, value: price });
            updatePrice(price);
        }

        function setStatus(text, connected) {
            statusDot.className = 'status-dot' + (connected ? ' connected' : '');
            statusText.textContent = text;

        // --- Support & Resistance levels ---
        function clearPriceLines() {
            priceLines.forEach(pl => candleSeries.removePriceLine(pl));
            priceLines = [];
        }

        function findSupportResistance(candles) {
            if (candles.length < 5) return [];
            const lookback = Math.max(3, Math.floor(candles.length * 0.03));
            const levels = [];

            for (let i = lookback; i < candles.length - lookback; i++) {
                let isResistance = true;
                let isSupport = true;
                for (let j = 1; j <= lookback; j++) {
                    if (candles[i].high <= candles[i - j].high || candles[i].high <= candles[i + j].high) {
                        isResistance = false;
                    }
                    if (candles[i].low >= candles[i - j].low || candles[i].low >= candles[i + j].low) {
                        isSupport = false;
                    }
                }
                if (isResistance) levels.push({ price: candles[i].high, type: 'resistance' });
                if (isSupport) levels.push({ price: candles[i].low, type: 'support' });
            }

            levels.sort((a, b) => a.price - b.price);
            const merged = [];
            for (const lvl of levels) {
                const last = merged[merged.length - 1];
                if (last && Math.abs(lvl.price - last.price) / last.price < 0.0015) {
                    last.price = (last.price + lvl.price) / 2;
                    last.count++;
                } else {
                    merged.push({ ...lvl, count: 1 });
                }
            }

            const supports = merged.filter(l => l.type === 'support').sort((a, b) => b.count - a.count).slice(0, 4);
            const resistances = merged.filter(l => l.type === 'resistance').sort((a, b) => b.count - a.count).slice(0, 4);
            return [...supports, ...resistances];
        }

        function buildPeriodSeparators(candles) {
            separatorMarkers = [];
            if (candles.length < 2) return;
            if (['W', 'M', 'Y'].includes(currentTF)) return;
            let prevDay = null;
            for (const c of candles) {
                const d = new Date(c.time * 1000);
                const day = d.getUTCFullYear() * 10000 + (d.getUTCMonth() + 1) * 100 + d.getUTCDate();
                if (prevDay !== null && day !== prevDay) {
                    separatorMarkers.push({
                        time: c.time,
                        position: 'aboveBar',
                        color: '#363a45',
                        shape: 'square',
                        size: 0.01,
                        text: (d.getUTCDate() + '.' + (d.getUTCMonth() + 1).toString().padStart(2, '0')),
                    });
                }
                prevDay = day;
            }
        }

        function drawSupportResistance(candles) {
            clearPriceLines();
            const levels = findSupportResistance(candles);
            levels.forEach(lvl => {
                const pl = candleSeries.createPriceLine({
                    price: lvl.price,
                    color: lvl.type === 'support' ? '#26a69a' : '#ef5350',
                    lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dashed,
                    axisLabelVisible: true,
                    title: lvl.type === 'support' ? 'S' : 'R',
                });
                priceLines.push(pl);
            });
        }

        // ADVISOR — Trading Advisor Logic

        async function fetchAdvisorData(symbol) {
            const h1 = await fetchCandles(symbol, '1h', 500);
            const m30 = await fetchCandles(symbol, '30min', 500);
            return { h1, m30 };
        }

        function findSwingPoints(candles, lookback) {
            const swings = [];
            for (let i = lookback; i < candles.length - lookback; i++) {
                let isHigh = true;
                let isLow = true;
                for (let j = 1; j <= lookback; j++) {
                    if (candles[i].high < candles[i - j].high || candles[i].high < candles[i + j].high) {
                        isHigh = false;
                    }
                    if (candles[i].low > candles[i - j].low || candles[i].low > candles[i + j].low) {
                        isLow = false;
                    }
                }
                if (isHigh) swings.push({ index: i, time: candles[i].time, price: candles[i].high, type: 'high' });
                if (isLow) swings.push({ index: i, time: candles[i].time, price: candles[i].low, type: 'low' });
            }
            swings.sort((a, b) => a.time - b.time);
            return swings;
        }

        function determineTrend(swings) {
            const highs = swings.filter(s => s.type === 'high');
            const lows = swings.filter(s => s.type === 'low');
            if (highs.length < 3 || lows.length < 3) return 'range';

            const lastHighs = highs.slice(-3);
            const lastLows = lows.slice(-3);

            const hhCount = (lastHighs[1].price > lastHighs[0].price ? 1 : 0) +
                            (lastHighs[2].price > lastHighs[1].price ? 1 : 0);
            const hlCount = (lastLows[1].price > lastLows[0].price ? 1 : 0) +
                            (lastLows[2].price > lastLows[1].price ? 1 : 0);
            const lhCount = (lastHighs[1].price < lastHighs[0].price ? 1 : 0) +
                            (lastHighs[2].price < lastHighs[1].price ? 1 : 0);
            const llCount = (lastLows[1].price < lastLows[0].price ? 1 : 0) +
                            (lastLows[2].price < lastLows[1].price ? 1 : 0);

            if (hhCount >= 2 && hlCount >= 2) return 'up';
            if (lhCount >= 2 && llCount >= 2) return 'down';
            return 'range';
        }

        function segmentSwings(swings, trend) {
            if (swings.length < 2) return [];
            // Build alternating sequence: merge adjacent same-type swings
            const alternating = [swings[0]];
            for (let i = 1; i < swings.length; i++) {
                const last = alternating[alternating.length - 1];
                if (swings[i].type === last.type) {
                    // Keep the more extreme one
                    if (swings[i].type === 'high' && swings[i].price > last.price) {
                        alternating[alternating.length - 1] = swings[i];
                    } else if (swings[i].type === 'low' && swings[i].price < last.price) {
                        alternating[alternating.length - 1] = swings[i];
                    }
                } else {
                    alternating.push(swings[i]);
                }
            }

            const segments = [];
            for (let i = 0; i < alternating.length - 1; i++) {
                const from = alternating[i];
                const to = alternating[i + 1];
                let segType;
                if (trend === 'up') {
                    segType = (from.type === 'low' && to.type === 'high') ? 'impulse' : 'correction';
                } else if (trend === 'down') {
                    segType = (from.type === 'high' && to.type === 'low') ? 'impulse' : 'correction';
                } else {
                    segType = (i % 2 === 0) ? 'impulse' : 'correction';
                }
                segments.push({
                    startTime: from.time, startPrice: from.price,
                    endTime: to.time, endPrice: to.price,
                    type: segType,
                    size: Math.abs(to.price - from.price),
                });
            }
            return segments;
        }

        function checkReversal(impulses) {
            const corrections = impulses.filter(s => s.type === 'correction');
            const imps = impulses.filter(s => s.type === 'impulse');
            if (corrections.length === 0 || imps.length === 0) return { reversal: false, reason: 'Недостаточно данных' };

            const lastCorr = corrections[corrections.length - 1];
            const lastImp = imps[imps.length - 1];

            if (lastCorr.size > lastImp.size) {
                return { reversal: true, reason: `Коррекция (${lastCorr.size.toFixed(4)}) > Импульса (${lastImp.size.toFixed(4)})` };
            }
            return { reversal: false, reason: `Коррекция (${lastCorr.size.toFixed(4)}) < Импульса (${lastImp.size.toFixed(4)}) — тренд продолжается` };
        }

        function constructLevels(impulses, trend, swings) {
            const imps = impulses.filter(s => s.type === 'impulse');
            if (imps.length === 0) return {};

            const lastImp = imps[imps.length - 1];
            const impulseEnd = lastImp.endPrice;
            const impulseStart = lastImp.startPrice;

            // Find target: previous swing extreme in trend direction
            let target = null;
            const relevantSwings = trend === 'up'
                ? swings.filter(s => s.type === 'high' && s.price > impulseEnd)
                : swings.filter(s => s.type === 'low' && s.price < impulseEnd);

            if (relevantSwings.length > 0) {
                relevantSwings.sort((a, b) => trend === 'up'
                    ? a.price - b.price
                    : b.price - a.price);
                target = relevantSwings[0].price;
            } else {
                // Project target based on impulse size
                const size = Math.abs(impulseEnd - impulseStart);
                target = trend === 'up' ? impulseEnd + size : impulseEnd - size;
            }

            return { impulseEnd, impulseStart, target };
        }

        function detectSlom(m30Candles, trendDir, h1Levels) {
            if (!h1Levels.impulseEnd) return null;

            const m30Swings = findSwingPoints(m30Candles, 4);
            if (m30Swings.length < 4) return null;

            // Check if price is near an H1 level
            const lastPrice = m30Candles[m30Candles.length - 1].close;
            const nearLevel = [h1Levels.impulseEnd, h1Levels.impulseStart, h1Levels.target]
                .filter(l => l != null)
                .find(level => Math.abs(lastPrice - level) / level < 0.0015);

            // Get recent M30 micro-swings
            const recentSwings = m30Swings.slice(-10);
            const microHighs = recentSwings.filter(s => s.type === 'high');
            const microLows = recentSwings.filter(s => s.type === 'low');

            if (microHighs.length < 2 || microLows.length < 2) return null;

            // Determine M30 micro-trend
            const lastMicroHighs = microHighs.slice(-2);
            const lastMicroLows = microLows.slice(-2);

            let signal1 = null, signal2 = null, signal3 = null;

            if (trendDir === 'up') {
                // Looking for bullish slom: break above M30 micro-high
                const microBase = lastMicroLows[lastMicroLows.length - 1];
                const microTop = lastMicroHighs[lastMicroHighs.length - 1];

                // Signal 1: price breaks above last M30 swing high
                const breakLevel = lastMicroHighs[lastMicroHighs.length - 2].price;
                if (microTop.price > breakLevel) {
                    signal1 = { price: breakLevel, time: microTop.time, label: `пробой ${breakLevel.toFixed(4)}` };

                    // Signal 2: pullback to broken level (within 50% retracement)
                    const pullbackZone = breakLevel + (microTop.price - breakLevel) * 0.5;
                    for (let i = microTop.index + 1; i < m30Candles.length; i++) {
                        if (m30Candles[i].low <= pullbackZone && m30Candles[i].low >= breakLevel * 0.999) {
                            signal2 = { price: m30Candles[i].low, time: m30Candles[i].time, label: `откат к ${m30Candles[i].low.toFixed(4)}` };
                            break;
                        }
                    }

                    // Signal 3: new impulse breaking signal 1 high
                    if (signal2) {
                        for (let i = m30Candles.findIndex(c => c.time >= signal2.time) + 1; i < m30Candles.length; i++) {
                            if (m30Candles[i].high > microTop.price) {
                                signal3 = { price: m30Candles[i].high, time: m30Candles[i].time, label: `пробой ${microTop.price.toFixed(4)}` };
                                break;
                            }
                        }
                    }
                }
            } else if (trendDir === 'down') {
                // Looking for bearish slom: break below M30 micro-low
                const microBase = lastMicroHighs[lastMicroHighs.length - 1];
                const microBottom = lastMicroLows[lastMicroLows.length - 1];

                const breakLevel = lastMicroLows[lastMicroLows.length - 2].price;
                if (microBottom.price < breakLevel) {
                    signal1 = { price: breakLevel, time: microBottom.time, label: `пробой ${breakLevel.toFixed(4)}` };

                    const pullbackZone = breakLevel - (breakLevel - microBottom.price) * 0.5;
                    for (let i = microBottom.index + 1; i < m30Candles.length; i++) {
                        if (m30Candles[i].high >= pullbackZone && m30Candles[i].high <= breakLevel * 1.001) {
                            signal2 = { price: m30Candles[i].high, time: m30Candles[i].time, label: `откат к ${m30Candles[i].high.toFixed(4)}` };
                            break;
                        }
                    }

                    if (signal2) {
                        for (let i = m30Candles.findIndex(c => c.time >= signal2.time) + 1; i < m30Candles.length; i++) {
                            if (m30Candles[i].low < microBottom.price) {
                                signal3 = { price: m30Candles[i].low, time: m30Candles[i].time, label: `пробой ${microBottom.price.toFixed(4)}` };
                                break;
                            }
                        }
                    }
                }
            }

            if (!signal1) return null;

            return {
                signal1,
                signal2: signal2 || null,
                signal3: signal3 || null,
                complete: !!(signal1 && signal2 && signal3),
                nearLevel,
            };
        }

        function computeEntry(slom, levels, trend) {
            if (!slom || !slom.signal2 || !levels.target) return null;

            const entry = slom.signal2.price;
            let stop, take;

            if (trend === 'up') {
                stop = slom.signal1.price - Math.abs(slom.signal2.price - slom.signal1.price) * 0.5;
                take = levels.target;
            } else {
                stop = slom.signal1.price + Math.abs(slom.signal2.price - slom.signal1.price) * 0.5;
                take = levels.target;
            }

            const rr = Math.abs(take - entry) / Math.abs(entry - stop);

            if (rr < 2.0) return { entry, stop, take, rr, valid: false, reason: `R:R = ${rr.toFixed(2)} < 2.0` };

            return {
                entry, stop, take, rr,
                direction: trend,
                valid: true,
                reason: `R:R = ${rr.toFixed(2)}`
            };
        }

        function updateAdvisorPanel(state) {
            const highs = state.swings.filter(s => s.type === 'high').slice(-3);
            const lows = state.swings.filter(s => s.type === 'low').slice(-3);
            const trendLabel = state.trend === 'up' ? 'ВОСХОДЯЩИЙ' : state.trend === 'down' ? 'НИСХОДЯЩИЙ' : 'БОКОВИК';
            const trendArrow = state.trend === 'up' ? ' ↑' : state.trend === 'down' ? ' ↓' : ' ↔';
            const trendClass = state.trend === 'up' ? 'up' : state.trend === 'down' ? 'down' : 'neutral';

            // Impulse/correction info
            const imps = state.impulses.filter(s => s.type === 'impulse');
            const corrs = state.impulses.filter(s => s.type === 'correction');
            const lastImp = imps.length > 0 ? imps[imps.length - 1] : null;
            const lastCorr = corrs.length > 0 ? corrs[corrs.length - 1] : null;

            // Current phase
            let phaseText = 'Определение...';
            let phaseDetail = '';
            if (state.impulses.length > 0) {
                const lastSeg = state.impulses[state.impulses.length - 1];
                phaseText = lastSeg.type === 'impulse' ? 'Импульс' : 'Коррекция';
            }

            const reversal = checkReversal(state.impulses);

            let html = '';

            // Trend section
            html += `<h3>Тренд H1</h3>`;
            html += `<div><span class="${trendClass} val">${trendLabel}${trendArrow}</span></div>`;
            if (highs.length > 0) {
                html += `<div>Хаи: ${highs.map(h => h.price.toFixed(4)).join(' → ')}</div>`;
            }
            if (lows.length > 0) {
                html += `<div>Лоу: ${lows.map(l => l.price.toFixed(4)).join(' → ')}</div>`;
            }

            // Phase section
            html += `<h3>Фаза</h3>`;
            html += `<div><span class="val">${phaseText}</span></div>`;
            if (lastImp) {
                const dir = lastImp.endPrice > lastImp.startPrice ? '+' : '';
                html += `<div>Импульс: ${lastImp.startPrice.toFixed(4)} → ${lastImp.endPrice.toFixed(4)} (${dir}${lastImp.size.toFixed(4)})</div>`;
            }
            if (lastCorr) {
                const dir = lastCorr.endPrice > lastCorr.startPrice ? '+' : '';
                html += `<div>Коррекция: ${lastCorr.startPrice.toFixed(4)} → ${lastCorr.endPrice.toFixed(4)} (${dir}${lastCorr.size.toFixed(4)})</div>`;
            }
            html += `<div style="font-size:12px;color:#787b86">${reversal.reason}</div>`;
            if (reversal.reversal) {
                html += `<div class="down" style="font-weight:600">⚠ Сигнал разворота!</div>`;
            }

            // Levels section
            html += `<h3>Уровни H1</h3>`;
            if (state.levels.impulseEnd != null) {
                html += `<div>Конец импульса: <span class="val">${state.levels.impulseEnd.toFixed(4)}</span></div>`;
            }
            if (state.levels.impulseStart != null) {
                html += `<div>Начало импульса: <span class="val">${state.levels.impulseStart.toFixed(4)}</span></div>`;
            }
            if (state.levels.target != null) {
                html += `<div>Цель: <span class="val signal-ok">${state.levels.target.toFixed(4)}</span></div>`;
            }
            if (!state.levels.impulseEnd) {
                html += `<div class="neutral">Нет данных</div>`;
            }

            // Slom section
            html += `<h3>Слом (M30)</h3>`;
            if (state.slom) {
                const s1 = state.slom.signal1;
                const s2 = state.slom.signal2;
                const s3 = state.slom.signal3;
                html += `<div>Сигнал 1: ${s1 ? `<span class="signal-ok">✓ ${s1.label}</span>` : '<span class="signal-wait">—</span>'}</div>`;
                html += `<div>Сигнал 2: ${s2 ? `<span class="signal-ok">✓ ${s2.label}</span>` : '<span class="signal-wait">ожидание...</span>'}</div>`;
                html += `<div>Сигнал 3: ${s3 ? `<span class="signal-ok">✓ ${s3.label}</span>` : '<span class="signal-wait">ожидание...</span>'}</div>`;
            } else {
                html += `<div class="neutral">Паттерн не обнаружен</div>`;
            }

            // Entry section
            html += `<h3>Вход</h3>`;
            if (state.entry && state.entry.valid) {
                const dir = state.entry.direction === 'up' ? 'LONG ↑' : 'SHORT ↓';
                const dirClass = state.entry.direction === 'up' ? 'up' : 'down';
                html += `<div class="entry-box">`;
                html += `<div class="label">Направление</div><div class="value ${dirClass}">${dir}</div>`;
                html += `<div class="label">Вход</div><div class="value">${state.entry.entry.toFixed(4)}</div>`;
                html += `<div class="label">Стоп</div><div class="value down">${state.entry.stop.toFixed(4)}</div>`;
                html += `<div class="label">Тейк</div><div class="value up">${state.entry.take.toFixed(4)}</div>`;
                html += `<div class="label">R:R</div><div class="value">${state.entry.rr.toFixed(2)}</div>`;
                html += `</div>`;
            } else if (state.entry && !state.entry.valid) {
                html += `<div class="neutral">${state.entry.reason}</div>`;
            } else {
                html += `<div class="neutral">—</div>`;
            }

            // Log section
            html += `<h3>Лог решений</h3>`;
            if (state.log.length > 0) {
                for (const entry of state.log.slice(-10).reverse()) {
                    html += `<div class="log-entry">${entry}</div>`;
                }
            } else {
                html += `<div class="neutral">Нет записей</div>`;
            }

            advisorContent.innerHTML = html;
        }

        // --- Advisor Orchestration ---

        async function runAdvisor() {
            if (!advisorActive) return;

            advisorState = {
                h1Candles: [], m30Candles: [],
                swings: [], trend: null, trendSwings: [],
                impulses: [], levels: {},
                slom: null, entry: null,
                status: '', log: []
            };

            advisorContent.innerHTML = '<span class="neutral">Загрузка H1 и M30 данных...</span>';

            try {
                // Step 1: Fetch data
                const data = await fetchAdvisorData(currentSymbol);
                advisorState.h1Candles = data.h1;
                advisorState.m30Candles = data.m30;
                advisorState.log.push(`Загружено: H1=${data.h1.length} свечей, M30=${data.m30.length} свечей`);

                if (data.h1.length < 20) {
                    advisorState.log.push('Недостаточно H1 данных для анализа');
                    updateAdvisorPanel(advisorState);
                    return;
                }

                // Step 2: Find swing points
                advisorState.swings = findSwingPoints(data.h1, 5);
                advisorState.log.push(`Найдено ${advisorState.swings.length} свинг-точек H1 (lookback=5)`);

                if (advisorState.swings.length < 4) {
                    advisorState.log.push('Недостаточно свинг-точек для определения тренда');
                    renderAdvisorMarkup(advisorState);
                    updateAdvisorPanel(advisorState);
                    return;
                }

                // Step 3: Determine trend
                advisorState.trend = determineTrend(advisorState.swings);
                advisorState.log.push(`Тренд H1: ${advisorState.trend === 'up' ? 'восходящий' : advisorState.trend === 'down' ? 'нисходящий' : 'боковик'}`);

                // Step 4: Segment swings into impulses/corrections
                advisorState.impulses = segmentSwings(advisorState.swings, advisorState.trend);
                const impCount = advisorState.impulses.filter(s => s.type === 'impulse').length;
                const corrCount = advisorState.impulses.filter(s => s.type === 'correction').length;
                advisorState.log.push(`Сегменты: ${impCount} импульсов, ${corrCount} коррекций`);

                // Step 5: Check reversal
                const reversal = checkReversal(advisorState.impulses);
                advisorState.log.push(`Разворот: ${reversal.reversal ? 'ДА' : 'нет'} — ${reversal.reason}`);

                // Step 6: Construct levels
                if (advisorState.trend !== 'range') {
                    advisorState.levels = constructLevels(advisorState.impulses, advisorState.trend, advisorState.swings);
                    if (advisorState.levels.impulseEnd != null) {
                        advisorState.log.push(`Уровни: конец=${advisorState.levels.impulseEnd.toFixed(4)}, начало=${advisorState.levels.impulseStart.toFixed(4)}, цель=${advisorState.levels.target ? advisorState.levels.target.toFixed(4) : '—'}`);
                    }
                }

                // Step 7: Detect Slom on M30
                if (advisorState.trend !== 'range' && data.m30.length > 20) {
                    advisorState.slom = detectSlom(data.m30, advisorState.trend, advisorState.levels);
                    if (advisorState.slom) {
                        const complete = advisorState.slom.complete ? 'полный' : 'частичный';
                        advisorState.log.push(`Слом M30: ${complete} — S1:${advisorState.slom.signal1 ? '✓' : '—'} S2:${advisorState.slom.signal2 ? '✓' : '—'} S3:${advisorState.slom.signal3 ? '✓' : '—'}`);
                    } else {
                        advisorState.log.push('Слом M30: паттерн не обнаружен');
                    }
                }

                // Step 8: Compute entry
                if (advisorState.slom && advisorState.slom.signal2) {
                    advisorState.entry = computeEntry(advisorState.slom, advisorState.levels, advisorState.trend);
                    if (advisorState.entry) {
                        advisorState.log.push(`Вход: ${advisorState.entry.valid ? 'ВАЛИДНЫЙ' : 'невалидный'} — ${advisorState.entry.reason}`);
                    }
                }

                // Step 9: Render visualization
                renderAdvisorMarkup(advisorState);

                // Step 10: Update panel
                updateAdvisorPanel(advisorState);

            } catch (e) {
                console.warn('Advisor error:', e);
                advisorState.log.push(`Ошибка: ${e.message}`);
                updateAdvisorPanel(advisorState);
            }
        }

        // --- Init ---
        async function startChart() {
            overlay.innerHTML = '<div class="overlay-content"><div class="spinner"></div><div>Загрузка...</div></div>';
            const loaded = await loadHistory();
            if (loaded) {
                startPolling();
                if (advisorActive) {
                    runAdvisor();
                }
            } else {
                setStatus('Failed to load data', false);
            }
        }

        // Show source info on overlay
        const srcName = DATA_SOURCES[currentSource()]?.label || currentSource();
        const overlayInfo = document.getElementById('overlaySourceInfo');
        if (overlayInfo) overlayInfo.textContent = `Источник: ${srcName}`;

        document.getElementById('loadChartBtn').addEventListener('click', startChart);
    })();
    </script>
</body>
