<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USD/RUB Forex Chart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #131722;
            color: #d1d4dc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
        }
        .pair-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .pair-name {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        .price {
            font-size: 24px;
            font-weight: 700;
            transition: color 0.3s;
        }
        .price.up { color: #26a69a; }
        .price.down { color: #ef5350; }
        .change {
            font-size: 14px;
            padding: 3px 8px;
            border-radius: 4px;
        }
        .change.up { background: rgba(38,166,154,0.15); color: #26a69a; }
        .change.down { background: rgba(239,83,80,0.15); color: #ef5350; }
        .controls {
            display: flex;
            gap: 8px;
        }
        .controls button {
            background: #2a2e39;
            color: #d1d4dc;
            border: 1px solid #363a45;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .controls button:hover { background: #363a45; }
        .controls button.active {
            background: #2962ff;
            border-color: #2962ff;
            color: #fff;
        }
        .chart-container {
            flex: 1;
            position: relative;
        }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 20px;
            background: #1e222d;
            border-top: 1px solid #2a2e39;
            font-size: 12px;
            color: #787b86;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef5350;
        }
        .status-dot.connected { background: #26a69a; }
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(19,23,34,0.85);
            z-index: 10;
        }
        .overlay.hidden { display: none; }
        .overlay-content {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2a2e39;
            border-top-color: #2962ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <div class="pair-info">
            <span class="pair-name">USD / RUB</span>
            <span class="price" id="currentPrice">--</span>
            <span class="change" id="priceChange">--</span>
        </div>
        <div class="controls timeframes">
            <button data-tf="1" class="active">1м</button>
            <button data-tf="15">15м</button>
            <button data-tf="30">30м</button>
            <button data-tf="60">1ч</button>
            <button data-tf="W">1Н</button>
            <button data-tf="M">1М</button>
            <button data-tf="Y">1Г</button>
        </div>
        <div class="controls">
            <button data-type="line">Line</button>
            <button data-type="candle" class="active">Candle</button>
        </div>
    </div>
    <div class="chart-container" id="chartContainer">
        <div class="overlay" id="overlay">
            <div class="overlay-content">
                <div class="spinner"></div>
                <div>Connecting...</div>
            </div>
        </div>
    </div>
    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
        <span style="margin-left: auto" id="lastUpdate">--</span>
    </div>

    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script>
    (function() {
        const API_KEY = '8694f4e28a974a0eba808458ceb33bfb';
        const SYMBOL = 'USD/RUB';
        const API_BASE = 'https://api.twelvedata.com';
        const POLL_INTERVAL = 5000;

        // --- Chart setup ---
        const container = document.getElementById('chartContainer');
        const chart = LightweightCharts.createChart(container, {
            layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
            grid: {
                vertLines: { color: '#1e222d' },
                horzLines: { color: '#1e222d' },
            },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#2a2e39' },
            timeScale: {
                borderColor: '#2a2e39',
                timeVisible: true,
                secondsVisible: false,
            },
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#26a69a',
            downColor: '#ef5350',
            borderDownColor: '#ef5350',
            borderUpColor: '#26a69a',
            wickDownColor: '#ef5350',
            wickUpColor: '#26a69a',
        });

        const lineSeries = chart.addLineSeries({
            color: '#2962ff',
            lineWidth: 2,
            visible: false,
        });

        // Resize
        const ro = new ResizeObserver(() => {
            chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
        });
        ro.observe(container);

        // --- State ---
        let currentCandle = null;
        let openPrice = null;
        let chartType = 'candle';
        let currentTF = '1';
        let priceLines = [];

        const TF_CONFIG = {
            '1':  { interval: '1min',   outputsize: 500,  seconds: 60 },
            '15': { interval: '15min',  outputsize: 500,  seconds: 900 },
            '30': { interval: '30min',  outputsize: 500,  seconds: 1800 },
            '60': { interval: '1h',     outputsize: 500,  seconds: 3600 },
            'W':  { interval: '1day',   outputsize: 365,  seconds: 86400 },
            'M':  { interval: '1week',  outputsize: 156,  seconds: 604800 },
            'Y':  { interval: '1month', outputsize: 240,  seconds: 2592000 },
        };

        // --- UI refs ---
        const priceEl = document.getElementById('currentPrice');
        const changeEl = document.getElementById('priceChange');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const lastUpdateEl = document.getElementById('lastUpdate');
        const overlay = document.getElementById('overlay');

        // --- Chart type toggle ---
        document.querySelectorAll('.controls:not(.timeframes) button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.controls:not(.timeframes) .active').classList.remove('active');
                btn.classList.add('active');
                chartType = btn.dataset.type;
                candleSeries.applyOptions({ visible: chartType === 'candle' });
                lineSeries.applyOptions({ visible: chartType === 'line' });
            });
        });

        // --- Timeframe toggle ---
        document.querySelectorAll('.timeframes button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.timeframes .active').classList.remove('active');
                btn.classList.add('active');
                currentTF = btn.dataset.tf;
                currentCandle = null;
                loadHistory();
            });
        });

        function updatePrice(price) {
            priceEl.textContent = price.toFixed(4);
            if (openPrice !== null) {
                const diff = price - openPrice;
                const pct = (diff / openPrice * 100).toFixed(2);
                const up = diff >= 0;
                priceEl.className = 'price ' + (up ? 'up' : 'down');
                changeEl.className = 'change ' + (up ? 'up' : 'down');
                changeEl.textContent = `${up ? '+' : ''}${diff.toFixed(4)} (${up ? '+' : ''}${pct}%)`;
            }
            lastUpdateEl.textContent = new Date().toLocaleTimeString();
        }

        function parseDatetime(dt) {
            const parts = dt.split(' ');
            const d = parts[0].split('-');
            if (parts.length === 1) {
                return Date.UTC(+d[0], +d[1] - 1, +d[2]) / 1000;
            }
            const t = parts[1].split(':');
            return Date.UTC(+d[0], +d[1] - 1, +d[2], +t[0], +t[1], +t[2] || 0) / 1000;
        }

        function getCandleTime(ts) {
            const sec = Math.floor(ts / 1000);
            const tf = TF_CONFIG[currentTF];
            return sec - (sec % tf.seconds);
        }

        function handleTick(price, timestamp) {
            const time = getCandleTime(timestamp);

            if (!currentCandle || currentCandle.time !== time) {
                currentCandle = { time, open: price, high: price, low: price, close: price };
            } else {
                currentCandle.close = price;
                currentCandle.high = Math.max(currentCandle.high, price);
                currentCandle.low = Math.min(currentCandle.low, price);
            }

            candleSeries.update(currentCandle);
            lineSeries.update({ time, value: price });
            updatePrice(price);
        }

        function setStatus(text, connected) {
            statusDot.className = 'status-dot' + (connected ? ' connected' : '');
            statusText.textContent = text;
        }

        // --- Load historical candles via Twelve Data ---
        async function loadHistory() {
            try {
                const tf = TF_CONFIG[currentTF];
                const url = `${API_BASE}/time_series?symbol=${SYMBOL}&interval=${tf.interval}&outputsize=${tf.outputsize}&apikey=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.status === 'ok' && data.values) {
                    const values = data.values.reverse();
                    const candles = [];
                    const lineData = [];

                    for (const v of values) {
                        const time = parseDatetime(v.datetime);
                        const o = parseFloat(v.open);
                        const h = parseFloat(v.high);
                        const l = parseFloat(v.low);
                        const c = parseFloat(v.close);
                        candles.push({ time, open: o, high: h, low: l, close: c });
                        lineData.push({ time, value: c });
                    }

                    candleSeries.setData(candles);
                    lineSeries.setData(lineData);

                    if (candles.length > 0) {
                        const last = candles[candles.length - 1];
                        openPrice = candles[0].open;
                        currentCandle = last;
                        updatePrice(last.close);
                        drawSupportResistance(candles);
                    }
                    overlay.classList.add('hidden');
                    return true;
                } else {
                    console.warn('API response:', data);
                }
            } catch (e) {
                console.warn('History load failed:', e);
            }
            return false;
        }

        // --- REST polling for live price ---
        let pollTimer = null;

        async function pollQuote() {
            try {
                const url = `${API_BASE}/price?symbol=${SYMBOL}&apikey=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.price) {
                    handleTick(parseFloat(data.price), Date.now());
                }
            } catch (e) {
                console.warn('Poll failed:', e);
            }
        }

        function startPolling() {
            setStatus('Connected (polling)', true);
            pollQuote();
            pollTimer = setInterval(pollQuote, POLL_INTERVAL);
        }

        function stopPolling() {
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        }

        // --- WebSocket realtime ---
        let ws = null;
        let wsRetries = 0;

        function connectWebSocket() {
            try {
                ws = new WebSocket(`wss://ws.twelvedata.com/v1/quotes/price?apikey=${API_KEY}`);
            } catch (e) {
                console.warn('WS init failed, falling back to polling');
                startPolling();
                return;
            }

            ws.onopen = () => {
                wsRetries = 0;
                stopPolling();
                setStatus('Connected (realtime)', true);
                ws.send(JSON.stringify({
                    action: 'subscribe',
                    params: { symbols: SYMBOL }
                }));
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.event === 'price' && msg.price) {
                    handleTick(parseFloat(msg.price), msg.timestamp ? msg.timestamp * 1000 : Date.now());
                }
            };

            ws.onclose = () => {
                setStatus('Disconnected', false);
                if (wsRetries < 3) {
                    wsRetries++;
                    setTimeout(connectWebSocket, 3000 * wsRetries);
                } else {
                    startPolling();
                }
            };

            ws.onerror = () => {
                ws.close();
            };
        }

        // --- Support & Resistance levels ---
        function clearPriceLines() {
            priceLines.forEach(pl => candleSeries.removePriceLine(pl));
            priceLines = [];
        }

        function findSupportResistance(candles) {
            if (candles.length < 5) return [];
            const lookback = Math.max(3, Math.floor(candles.length * 0.03));
            const levels = [];

            for (let i = lookback; i < candles.length - lookback; i++) {
                let isResistance = true;
                let isSupport = true;
                for (let j = 1; j <= lookback; j++) {
                    if (candles[i].high <= candles[i - j].high || candles[i].high <= candles[i + j].high) {
                        isResistance = false;
                    }
                    if (candles[i].low >= candles[i - j].low || candles[i].low >= candles[i + j].low) {
                        isSupport = false;
                    }
                }
                if (isResistance) levels.push({ price: candles[i].high, type: 'resistance' });
                if (isSupport) levels.push({ price: candles[i].low, type: 'support' });
            }

            levels.sort((a, b) => a.price - b.price);
            const merged = [];
            for (const lvl of levels) {
                const last = merged[merged.length - 1];
                if (last && Math.abs(lvl.price - last.price) / last.price < 0.0015) {
                    last.price = (last.price + lvl.price) / 2;
                    last.count++;
                } else {
                    merged.push({ ...lvl, count: 1 });
                }
            }

            const supports = merged.filter(l => l.type === 'support').sort((a, b) => b.count - a.count).slice(0, 4);
            const resistances = merged.filter(l => l.type === 'resistance').sort((a, b) => b.count - a.count).slice(0, 4);
            return [...supports, ...resistances];
        }

        function drawSupportResistance(candles) {
            clearPriceLines();
            const levels = findSupportResistance(candles);
            levels.forEach(lvl => {
                const pl = candleSeries.createPriceLine({
                    price: lvl.price,
                    color: lvl.type === 'support' ? '#26a69a' : '#ef5350',
                    lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dashed,
                    axisLabelVisible: true,
                    title: lvl.type === 'support' ? 'S' : 'R',
                });
                priceLines.push(pl);
            });
        }

        // --- Init ---
        async function init() {
            const loaded = await loadHistory();
            if (loaded) {
                connectWebSocket();
            } else {
                setStatus('Failed to load data', false);
                overlay.classList.add('hidden');
            }
        }

        init();
    })();
    </script>
</body>
</html>
