<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер пар — Forex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #131722;
            color: #d1d4dc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-left h1 {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }
        .header-left a {
            color: #2962ff;
            text-decoration: none;
            font-size: 13px;
        }
        .header-left a:hover { text-decoration: underline; }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button {
            background: #2a2e39;
            color: #d1d4dc;
            border: 1px solid #363a45;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        button:hover { background: #363a45; }
        button.active, button.scanning {
            background: #26a69a;
            border-color: #26a69a;
            color: #fff;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        select {
            background: #2a2e39;
            color: #fff;
            border: 1px solid #363a45;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }
        select:hover { border-color: #2962ff; }
        input[type="text"] {
            background: #2a2e39;
            color: #fff;
            border: 1px solid #363a45;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            width: 220px;
            font-family: monospace;
        }
        input[type="text"]:focus { border-color: #2962ff; }
        .watchlist-config {
            padding: 12px 20px;
            background: #1a1e2a;
            border-bottom: 1px solid #2a2e39;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .watchlist-config label {
            font-size: 12px;
            color: #787b86;
        }
        .table-wrapper {
            flex: 1;
            overflow-x: auto;
            padding: 16px 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            background: #1e222d;
            color: #787b86;
            font-weight: 600;
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid #2a2e39;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #1e222d;
            white-space: nowrap;
        }
        tr { transition: background 0.3s; }
        tr.clickable { cursor: pointer; }
        tr.clickable:hover { background: #1e222d; }
        .verdict-ok { color: #00e676; font-weight: 600; }
        .verdict-no { color: #787b86; }
        .trade-plan {
            background: #1a1e2a;
            border: 1px solid #2a2e39;
            border-radius: 6px;
            padding: 16px 20px;
            margin: 4px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }
        .trade-plan-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .trade-plan-item .label {
            font-size: 11px;
            color: #787b86;
            text-transform: uppercase;
        }
        .trade-plan-item .value {
            font-size: 14px;
            color: #fff;
            font-weight: 600;
        }
        .trade-plan-row td {
            padding: 0 12px 10px;
            border-bottom: 1px solid #2a2e39;
        }
        .trade-plan-row.hidden { display: none; }
        .mini-chart-container {
            margin-top: 12px;
            height: 250px;
            width: 100%;
            background: #131722;
            border-radius: 6px;
            border: 1px solid #2a2e39;
        }
        tr.signal-long {
            animation: pulseGreen 2s ease-in-out 3;
        }
        tr.signal-short {
            animation: pulseRed 2s ease-in-out 3;
        }
        @keyframes pulseGreen {
            0%, 100% { background: transparent; }
            50% { background: rgba(38, 166, 154, 0.15); }
        }
        @keyframes pulseRed {
            0%, 100% { background: transparent; }
            50% { background: rgba(239, 83, 80, 0.15); }
        }
        .up { color: #26a69a; }
        .down { color: #ef5350; }
        .neutral { color: #787b86; }
        .val { color: #fff; font-weight: 600; }
        .signal-ok { color: #00e676; }
        .entry-long { color: #26a69a; font-weight: 700; }
        .entry-short { color: #ef5350; font-weight: 700; }
        .rr-good { color: #00e676; font-weight: 700; }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 20px;
            background: #1e222d;
            border-top: 1px solid #2a2e39;
            font-size: 12px;
            color: #787b86;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef5350;
        }
        .status-dot.active { background: #26a69a; }
        .spinner-inline {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #2a2e39;
            border-top-color: #2962ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 4px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .scanning-pair { color: #2962ff; }
        .pair-tooltip {
            position: fixed;
            background: #1e222d;
            border: 1px solid #363a45;
            border-radius: 8px;
            padding: 14px 18px;
            font-size: 12px;
            color: #d1d4dc;
            z-index: 9999;
            pointer-events: none;
            max-width: 380px;
            min-width: 280px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            line-height: 1.6;
        }
        .pair-tooltip h4 {
            color: #787b86;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 8px 0 4px;
            border-bottom: 1px solid #2a2e39;
            padding-bottom: 3px;
        }
        .pair-tooltip h4:first-child { margin-top: 0; }
        .pair-tooltip .tt-title {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }
        .pair-tooltip .tt-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }
        .pair-tooltip .tt-label { color: #787b86; }
        .pair-tooltip .tt-val { color: #fff; font-weight: 600; }
        .pair-tooltip .tt-ok { color: #00e676; }
        .pair-tooltip .tt-wait { color: #787b86; }
        .pair-tooltip .tt-warn { color: #ef5350; font-weight: 600; }
        .chart-btn {
            background: transparent;
            border: none;
            padding: 2px 6px;
            font-size: 16px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            line-height: 1;
        }
        .chart-btn:hover { opacity: 1; background: transparent; }
        .scan-time { cursor: pointer; }
        .scan-time:hover { color: #2962ff; }
        .schedule-config {
            padding: 10px 20px;
            background: #1a1e2a;
            border-bottom: 1px solid #2a2e39;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .schedule-config label {
            font-size: 12px;
            color: #787b86;
        }
        .schedule-config input[type="number"] {
            background: #2a2e39;
            color: #fff;
            border: 1px solid #363a45;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            width: 60px;
            text-align: center;
        }
        .schedule-config input[type="number"]:focus { border-color: #2962ff; }
        .schedule-toggle {
            position: relative;
            width: 40px;
            height: 22px;
            cursor: pointer;
        }
        .schedule-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .schedule-toggle .slider {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #363a45;
            border-radius: 11px;
            transition: background 0.3s;
        }
        .schedule-toggle .slider::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            left: 3px;
            bottom: 3px;
            background: #d1d4dc;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .schedule-toggle input:checked + .slider {
            background: #26a69a;
        }
        .schedule-toggle input:checked + .slider::before {
            transform: translateX(18px);
        }
        .schedule-separator {
            color: #787b86;
            font-size: 13px;
            margin: 0 -6px;
        }
        .countdown-text {
            color: #2962ff;
            font-size: 12px;
            font-weight: 600;
        }
        .history-row td { padding: 0 12px 10px; border-bottom: 1px solid #2a2e39; }
        .history-row.hidden { display: none; }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin: 6px 0;
        }
        .history-table th {
            background: #1a1e2a;
            color: #787b86;
            font-weight: 600;
            padding: 6px 10px;
            text-align: left;
            position: static;
        }
        .history-table td {
            padding: 5px 10px;
            border-bottom: 1px solid #1e222d;
            color: #d1d4dc;
        }
        .history-table tr.history-valid { background: rgba(38, 166, 154, 0.08); }
        .scan-log-panel {
            background: #1a1e2a;
            border-top: 1px solid #2a2e39;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .scan-log-panel.open { max-height: 300px; overflow-y: auto; }
        .scan-log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 20px;
            background: #1e222d;
            border-top: 1px solid #2a2e39;
            cursor: pointer;
            user-select: none;
        }
        .scan-log-header:hover { background: #252930; }
        .scan-log-header span { font-size: 12px; color: #787b86; }
        .scan-log-header .log-badge {
            background: #ef5350;
            color: #fff;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
            margin-left: 8px;
            display: none;
        }
        .scan-log-entry {
            padding: 4px 20px;
            font-size: 12px;
            border-bottom: 1px solid #1e222d;
            display: flex;
            gap: 10px;
            align-items: baseline;
        }
        .scan-log-entry .log-time { color: #787b86; white-space: nowrap; min-width: 60px; }
        .scan-log-entry .log-pair { color: #2962ff; font-weight: 600; min-width: 80px; }
        .scan-log-entry .log-msg { color: #d1d4dc; }
        .scan-log-entry.log-success .log-msg { color: #00e676; }
        .scan-log-entry.log-warn .log-msg { color: #ff9800; }
        .scan-log-entry.log-error .log-msg { color: #ef5350; }
        .scan-log-entry.log-info .log-msg { color: #787b86; }
        .scan-log-entry.log-tg .log-msg { color: #29b6f6; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>Сканер пар</h1>
            <a href="index.html">&larr; График</a>
            <a href="settings.html">&#9881; API</a>
        </div>
        <div class="header-right">
            <button id="scanBtn" onclick="scanOnce()">Сканировать</button>
        </div>
    </div>
    <div class="watchlist-config">
        <label>Источник:</label>
        <select id="dataSource" onchange="onSourceChange()">
            <option value="twelvedata">Twelve Data</option>
            <option value="tradermade">TraderMade</option>
            <option value="polygon">Polygon.io</option>
            <option value="finnhub">Finnhub</option>
            <option value="fcsapi">FCS API</option>
            <option value="alphavantage">Alpha Vantage</option>
        </select>
        <label>API ключ:</label>
        <input type="text" id="apiKeyInput" placeholder="Введите API ключ" spellcheck="false" onchange="saveSettings()">
        <label>Watchlist:</label>
        <select id="pair1"></select>
        <select id="pair2"></select>
        <select id="pair3"></select>
        <select id="pair4"></select>
    </div>
    <div class="schedule-config">
        <label class="schedule-toggle" title="Включить автосканирование">
            <input type="checkbox" id="autoScanToggle" onchange="toggleAutoScan()">
            <span class="slider"></span>
        </label>
        <label>Авто</label>
        <span class="schedule-separator">|</span>
        <label>Окно:</label>
        <input type="number" id="scheduleFrom" min="0" max="23" value="8" onchange="saveScheduleSettings()">
        <span class="schedule-separator">—</span>
        <input type="number" id="scheduleTo" min="0" max="23" value="20" onchange="saveScheduleSettings()">
        <label>ч (МСК)</label>
        <span class="schedule-separator">|</span>
        <label>Интервал:</label>
        <input type="number" id="scheduleInterval" min="1" max="24" value="1" onchange="saveScheduleSettings()">
        <label>ч</label>
        <span class="schedule-separator">|</span>
        <span id="autoScanStatus" style="font-size:12px;color:#787b86;">Выкл</span>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Пара</th>
                    <th>Тренд</th>
                    <th>Вердикт</th>
                    <th>Направление</th>
                    <th>Вход</th>
                    <th>Стоп</th>
                    <th>Тейк</th>
                    <th>R:R</th>
                    <th>Размер позиции</th>
                    <th>Риск / Прибыль</th>
                    <th>Время</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="scannerBody">
            </tbody>
        </table>
    </div>
    <div class="scan-log-header" onclick="toggleScanLog()">
        <span>&#9660; Лог сканирования <span class="log-badge" id="logBadge">0</span></span>
        <span id="logToggleHint" style="font-size:11px;color:#363a45;">нажмите чтобы открыть</span>
    </div>
    <div class="scan-log-panel" id="scanLogPanel">
        <div id="scanLogContent"></div>
    </div>
    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Готов к сканированию</span>
        <span style="margin-left: auto" id="cycleInfo"></span>
    </div>

    <div class="pair-tooltip" id="pairTooltip" style="display:none;"></div>

    <script src="lightweight-charts.js"></script>
    <script>
    (function() {
        // --- Data source configs ---
        const DATA_SOURCES = {
            twelvedata: { label: 'Twelve Data', defaultKey: '8694f4e28a974a0eba808458ceb33bfb', rateDelay: 12000 },
            tradermade: { label: 'TraderMade', defaultKey: '', rateDelay: 3000 },
            polygon:    { label: 'Polygon.io', defaultKey: '', rateDelay: 12000 },
            finnhub:    { label: 'Finnhub', defaultKey: '', rateDelay: 1500 },
            fcsapi:     { label: 'FCS API', defaultKey: '', rateDelay: 21000 },
            alphavantage: { label: 'Alpha Vantage', defaultKey: '', rateDelay: 15000 },
            oanda:      { label: 'OANDA', defaultKey: '', rateDelay: 500 },
        };

        const SOURCE_STORAGE_KEY = 'scannerDataSource';
        const APIKEYS_STORAGE_KEY = 'scannerApiKeys';

        const PAIRS = {
            'RUB пары': [
                'USD/RUB', 'EUR/RUB', 'GBP/RUB', 'CNY/RUB', 'CHF/RUB', 'JPY/RUB',
                'CAD/RUB', 'AUD/RUB', 'BRL/RUB', 'INR/RUB', 'PLN/RUB', 'SEK/RUB',
                'SGD/RUB', 'ZAR/RUB', 'UAH/RUB', 'AZN/RUB', 'GEL/RUB', 'KGS/RUB',
                'TJS/RUB', 'MDL/RUB', 'BGN/RUB',
            ],
            'Мажоры': [
                'EUR/USD', 'GBP/USD', 'USD/JPY', 'USD/CHF', 'AUD/USD', 'USD/CAD', 'NZD/USD',
            ],
            'Кроссы EUR': [
                'EUR/GBP', 'EUR/JPY', 'EUR/CHF', 'EUR/AUD', 'EUR/CAD', 'EUR/NZD',
            ],
            'Кроссы GBP': [
                'GBP/JPY', 'GBP/CHF', 'GBP/AUD', 'GBP/CAD', 'GBP/NZD',
            ],
            'Экзотика': [
                'USD/TRY', 'USD/ZAR', 'USD/MXN', 'USD/BRL', 'USD/INR', 'USD/CNY',
                'USD/SGD', 'USD/HKD', 'USD/PLN', 'USD/SEK', 'USD/NOK', 'USD/DKK',
                'USD/THB', 'USD/KRW', 'USD/ARS', 'USD/CLP',
            ],
        };

        const DEFAULT_WATCHLIST = ['EUR/USD', 'GBP/USD', 'USD/JPY', 'USD/CHF'];
        const STORAGE_KEY = 'scannerWatchlist';

        // --- Bankroll constants ---
        const DEPOSIT = 100000; // ₽
        const RISK_PCT = 0.01;  // 1%
        const MAX_RISK = DEPOSIT * RISK_PCT; // 1000 ₽

        // --- State ---
        let scanning = false;
        let scanAbort = false;
        let notifiedEntries = new Set();
        const HISTORY_STORAGE_KEY = 'scannerHistory';
        let scanHistory = {};
        const CHARTDATA_STORAGE_KEY = 'scannerChartData_v1';

        function loadHistory() {
            try {
                const saved = JSON.parse(localStorage.getItem(HISTORY_STORAGE_KEY));
                if (saved && typeof saved === 'object') scanHistory = saved;
            } catch {}
        }

        function saveHistory() {
            try {
                localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(scanHistory));
            } catch {}
        }

        function loadChartDataCache() {
            try {
                const saved = JSON.parse(localStorage.getItem(CHARTDATA_STORAGE_KEY));
                if (saved && typeof saved === 'object') return saved;
            } catch {}
            return {};
        }

        function saveChartDataCache() {
            try {
                localStorage.setItem(CHARTDATA_STORAGE_KEY, JSON.stringify(pairChartData));
            } catch (e) { console.warn('Failed to save chart data cache:', e); }
        }

        loadHistory();

        // --- DOM refs ---
        const scanBtn = document.getElementById('scanBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const cycleInfo = document.getElementById('cycleInfo');
        const scannerBody = document.getElementById('scannerBody');
        const dataSourceSelect = document.getElementById('dataSource');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const pairSelects = [
            document.getElementById('pair1'),
            document.getElementById('pair2'),
            document.getElementById('pair3'),
            document.getElementById('pair4'),
        ];

        // --- Populate pair selectors ---
        function populateSelectors() {
            const saved = loadWatchlist();
            pairSelects.forEach((sel, idx) => {
                sel.innerHTML = '';
                for (const [group, pairs] of Object.entries(PAIRS)) {
                    const optgroup = document.createElement('optgroup');
                    optgroup.label = group;
                    for (const pair of pairs) {
                        const opt = document.createElement('option');
                        opt.value = pair;
                        opt.textContent = pair;
                        if (pair === saved[idx]) opt.selected = true;
                        optgroup.appendChild(opt);
                    }
                    sel.appendChild(optgroup);
                }
                sel.addEventListener('change', saveWatchlist);
            });
        }

        function getWatchlist() {
            return pairSelects.map(s => s.value);
        }

        function loadWatchlist() {
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (Array.isArray(saved) && saved.length === 4) return saved;
            } catch {}
            return DEFAULT_WATCHLIST;
        }

        function saveWatchlist() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(getWatchlist()));
        }

        function getDataSource() {
            return loadDataSource();
        }

        function loadDataSource() {
            try {
                const saved = localStorage.getItem(SOURCE_STORAGE_KEY);
                if (saved && DATA_SOURCES[saved]) return saved;
            } catch {}
            return 'twelvedata';
        }

        function loadApiKeys() {
            try {
                const saved = JSON.parse(localStorage.getItem(APIKEYS_STORAGE_KEY));
                if (saved && typeof saved === 'object') return saved;
            } catch {}
            return {};
        }

        function getApiKey(source) {
            const saved = loadApiKeys();
            if (saved[source]) return saved[source];
            // Fallback to chart page keys
            try {
                const chartKeys = JSON.parse(localStorage.getItem('chartApiKeys'));
                if (chartKeys && chartKeys[source]) return chartKeys[source];
            } catch {}
            return DATA_SOURCES[source].defaultKey || '';
        }

        window.saveSettings = function() {
            const source = getDataSource();
            localStorage.setItem(SOURCE_STORAGE_KEY, source);
            const keys = loadApiKeys();
            keys[source] = apiKeyInput.value.trim();
            localStorage.setItem(APIKEYS_STORAGE_KEY, JSON.stringify(keys));
            saveWatchlist();
        };

        window.onSourceChange = function() {
            const source = getDataSource();
            localStorage.setItem(SOURCE_STORAGE_KEY, source);
            apiKeyInput.value = getApiKey(source);
        };

        // --- Analysis functions (copied from index.html) ---

        function parseDatetime(dt) {
            const parts = dt.split(' ');
            const d = parts[0].split('-');
            if (parts.length === 1) {
                return Date.UTC(+d[0], +d[1] - 1, +d[2]) / 1000;
            }
            const t = parts[1].split(':');
            return Date.UTC(+d[0], +d[1] - 1, +d[2], +t[0], +t[1], +t[2] || 0) / 1000;
        }

        function findSwingPoints(candles, lookback) {
            const swings = [];
            for (let i = lookback; i < candles.length - lookback; i++) {
                let isHigh = true;
                let isLow = true;
                for (let j = 1; j <= lookback; j++) {
                    if (candles[i].high < candles[i - j].high || candles[i].high < candles[i + j].high) isHigh = false;
                    if (candles[i].low > candles[i - j].low || candles[i].low > candles[i + j].low) isLow = false;
                }
                if (isHigh) swings.push({ index: i, time: candles[i].time, price: candles[i].high, type: 'high' });
                if (isLow) swings.push({ index: i, time: candles[i].time, price: candles[i].low, type: 'low' });
            }
            swings.sort((a, b) => a.time - b.time);
            return swings;
        }

        function determineTrend(swings) {
            const highs = swings.filter(s => s.type === 'high');
            const lows = swings.filter(s => s.type === 'low');
            if (highs.length < 2 || lows.length < 2) return 'range';
            const lastHighs = highs.slice(-3);
            const lastLows = lows.slice(-3);
            console.log('Trend detection — highs:', lastHighs.map(h => h.price), 'lows:', lastLows.map(l => l.price));
            if (lastHighs.length >= 2 && lastLows.length >= 2) {
                const hLen = lastHighs.length;
                const lLen = lastLows.length;
                // Check last pair of highs and lows
                const lastHH = lastHighs[hLen - 1].price > lastHighs[hLen - 2].price;
                const lastHL = lastLows[lLen - 1].price > lastLows[lLen - 2].price;
                const lastLH = lastHighs[hLen - 1].price < lastHighs[hLen - 2].price;
                const lastLL = lastLows[lLen - 1].price < lastLows[lLen - 2].price;
                // If 3 points available, use scoring; otherwise use last pair
                if (hLen >= 3 && lLen >= 3) {
                    const hhCount = (lastHighs[1].price > lastHighs[0].price ? 1 : 0) + (lastHighs[2].price > lastHighs[1].price ? 1 : 0);
                    const hlCount = (lastLows[1].price > lastLows[0].price ? 1 : 0) + (lastLows[2].price > lastLows[1].price ? 1 : 0);
                    const lhCount = (lastHighs[1].price < lastHighs[0].price ? 1 : 0) + (lastHighs[2].price < lastHighs[1].price ? 1 : 0);
                    const llCount = (lastLows[1].price < lastLows[0].price ? 1 : 0) + (lastLows[2].price < lastLows[1].price ? 1 : 0);
                    // Relaxed: need at least 1 of 2 matches for both highs and lows
                    if (hhCount >= 1 && hlCount >= 1) return 'up';
                    if (lhCount >= 1 && llCount >= 1) return 'down';
                } else {
                    if (lastHH && lastHL) return 'up';
                    if (lastLH && lastLL) return 'down';
                }
            }
            return 'range';
        }

        function segmentSwings(swings, trend) {
            if (swings.length < 2) return [];
            const alternating = [swings[0]];
            for (let i = 1; i < swings.length; i++) {
                const last = alternating[alternating.length - 1];
                if (swings[i].type === last.type) {
                    if (swings[i].type === 'high' && swings[i].price > last.price) alternating[alternating.length - 1] = swings[i];
                    else if (swings[i].type === 'low' && swings[i].price < last.price) alternating[alternating.length - 1] = swings[i];
                } else {
                    alternating.push(swings[i]);
                }
            }
            const segments = [];
            for (let i = 0; i < alternating.length - 1; i++) {
                const from = alternating[i];
                const to = alternating[i + 1];
                let segType;
                if (trend === 'up') segType = (from.type === 'low' && to.type === 'high') ? 'impulse' : 'correction';
                else if (trend === 'down') segType = (from.type === 'high' && to.type === 'low') ? 'impulse' : 'correction';
                else segType = (i % 2 === 0) ? 'impulse' : 'correction';
                segments.push({
                    startTime: from.time, startPrice: from.price,
                    endTime: to.time, endPrice: to.price,
                    type: segType,
                    size: Math.abs(to.price - from.price),
                });
            }
            return segments;
        }

        function checkReversal(impulses) {
            const corrections = impulses.filter(s => s.type === 'correction');
            const imps = impulses.filter(s => s.type === 'impulse');
            if (corrections.length === 0 || imps.length === 0) return { reversal: false, reason: 'Недостаточно данных' };
            const lastCorr = corrections[corrections.length - 1];
            const lastImp = imps[imps.length - 1];
            if (lastCorr.size > lastImp.size) return { reversal: true, reason: `Корр > Имп` };
            return { reversal: false, reason: 'Тренд продолжается' };
        }

        function constructLevels(impulses, trend, swings) {
            const imps = impulses.filter(s => s.type === 'impulse');
            if (imps.length === 0) return {};
            const lastImp = imps[imps.length - 1];
            const impulseEnd = lastImp.endPrice;
            const impulseStart = lastImp.startPrice;
            let target = null;
            const relevantSwings = trend === 'up'
                ? swings.filter(s => s.type === 'high' && s.price > impulseEnd)
                : swings.filter(s => s.type === 'low' && s.price < impulseEnd);
            if (relevantSwings.length > 0) {
                relevantSwings.sort((a, b) => trend === 'up' ? a.price - b.price : b.price - a.price);
                target = relevantSwings[0].price;
            } else {
                const size = Math.abs(impulseEnd - impulseStart);
                target = trend === 'up' ? impulseEnd + size : impulseEnd - size;
            }
            return { impulseEnd, impulseStart, target };
        }

        function detectSlom(m30Candles, trendDir, h1Levels) {
            if (!h1Levels.impulseEnd) return null;
            const m30Swings = findSwingPoints(m30Candles, 4);
            if (m30Swings.length < 4) return null;
            const recentSwings = m30Swings.slice(-10);
            const microHighs = recentSwings.filter(s => s.type === 'high');
            const microLows = recentSwings.filter(s => s.type === 'low');
            if (microHighs.length < 2 || microLows.length < 2) return null;
            const lastMicroHighs = microHighs.slice(-2);
            const lastMicroLows = microLows.slice(-2);
            let signal1 = null, signal2 = null, signal3 = null;

            if (trendDir === 'up') {
                const microTop = lastMicroHighs[lastMicroHighs.length - 1];
                const breakLevel = lastMicroHighs[lastMicroHighs.length - 2].price;
                if (microTop.price > breakLevel) {
                    signal1 = { price: breakLevel, time: microTop.time, label: `пробой ${breakLevel.toFixed(4)}` };
                    const pullbackZone = breakLevel + (microTop.price - breakLevel) * 0.5;
                    for (let i = microTop.index + 1; i < m30Candles.length; i++) {
                        if (m30Candles[i].low <= pullbackZone && m30Candles[i].low >= breakLevel * 0.999) {
                            signal2 = { price: m30Candles[i].low, time: m30Candles[i].time, label: `откат к ${m30Candles[i].low.toFixed(4)}` };
                            break;
                        }
                    }
                    if (signal2) {
                        for (let i = m30Candles.findIndex(c => c.time >= signal2.time) + 1; i < m30Candles.length; i++) {
                            if (m30Candles[i].high > microTop.price) {
                                signal3 = { price: m30Candles[i].high, time: m30Candles[i].time, label: `пробой ${microTop.price.toFixed(4)}` };
                                break;
                            }
                        }
                    }
                }
            } else if (trendDir === 'down') {
                const microBottom = lastMicroLows[lastMicroLows.length - 1];
                const breakLevel = lastMicroLows[lastMicroLows.length - 2].price;
                if (microBottom.price < breakLevel) {
                    signal1 = { price: breakLevel, time: microBottom.time, label: `пробой ${breakLevel.toFixed(4)}` };
                    const pullbackZone = breakLevel - (breakLevel - microBottom.price) * 0.5;
                    for (let i = microBottom.index + 1; i < m30Candles.length; i++) {
                        if (m30Candles[i].high >= pullbackZone && m30Candles[i].high <= breakLevel * 1.001) {
                            signal2 = { price: m30Candles[i].high, time: m30Candles[i].time, label: `откат к ${m30Candles[i].high.toFixed(4)}` };
                            break;
                        }
                    }
                    if (signal2) {
                        for (let i = m30Candles.findIndex(c => c.time >= signal2.time) + 1; i < m30Candles.length; i++) {
                            if (m30Candles[i].low < microBottom.price) {
                                signal3 = { price: m30Candles[i].low, time: m30Candles[i].time, label: `пробой ${microBottom.price.toFixed(4)}` };
                                break;
                            }
                        }
                    }
                }
            }
            if (!signal1) return null;
            return { signal1, signal2: signal2 || null, signal3: signal3 || null, complete: !!(signal1 && signal2 && signal3) };
        }

        function computeEntry(slom, levels, trend) {
            if (!slom || !slom.signal2 || !levels.target) return null;
            const entry = slom.signal2.price;
            let stop, take;
            if (trend === 'up') {
                stop = slom.signal1.price - Math.abs(slom.signal2.price - slom.signal1.price) * 0.5;
                take = levels.target;
            } else {
                stop = slom.signal1.price + Math.abs(slom.signal2.price - slom.signal1.price) * 0.5;
                take = levels.target;
            }
            const riskPerUnit = Math.abs(entry - stop);
            const profitPerUnit = Math.abs(take - entry);
            const rr = profitPerUnit / riskPerUnit;
            const positionSize = MAX_RISK / riskPerUnit;
            const potentialProfit = positionSize * profitPerUnit;
            const potentialLoss = MAX_RISK;

            const base = { entry, stop, take, rr, direction: trend, positionSize, potentialProfit, potentialLoss };
            if (rr < 3.0) return { ...base, valid: false, reason: `R:R ${rr.toFixed(2)} < 3.0` };
            return { ...base, valid: true, reason: `R:R = ${rr.toFixed(2)}` };
        }

        // --- Rate-limited fetch ---
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function fetchWithTimeout(url, options = {}, timeoutMs = 30000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);
            return fetch(url, { ...options, signal: controller.signal })
                .finally(() => clearTimeout(timer));
        }

        // Convert "EUR/USD" → "EURUSD"
        function pairConcat(symbol) {
            return symbol.replace('/', '');
        }

        // --- Twelve Data ---
        async function fetchTwelveData(symbol, interval) {
            const size = interval === '1h' ? 200 : 150;
            const url = `https://api.twelvedata.com/time_series?symbol=${symbol}&interval=${interval}&outputsize=${size}&apikey=${getApiKey('twelvedata')}`;
            const res = await fetchWithTimeout(url);
            const data = await res.json();
            if (data.status === 'ok' && data.values) {
                return data.values.reverse().map(v => ({
                    time: parseDatetime(v.datetime),
                    open: parseFloat(v.open),
                    high: parseFloat(v.high),
                    low: parseFloat(v.low),
                    close: parseFloat(v.close),
                }));
            }
            if (data.code === 429) throw new Error('Rate limit (429)');
            return [];
        }

        // --- TraderMade ---
        async function fetchTraderMade(symbol, interval) {
            const pair = pairConcat(symbol);
            // interval: "1h" → hourly, "30min" → minute period=30
            let tmInterval, tmPeriod = '';
            if (interval === '1h') {
                tmInterval = 'hourly';
            } else if (interval === '30min') {
                tmInterval = 'minute';
                tmPeriod = '&period=30';
            } else {
                tmInterval = 'daily';
            }
            // TraderMade: hourly max 2 months, minute max 5 days
            const now = new Date();
            const daysBack = tmInterval === 'minute' ? 4 : 30;
            const from = new Date(now.getTime() - daysBack * 86400000);
            const startDate = from.toISOString().slice(0, 10);
            const endDate = now.toISOString().slice(0, 10);
            const url = `https://marketdata.tradermade.com/api/v1/timeseries?currency=${pair}&api_key=${getApiKey('tradermade')}&start_date=${startDate}&end_date=${endDate}&interval=${tmInterval}${tmPeriod}&format=records`;
            const res = await fetchWithTimeout(url);
            const data = await res.json();
            if (data.quotes && Array.isArray(data.quotes)) {
                return data.quotes.map(q => ({
                    time: parseDatetime(q.date),
                    open: parseFloat(q.open),
                    high: parseFloat(q.high),
                    low: parseFloat(q.low),
                    close: parseFloat(q.close),
                }));
            }
            if (data.error || (data.errors && data.errors.length > 0)) {
                const msg = data.error || data.errors[0]?.message || 'API error';
                if (msg.includes('rate') || msg.includes('limit') || msg.includes('429')) throw new Error('Rate limit (429)');
                throw new Error(msg);
            }
            return [];
        }

        // --- Polygon.io ---
        async function fetchPolygon(symbol, interval) {
            const ticker = 'C:' + pairConcat(symbol);
            // interval: "1h" → 1/hour, "30min" → 30/minute
            let multiplier, timespan;
            if (interval === '1h') {
                multiplier = 1; timespan = 'hour';
            } else if (interval === '30min') {
                multiplier = 30; timespan = 'minute';
            } else {
                multiplier = 1; timespan = 'day';
            }
            const now = new Date();
            const from = new Date(now.getTime() - 60 * 86400000); // 60 days back
            const fromDate = from.toISOString().slice(0, 10);
            const toDate = now.toISOString().slice(0, 10);
            const url = `https://api.polygon.io/v2/aggs/ticker/${ticker}/range/${multiplier}/${timespan}/${fromDate}/${toDate}?adjusted=true&sort=asc&limit=5000&apiKey=${getApiKey('polygon')}`;
            const res = await fetchWithTimeout(url);
            const data = await res.json();
            if (data.status === 'OK' && data.results) {

                    time: Math.floor(r.t / 1000), // ms → sec
                    open: r.o,
                    high: r.h,
                    low: r.l,
                    close: r.c,
                }));
            }
            if (data.status === 'ERROR') {
                const msg = data.error || data.message || 'API error';
                if (msg.includes('rate') || msg.includes('limit')) throw new Error('Rate limit (429)');

        // --- FCS API ---
        async function fetchFcsApi(symbol, interval) {
            const period = interval === '1h' ? '1h' : interval === '30min' ? '30m' : '1h';
            const url = `https://fcsapi.com/api-v3/forex/history?symbol=${symbol}&period=${period}&access_key=${getApiKey('fcsapi')}`;
            const res = await fetchWithTimeout(url);
            const data = await res.json();
            console.log('FCS API raw response:', JSON.stringify(data).substring(0, 1000));
            console.log('FCS API keys:', Object.keys(data), 'response type:', typeof data.response, 'response value:', data.response);
            // Check for real API errors (not "Successfully" with empty response)
            const isError = data.code === 101 || data.code === 102 ||
                String(data.status).toLowerCase() === 'false' || data.status === 0;
            if (isError) {
                throw new Error(data.msg || data.message || 'FCS API error');
            }
            // Try to find candle data in any top-level field
            let candles = data.response || data.data || data.results || data.candles;
            if (!candles) {
                // Maybe the data itself is the array or candles are under another key
                const candidateKeys = Object.keys(data).filter(k => !['status','msg','message','code','info','s'].includes(k));
                for (const k of candidateKeys) {
                    const val = data[k];
                    if (val && (Array.isArray(val) || (typeof val === 'object' && Object.keys(val).length > 0))) {
                        candles = val;
                        console.log('FCS API: found data under key:', k);
                        break;
                    }
                }
            }
            if (!candles) throw new Error('FCS API: нет данных. Ответ: ' + JSON.stringify(data).substring(0, 200));
            if (candles && !Array.isArray(candles)) candles = Object.values(candles);
            if (!candles || candles.length === 0) throw new Error('Нет данных от FCS API');
            const first = candles[0];
            console.log('FCS API first candle:', JSON.stringify(first));
            // FCS API may use o/h/l/c or open/high/low/close
            const oField = first.o !== undefined ? 'o' : first.open !== undefined ? 'open' : null;
            const hField = first.h !== undefined ? 'h' : first.high !== undefined ? 'high' : null;
            const lField = first.l !== undefined ? 'l' : first.low !== undefined ? 'low' : null;
            const cField = first.c !== undefined ? 'c' : first.close !== undefined ? 'close' : null;
            if (!oField) throw new Error('FCS API: неизвестный формат свечей: ' + Object.keys(first).join(','));
            return candles.map(q => ({
                time: parseInt(q.t) || parseDatetime(q.tm) || Math.floor(new Date(q.tm || q.time || q.date).getTime() / 1000),
                open: parseFloat(q[oField]), high: parseFloat(q[hField]),
                low: parseFloat(q[lField]), close: parseFloat(q[cField]),
            }));
        }

        // --- Universal fetch with retry ---
        async function fetchTimeSeries(symbol, interval, retries = 3) {
            const source = getDataSource();
            const fetchFns = {
                twelvedata: fetchTwelveData, tradermade: fetchTraderMade,
                polygon: fetchPolygon, finnhub: fetchFinnhub,
                fcsapi: fetchFcsApi, alphavantage: fetchAlphaVantage,
                oanda: fetchOanda,
            };
            const fetchFn = fetchFns[source] || fetchTwelveData;
            for (let attempt = 0; attempt <= retries; attempt++) {
                try {
                    return await fetchFn(symbol, interval);
                } catch (err) {
                    if (attempt < retries) {
                        const isTimeout = err.name === 'AbortError';
                        const isRateLimit = err.message.includes('429');
                        const isNetwork = err.message.includes('Failed to fetch') || err.message.includes('NetworkError');
                        if (isTimeout || isRateLimit || isNetwork) {
                            const waitSec = isRateLimit ? 15 : 5;
                            const reason = isTimeout ? 'Таймаут' : isRateLimit ? 'Rate limit' : 'Сеть';
                            statusText.textContent = `${reason} — повтор через ${waitSec}с (попытка ${attempt + 2}/${retries + 1})...`;
                            addScanLog(symbol, `${reason}: ${err.message} — повтор...`, 'warn');
                            await delay(waitSec * 1000);
                            continue;
                        }
                    }
                    throw err;
                }
            }
            return [];
        }

        // --- Analyze a single pair ---
        function analyzePair(h1Candles, m30Candles) {
            const result = {
                trend: 'range', phase: '—',
                lastImpSize: null, lastCorrSize: null,
                reversal: false, reversalReason: '',
                s1: false, s2: false, s3: false,
                entry: null, rr: null,
                // Detailed data for tooltip
                swingHighs: [], swingLows: [],
                swingCount: 0,
                lastImp: null, lastCorr: null,
                levels: {},
                slom: null,
                h1Count: h1Candles.length,
                m30Count: m30Candles.length,
            };

            if (h1Candles.length < 20) return result;

            const swings = findSwingPoints(h1Candles, 5);
            result.swingCount = swings.length;
            if (swings.length < 4) return result;

            result.swingHighs = swings.filter(s => s.type === 'high').slice(-3).map(s => s.price);
            result.swingLows = swings.filter(s => s.type === 'low').slice(-3).map(s => s.price);

            result.trend = determineTrend(swings);
            const impulses = segmentSwings(swings, result.trend);

            if (impulses.length > 0) {
                const lastSeg = impulses[impulses.length - 1];
                result.phase = lastSeg.type === 'impulse' ? 'Импульс' : 'Коррекция';

                const imps = impulses.filter(s => s.type === 'impulse');
                const corrs = impulses.filter(s => s.type === 'correction');
                if (imps.length > 0) {
                    result.lastImpSize = imps[imps.length - 1].size;
                    result.lastImp = imps[imps.length - 1];
                }
                if (corrs.length > 0) {
                    result.lastCorrSize = corrs[corrs.length - 1].size;
                    result.lastCorr = corrs[corrs.length - 1];
                }

                const rev = checkReversal(impulses);
                result.reversal = rev.reversal;
                result.reversalReason = rev.reason;
            }

            if (result.trend !== 'range') {
                const levels = constructLevels(impulses, result.trend, swings);
                result.levels = levels;

                if (m30Candles.length > 20) {
                    const slom = detectSlom(m30Candles, result.trend, levels);
                    result.slom = slom;
                    if (slom) {
                        result.s1 = !!slom.signal1;
                        result.s2 = !!slom.signal2;
                        result.s3 = !!slom.signal3;

                        if (slom.signal2) {
                            const entry = computeEntry(slom, levels, result.trend);
                            if (entry) {
                                result.entry = entry;
                                result.rr = entry.rr;
                            }
                        }
                    }
                }
            }

            result.swings = swings;
            result.impulses = impulses;

            return result;
        }

        function formatMoney(val) {
            return val.toLocaleString('ru-RU', { maximumFractionDigits: 0 }) + ' ₽';
        }

        function formatPrice(val) {
            if (val == null) return '—';
            return val >= 10 ? val.toFixed(2) : val.toFixed(5);
