        // --- Render table row ---
        function renderRow(pair, result, isScanning) {
            const trendIcon = result.trend === 'up' ? '↑' : result.trend === 'down' ? '↓' : '↔';
            const trendClass = result.trend === 'up' ? 'up' : result.trend === 'down' ? 'down' : 'neutral';

            const scanningLabel = isScanning
                ? `<span class="scanning-pair"><span class="spinner-inline"></span>${pair}</span>`
                : pair;

            const e = result.entry;
            const hasValid = e && e.valid;

            let verdictHtml, dirHtml, entryHtml, stopHtml, takeHtml, rrHtml, sizeHtml, riskProfitHtml;

            if (hasValid) {
                verdictHtml = '<span class="verdict-ok">Вход возможен</span>';
                const dir = e.direction === 'up' ? 'LONG' : 'SHORT';
                const cls = e.direction === 'up' ? 'entry-long' : 'entry-short';
                dirHtml = `<span class="${cls}">${dir}</span>`;
                entryHtml = `<span class="val">${formatPrice(e.entry)}</span>`;
                stopHtml = `<span class="down">${formatPrice(e.stop)}</span>`;
                takeHtml = `<span class="up">${formatPrice(e.take)}</span>`;
                rrHtml = `<span class="rr-good">1:${e.rr.toFixed(1)}</span>`;
                sizeHtml = `<span class="val">${e.positionSize.toFixed(2)}</span>`;
                riskProfitHtml = `<span class="down">${formatMoney(e.potentialLoss)}</span> / <span class="up">${formatMoney(e.potentialProfit)}</span>`;
            } else if (e) {
                // Entry computed but invalid (R:R too low) — show data in muted style
                verdictHtml = `<span class="verdict-no">Нет входа — ${e.reason}</span>`;
                const dir = e.direction === 'up' ? 'LONG' : 'SHORT';
                dirHtml = `<span class="neutral">${dir}</span>`;
                entryHtml = `<span class="neutral">${formatPrice(e.entry)}</span>`;
                stopHtml = `<span class="neutral">${formatPrice(e.stop)}</span>`;
                takeHtml = `<span class="neutral">${formatPrice(e.take)}</span>`;
                rrHtml = `<span class="neutral">1:${e.rr.toFixed(1)}</span>`;
                sizeHtml = `<span class="neutral">${e.positionSize.toFixed(2)}</span>`;
                riskProfitHtml = `<span class="neutral">${formatMoney(e.potentialLoss)} / ${formatMoney(e.potentialProfit)}</span>`;
            } else {
                const reason = result.trend === 'range' ? 'Нет тренда' : 'Нет сигнала';
                verdictHtml = `<span class="verdict-no">Нет входа — ${reason}</span>`;
                dirHtml = '<span class="neutral">—</span>';
                entryHtml = '<span class="neutral">—</span>';
                stopHtml = '<span class="neutral">—</span>';
                takeHtml = '<span class="neutral">—</span>';
                rrHtml = '<span class="neutral">—</span>';
                sizeHtml = '<span class="neutral">—</span>';
                riskProfitHtml = '<span class="neutral">—</span>';
            }

            const rowClass = hasValid ? (e.direction === 'up' ? ' signal-long' : ' signal-short') : '';
            const clickAction = hasValid ? `onclick="toggleTradePlan('${pair}')"` : `onclick="openChart('${pair}')"`;

            let html = `<tr class="clickable${rowClass}" data-pair="${pair}" ${clickAction} onmouseenter="pairMouseEnter('${pair}', event)" onmousemove="pairMouseMove(event)" onmouseleave="pairMouseLeave()">
                <td class="val">${scanningLabel}</td>
                <td><span class="${trendClass}">${trendIcon}</span></td>
                <td>${verdictHtml}</td>
                <td>${dirHtml}</td>
                <td>${entryHtml}</td>
                <td>${stopHtml}</td>
                <td>${takeHtml}</td>
                <td>${rrHtml}</td>
                <td>${sizeHtml}</td>
                <td>${riskProfitHtml}</td>
                <td class="neutral scan-time" onclick="event.stopPropagation(); toggleHistory('${pair}')" title="Показать историю">${result.scanTime ? new Date(result.scanTime).toLocaleTimeString() : '—'}</td>
                <td><button class="chart-btn" onclick="event.stopPropagation(); openChart('${pair}', ${hasValid})" title="Открыть график">📈</button></td>
            </tr>`;

            // Add hidden history row
            html += renderHistoryRow(pair);

            // Add hidden trade plan row for valid entries
            if (hasValid) {
                html += `<tr class="trade-plan-row hidden" id="plan-${pair.replace('/', '-')}">
                    <td colspan="12">
                        <div class="trade-plan">
                            <div class="trade-plan-item">
                                <span class="label">Направление</span>
                                <span class="value ${e.direction === 'up' ? 'up' : 'down'}">${e.direction === 'up' ? 'LONG ↑' : 'SHORT ↓'}</span>
                            </div>
                            <div class="trade-plan-item">
                                <span class="label">Цена входа</span>
                                <span class="value">${formatPrice(e.entry)}</span>
                            </div>
                            <div class="trade-plan-item">
                                <span class="label">Стоп-лосс</span>
                                <span class="value down">${formatPrice(e.stop)}</span>
                            </div>
                            <div class="trade-plan-item">
                                <span class="label">Тейк-профит</span>
                                <span class="value up">${formatPrice(e.take)}</span>
                            </div>
                            <div class="trade-plan-item">
                                <span class="label">R:R</span>
                                <span class="value rr-good">1:${e.rr.toFixed(1)}</span>
                            </div>
                            <div class="trade-plan-item">
                                <span class="label">Размер позиции</span>
                                <span class="value">${e.positionSize.toFixed(2)}</span>
                            </div>
                            <div class="trade-plan-item">
                                <span class="label">Риск</span>
                                <span class="value down">${formatMoney(e.potentialLoss)}</span>
                            </div>
                            <div class="trade-plan-item">
                                <span class="label">Потенц. прибыль</span>
                                <span class="value up">${formatMoney(e.potentialProfit)}</span>
                            </div>
                            <div class="trade-plan-item">
                                <span class="label">Депозит</span>
                                <span class="value">${formatMoney(DEPOSIT)}</span>
                            </div>
                            <div class="trade-plan-item">
                                <span class="label">Риск на сделку</span>
                                <span class="value">${(RISK_PCT * 100).toFixed(0)}% = ${formatMoney(MAX_RISK)}</span>
                            </div>
                        </div>
                        <div id="minichart-${pair.replace('/', '-')}" class="mini-chart-container"></div>
                    </td>
                </tr>`;
            }

            return html;
        }

        // --- Render mini chart in trade plan ---
        function renderMiniChart(pair) {
            const data = pairChartData[pair];
            if (!data) return;

            const containerId = 'minichart-' + pair.replace('/', '-');
            const container = document.getElementById(containerId);
            if (!container) return;

            const chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 250,
                layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: '#2a2e39' },
                timeScale: { borderColor: '#2a2e39', timeVisible: true },
            });

            // Candlestick series
            const candleSeries = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350',
                borderUpColor: '#26a69a', borderDownColor: '#ef5350',
                wickUpColor: '#26a69a', wickDownColor: '#ef5350',
            });
            candleSeries.setData(data.m30Candles);

            // Build M30 time index for snapping H1 swing times
            const m30Times = data.m30Candles.map(c => c.time);
            function snapToM30(t) {
                let best = m30Times[0], bestDiff = Math.abs(t - m30Times[0]);
                for (const mt of m30Times) {
                    const diff = Math.abs(t - mt);
                    if (diff < bestDiff) { best = mt; bestDiff = diff; }
                }
                return best;
            }

            const markers = [];

            // Swing markers
            for (const sw of data.swings) {
                const fp = sw.price >= 10 ? sw.price.toFixed(2) : sw.price.toFixed(5);
                markers.push({
                    time: snapToM30(sw.time),
                    position: sw.type === 'high' ? 'aboveBar' : 'belowBar',
                    color: '#ffeb3b',
                    shape: sw.type === 'high' ? 'arrowDown' : 'arrowUp',
                    size: 1,
                    text: fp,
                });
            }

            // SLOM markers
            if (data.slom) {
                if (data.slom.signal1) {
                    markers.push({
                        time: data.slom.signal1.time,
                        position: 'belowBar', color: '#2962ff', shape: 'circle', size: 2, text: 'S1',
                    });
                }
                if (data.slom.signal2) {
                    markers.push({
                        time: data.slom.signal2.time,
                        position: 'belowBar', color: '#ff9800', shape: 'circle', size: 2, text: 'S2',
                    });
                }
                if (data.slom.signal3) {
                    markers.push({
                        time: data.slom.signal3.time,
                        position: 'belowBar', color: '#00e676', shape: 'circle', size: 2, text: 'S3',
                    });
                }
            }

            // Entry + R:R markers
            if (data.entry && data.entry.valid && data.slom && data.slom.signal2) {
                markers.push({
                    time: data.slom.signal2.time,
                    position: data.entry.direction === 'up' ? 'belowBar' : 'aboveBar',
                    color: '#00e676',
                    shape: data.entry.direction === 'up' ? 'arrowUp' : 'arrowDown',
                    size: 3, text: 'ENTRY',
                });
                markers.push({
                    time: data.slom.signal2.time + 1800,
                    position: data.entry.direction === 'up' ? 'belowBar' : 'aboveBar',
                    color: '#ffeb3b', shape: 'square', size: 2,
                    text: `R:R ${data.entry.rr.toFixed(1)}`,
                });
            }

            // Trend marker on last swing
            if (data.trend && data.swings.length > 0) {
                const lastSwing = data.swings[data.swings.length - 1];
                markers.push({
                    time: snapToM30(lastSwing.time),
                    position: 'aboveBar',
                    color: data.trend === 'up' ? '#00e676' : '#ef5350',
                    shape: 'square', size: 2,
                    text: data.trend === 'up' ? 'TREND ↑' : 'TREND ↓',
                });
            }

            // Sort markers by time (required by lightweight-charts)
            markers.sort((a, b) => a.time - b.time);
            candleSeries.setMarkers(markers);

            // Impulse/correction line segments
            const segmentSeries = [];
            for (const seg of data.impulses) {
                const isImpulse = seg.type === 'impulse';
                const series = chart.addLineSeries({
                    color: isImpulse ? '#2962ff' : '#ff9800',
                    lineWidth: isImpulse ? 3 : 2,
                    lineStyle: isImpulse ? LightweightCharts.LineStyle.Solid : LightweightCharts.LineStyle.Dashed,
                    lastValueVisible: false, priceLineVisible: false, crosshairMarkerVisible: false,
                });
                series.setData([
                    { time: snapToM30(seg.startTime), value: seg.startPrice },
                    { time: snapToM30(seg.endTime), value: seg.endPrice },
                ]);
                segmentSeries.push(series);
            }

            // H1 Levels as price lines
            const levels = data.levels;
            if (levels.impulseEnd != null) {
                candleSeries.createPriceLine({
                    price: levels.impulseEnd, color: '#e040fb', lineWidth: 2,
                    lineStyle: LightweightCharts.LineStyle.Solid, axisLabelVisible: true, title: 'Конец имп.',
                });
            }
            if (levels.impulseStart != null) {
                candleSeries.createPriceLine({
                    price: levels.impulseStart, color: '#e040fb', lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Solid, axisLabelVisible: true, title: 'Начало имп.',
                });
            }
            if (levels.target != null) {
                candleSeries.createPriceLine({
                    price: levels.target, color: '#00e676', lineWidth: 2,
                    lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: true, title: 'Цель',
                });
            }

            // Entry/stop/take price lines + zones + trajectory
            if (data.entry && data.entry.valid && data.slom && data.slom.signal2) {
                candleSeries.createPriceLine({
                    price: data.entry.entry, color: '#ffeb3b', lineWidth: 2,
                    lineStyle: LightweightCharts.LineStyle.Solid, axisLabelVisible: true,
                    title: `▶ Entry ${data.entry.entry.toFixed(4)}`,
                });
                candleSeries.createPriceLine({
                    price: data.entry.stop, color: '#ef5350', lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: 'Stop',
                });
                candleSeries.createPriceLine({
                    price: data.entry.take, color: '#00e676', lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: 'Take',
                });

                const isLong = data.entry.direction === 'up';
                const entryPrice = data.entry.entry;
                const takePrice = data.entry.take;
                const stopPrice = data.entry.stop;
                const s2Time = data.slom.signal2.time;
                const lastCandle = data.m30Candles[data.m30Candles.length - 1];
                const endTime = lastCandle ? lastCandle.time : s2Time + 7200;

                // Profit zone
                const profitSeries = chart.addAreaSeries({
                    topColor: isLong ? 'rgba(0,230,118,0.12)' : 'rgba(0,230,118,0.0)',
                    bottomColor: isLong ? 'rgba(0,230,118,0.0)' : 'rgba(0,230,118,0.12)',
                    lineColor: 'rgba(0,0,0,0)', lineWidth: 0,
                    lastValueVisible: false, priceLineVisible: false, crosshairMarkerVisible: false,
                });
                profitSeries.setData([
                    { time: s2Time, value: isLong ? takePrice : entryPrice },
                    { time: endTime, value: isLong ? takePrice : entryPrice },
                ]);
                segmentSeries.push(profitSeries);

                const profitBase = chart.addLineSeries({
                    color: 'rgba(0,0,0,0)', lineWidth: 0,
                    lastValueVisible: false, priceLineVisible: false, crosshairMarkerVisible: false,
                });
                profitBase.setData([
                    { time: s2Time, value: isLong ? entryPrice : takePrice },
                    { time: endTime, value: isLong ? entryPrice : takePrice },
                ]);
                segmentSeries.push(profitBase);

                // Risk zone
                const riskSeries = chart.addAreaSeries({
                    topColor: isLong ? 'rgba(239,83,80,0.0)' : 'rgba(239,83,80,0.12)',
                    bottomColor: isLong ? 'rgba(239,83,80,0.12)' : 'rgba(239,83,80,0.0)',
                    lineColor: 'rgba(0,0,0,0)', lineWidth: 0,
                    lastValueVisible: false, priceLineVisible: false, crosshairMarkerVisible: false,
                });
                riskSeries.setData([
                    { time: s2Time, value: isLong ? entryPrice : stopPrice },
                    { time: endTime, value: isLong ? entryPrice : stopPrice },
                ]);
                segmentSeries.push(riskSeries);

                const riskBase = chart.addLineSeries({
                    color: 'rgba(0,0,0,0)', lineWidth: 0,
                    lastValueVisible: false, priceLineVisible: false, crosshairMarkerVisible: false,
                });
                riskBase.setData([
                    { time: s2Time, value: isLong ? stopPrice : entryPrice },
                    { time: endTime, value: isLong ? stopPrice : entryPrice },
                ]);
                segmentSeries.push(riskBase);

                // Trajectory line
                const currentPrice = lastCandle ? lastCandle.close : entryPrice;
                const pullbackOffset = (entryPrice - stopPrice) * 0.3;
                const pullback = isLong ? entryPrice - pullbackOffset : entryPrice + pullbackOffset;
                const trajColor = isLong ? 'rgba(0,230,118,0.5)' : 'rgba(239,83,80,0.5)';
                const step = 1800;
                const trajSeries = chart.addLineSeries({
                    color: trajColor, lineWidth: 2,
                    lineStyle: LightweightCharts.LineStyle.Dashed,
                    lastValueVisible: false, priceLineVisible: false, crosshairMarkerVisible: false,
                });
                trajSeries.setData([
                    { time: endTime, value: currentPrice },
                    { time: endTime + step, value: entryPrice },
                    { time: endTime + step * 2, value: pullback },
                    { time: endTime + step * 5, value: takePrice },
                ]);
                segmentSeries.push(trajSeries);
            }

            chart.timeScale().fitContent();

            // Responsive resize
            const ro = new ResizeObserver(entries => {
                for (const e of entries) {
                    chart.applyOptions({ width: e.contentRect.width });
                }
            });
            ro.observe(container);

            miniCharts[pair] = { chart, resizeObserver: ro };
        }

        function destroyMiniChart(pair) {
            if (miniCharts[pair]) {
                miniCharts[pair].resizeObserver.disconnect();
                miniCharts[pair].chart.remove();
                delete miniCharts[pair];
            }
        }

        // --- Toggle trade plan visibility ---
        window.toggleTradePlan = function(pair) {
            const planRow = document.getElementById('plan-' + pair.replace('/', '-'));
            if (planRow) {
                const isHidden = planRow.classList.toggle('hidden');
                if (isHidden) {
                    destroyMiniChart(pair);
                } else {
                    setTimeout(() => renderMiniChart(pair), 50);
                }
            }
        };

        function renderHistoryRow(pair) {
            const id = 'history-' + pair.replace('/', '-');
            const entries = scanHistory[pair];
            if (!entries || entries.length === 0) {
                return `<tr class="history-row hidden" id="${id}"><td colspan="12"><span class="neutral">Нет истории</span></td></tr>`;
            }
            const last10 = entries.slice(-10).reverse();
            let tableHtml = `<table class="history-table"><thead><tr><th>Время</th><th>Тренд</th><th>Вердикт</th><th>R:R</th></tr></thead><tbody>`;
            for (const h of last10) {
                const trendIcon = h.trend === 'up' ? '↑' : h.trend === 'down' ? '↓' : '↔';
                const trendClass = h.trend === 'up' ? 'up' : h.trend === 'down' ? 'down' : 'neutral';
                const verdict = h.valid ? '<span class="verdict-ok">Вход</span>' : `<span class="neutral">${h.verdict || 'Нет входа'}</span>`;
                const rr = h.rr ? `1:${h.rr.toFixed(1)}` : '—';
                const rowClass = h.valid ? ' class="history-valid"' : '';
                const time = new Date(h.time).toLocaleTimeString();
                tableHtml += `<tr${rowClass}><td>${time}</td><td><span class="${trendClass}">${trendIcon}</span></td><td>${verdict}</td><td>${rr}</td></tr>`;
            }
            tableHtml += `</tbody></table>`;
            return `<tr class="history-row hidden" id="${id}"><td colspan="12">${tableHtml}</td></tr>`;
        }

        window.toggleHistory = function(pair) {
            const histRow = document.getElementById('history-' + pair.replace('/', '-'));
            if (histRow) {
                histRow.classList.toggle('hidden');
            }
        };

        // --- Scan Log ---
        const scanLogContent = document.getElementById('scanLogContent');
        const scanLogPanel = document.getElementById('scanLogPanel');
        const logBadge = document.getElementById('logBadge');
        let logWarnCount = 0;

        window.toggleScanLog = function() {
            scanLogPanel.classList.toggle('open');
            const hint = document.getElementById('logToggleHint');
            hint.textContent = scanLogPanel.classList.contains('open') ? 'нажмите чтобы закрыть' : 'нажмите чтобы открыть';
            if (scanLogPanel.classList.contains('open')) {
                logWarnCount = 0;
                logBadge.style.display = 'none';
            }
        };

        function addScanLog(pair, message, type) {
            // type: 'info', 'success', 'warn', 'error', 'tg'
            const now = new Date();
            const time = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const entry = document.createElement('div');
            entry.className = `scan-log-entry log-${type || 'info'}`;
            entry.innerHTML = `<span class="log-time">${time}</span><span class="log-pair">${pair || '—'}</span><span class="log-msg">${message}</span>`;
            scanLogContent.prepend(entry);
            // Keep max 100 entries
            while (scanLogContent.children.length > 100) {
                scanLogContent.removeChild(scanLogContent.lastChild);
            }
            // Badge for warnings/errors when panel is closed
            if ((type === 'warn' || type === 'error') && !scanLogPanel.classList.contains('open')) {
                logWarnCount++;
                logBadge.textContent = logWarnCount;
                logBadge.style.display = 'inline';
            }
        }

        // --- Notifications ---
        function requestNotificationPermission() {
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }

        function sendNotification(pair, direction, rr) {
            const key = `${pair}:${direction}`;
            if (notifiedEntries.has(key)) return;
            notifiedEntries.add(key);

            const dir = direction === 'up' ? 'LONG ↑' : 'SHORT ↓';
            const title = `${pair} — ${dir}`;
            const body = `Сигнал входа! R:R = ${rr.toFixed(2)}`;

            // Browser notification
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, { body, icon: '📊' });
            }

            // Audio beep
            playBeep();
        }

        function sendTelegramNotification(pair, result) {
            const settings = JSON.parse(localStorage.getItem('telegramSettings') || '{}');
            if (!settings.botToken || !settings.chatId) {
                addScanLog(pair, 'Telegram: не настроен botToken или chatId — уведомление не отправлено', 'error');
                return;
            }

            const e = result.entry;
            const dir = e.direction === 'up' ? 'LONG ↑' : 'SHORT ↓';
            const fp = (v) => v >= 10 ? v.toFixed(2) : v.toFixed(5);

            const chartUrl = `https://trader.kachestvobiz-ai.ru/index.html?pair=${encodeURIComponent(pair)}&tf=30&analyze=1&dir=${e.direction}&entry=${e.entry}&stop=${e.stop}&take=${e.take}&rr=${e.rr.toFixed(2)}`;

            const text = [
                `📊 *${pair} — ${dir}*`,
                ``,
                `Тренд: ${result.trend === 'up' ? 'Восходящий' : 'Нисходящий'}`,
                `Вход: \`${fp(e.entry)}\``,
                `Стоп: \`${fp(e.stop)}\``,
                `Тейк: \`${fp(e.take)}\``,
                `R:R: *1:${e.rr.toFixed(1)}*`,
                `Размер: ${e.positionSize.toFixed(2)}`,
                `Риск: ${e.potentialLoss.toFixed(0)}₽ → Прибыль: ${e.potentialProfit.toFixed(0)}₽`,
                ``,
                `[📈 Открыть график](${chartUrl})`,
            ].join('\n');

            fetch(`https://api.telegram.org/bot${settings.botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: settings.chatId,
                    text,
                    parse_mode: 'Markdown',
                }),
            }).then(resp => {
                if (resp.ok) {
                    addScanLog(pair, `Telegram: уведомление отправлено (${dir})`, 'tg');
                } else {
                    resp.json().then(data => {
                        addScanLog(pair, `Telegram ошибка ${resp.status}: ${data.description || 'Unknown'}`, 'error');
                    }).catch(() => {
                        addScanLog(pair, `Telegram ошибка: HTTP ${resp.status}`, 'error');
                    });
                }
            }).catch(err => {
                addScanLog(pair, `Telegram сбой: ${err.message}`, 'error');
            });
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 880;
                osc.type = 'sine';
                gain.gain.value = 0.3;
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
                setTimeout(() => {
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.frequency.value = 1100;
                    osc2.type = 'sine';
                    gain2.gain.value = 0.3;
                    osc2.start();
                    osc2.stop(ctx.currentTime + 0.2);
                }, 180);
            } catch {}
        }

        // --- Scanner cycle ---
        const pairResults = {};
        const pairChartData = loadChartDataCache();
        const miniCharts = {};

        function initTableRows() {
            const pairs = getWatchlist();
            // Restore last results from history + cached chart data
            for (const pair of pairs) {
                if (!pairResults[pair] && scanHistory[pair] && scanHistory[pair].length > 0) {
                    const lastEntry = scanHistory[pair][scanHistory[pair].length - 1];
                    const cached = pairChartData[pair];
                    pairResults[pair] = {
                        trend: lastEntry.trend || 'range', phase: '—',
                        lastImpSize: null, lastCorrSize: null,
                        reversal: false, s1: false, s2: false, s3: false,
                        entry: cached ? cached.entry : null,
                        rr: lastEntry.rr || null,
                        scanTime: lastEntry.time,
                        swingHighs: [], swingLows: [], swingCount: 0,
                        lastImp: null, lastCorr: null,
                        levels: cached ? cached.levels : {},
                        slom: cached ? cached.slom : null,
                        h1Count: 0, m30Count: 0,
                    };
                }
            }
            scannerBody.innerHTML = pairs.map(pair => {
                const result = pairResults[pair] || {
                    trend: 'range', phase: '—',
                    lastImpSize: null, lastCorrSize: null,
                    reversal: false, s1: false, s2: false, s3: false,
                    entry: null, rr: null,
                };
                return renderRow(pair, result, false);
            }).join('');
        }

        function updateRowForPair(pair, result, isScanning) {
            const mainRow = scannerBody.querySelector(`tr[data-pair="${pair}"]`);
            if (!mainRow) return;
            destroyMiniChart(pair);
            const planId = 'plan-' + pair.replace('/', '-');
            const histId = 'history-' + pair.replace('/', '-');
            const existingPlan = document.getElementById(planId);
            const existingHist = document.getElementById(histId);
            if (existingPlan) existingPlan.remove();
            if (existingHist) existingHist.remove();
            mainRow.outerHTML = renderRow(pair, result, isScanning);
        }

        async function runScannerCycle() {
            if (!scanning) return;

            const pairs = getWatchlist();
            const source = getDataSource();
            const rateDelay = DATA_SOURCES[source].rateDelay;
            const cycleStart = Date.now();
            notifiedEntries.clear();

            addScanLog('', `Сканирование начато: ${pairs.length} пар [${DATA_SOURCES[source].label}]`, 'info');

            // Check API key
            if (!getApiKey(source)) {
                addScanLog('', `Ошибка: не указан API ключ для ${DATA_SOURCES[source].label}`, 'error');
                statusText.textContent = `Ошибка: не указан API ключ для ${DATA_SOURCES[source].label}`;
                scanning = false;
                scanBtn.disabled = false;
                scanBtn.textContent = 'Сканировать';
                scanBtn.classList.remove('scanning');
                statusDot.classList.remove('active');
                return;
            }

            for (let i = 0; i < pairs.length; i++) {
                if (scanAbort) return;

                const pair = pairs[i];
                statusText.textContent = `[${DATA_SOURCES[source].label}] ${pair} (${i + 1}/${pairs.length})...`;

                // Show scanning indicator
                updateRowForPair(pair, pairResults[pair] || {
                    trend: 'range', phase: '—',
                    lastImpSize: null, lastCorrSize: null,
                    reversal: false, s1: false, s2: false, s3: false,
                    entry: null, rr: null,
                }, true);

                try {
                    // Fetch H1
                    const h1 = await fetchTimeSeries(pair, '1h');
                    if (scanAbort) return;

                    // Wait before next API call
                    await delay(rateDelay);
                    if (scanAbort) return;

                    // Fetch M30
                    const m30 = await fetchTimeSeries(pair, '30min');
                    if (scanAbort) return;

                    // Analyze
                    console.log(`[${pair}] H1 candles: ${h1.length}, M30 candles: ${m30.length}`);
                    const result = analyzePair(h1, m30);
                    console.log(`[${pair}] Analysis:`, JSON.stringify({
                        trend: result.trend, phase: result.phase,
                        reversal: result.reversal, s1: result.s1, s2: result.s2, s3: result.s3,
                        hasEntry: !!result.entry, rr: result.rr,
                        entryDetail: result.entry ? { valid: result.entry.valid, direction: result.entry.direction, reason: result.entry.reason } : null
                    }));
                    result.scanTime = new Date().toISOString();
                    pairResults[pair] = result;

                    // Cache chart data for mini chart
                    if (result.entry && result.entry.valid && result.swings) {
                        pairChartData[pair] = {
                            m30Candles: m30,
                            swings: result.swings,
                            impulses: result.impulses,
                            trend: result.trend,
                            levels: result.levels,
                            slom: result.slom,
                            entry: result.entry,
                        };
                    } else {
                        delete pairChartData[pair];
                    }

                    // Save to history
                    if (!scanHistory[pair]) scanHistory[pair] = [];
                    const e2 = result.entry;
                    scanHistory[pair].push({
                        time: result.scanTime,
                        trend: result.trend,
                        verdict: e2 ? (e2.valid ? 'Вход возможен' : e2.reason) : (result.trend === 'range' ? 'Нет тренда' : 'Нет сигнала'),
                        valid: !!(e2 && e2.valid),
                        entry: e2 ? e2.entry : null,
                        rr: result.rr,
                    });
                    if (scanHistory[pair].length > 20) scanHistory[pair] = scanHistory[pair].slice(-20);
                    saveHistory();

                    // Update row
                    updateRowForPair(pair, result, false);

                    // Log result and notify
                    if (result.entry && result.entry.valid) {
                        addScanLog(pair, `Сигнал найден! ${result.entry.direction === 'up' ? 'LONG' : 'SHORT'}, R:R = ${result.rr.toFixed(2)}`, 'success');
                        sendNotification(pair, result.entry.direction, result.rr);
                        sendTelegramNotification(pair, result);
                    } else if (result.entry && !result.entry.valid) {
                        addScanLog(pair, `Сигнал есть, но ${result.entry.reason} — уведомление не отправлено`, 'warn');
                    } else if (result.trend === 'range') {
                        addScanLog(pair, 'Нет тренда (range)', 'info');
                    } else {
                        addScanLog(pair, `Тренд: ${result.trend}, но нет сигнала входа`, 'info');
                    }

                } catch (err) {
                    console.warn(`Scan error for ${pair}:`, err);
                    addScanLog(pair, `Ошибка: ${err.message}`, 'error');
                    statusText.textContent = `Ошибка ${pair}: ${err.message}`;
                    updateRowForPair(pair, pairResults[pair] || {
                        trend: 'range', phase: '—',
                        lastImpSize: null, lastCorrSize: null,
                        reversal: false, s1: false, s2: false, s3: false,
                        entry: null, rr: null,
                    }, false);
                }

                // Wait between pairs (except after last)
                if (i < pairs.length - 1 && !scanAbort) {
                    await delay(rateDelay);
                }
            }

            if (scanAbort) return;

            saveChartDataCache();

            const elapsed = ((Date.now() - cycleStart) / 1000).toFixed(0);
            const finishTime = new Date().toLocaleTimeString();
            addScanLog('', `Сканирование завершено за ${elapsed}с`, 'info');
            statusText.textContent = `Анализ завершён в ${finishTime} (${elapsed}с)`;
            cycleInfo.textContent = '';
            scanning = false;
            scanBtn.disabled = false;
            scanBtn.textContent = 'Сканировать';
            scanBtn.classList.remove('scanning');
            statusDot.classList.remove('active');
        }

        // --- Scan once (exposed globally) ---
        window.scanOnce = function() {
            if (scanning) return;
            scanning = true;
            scanAbort = false;
            scanBtn.disabled = true;
            scanBtn.textContent = 'Сканирование...';
            scanBtn.classList.add('scanning');
            statusDot.classList.add('active');
            requestNotificationPermission();
            initTableRows();
            runScannerCycle();
        };

        // --- Auto-scan scheduling ---
        const SCHEDULE_STORAGE_KEY = 'scannerSchedule';
        const autoScanToggle = document.getElementById('autoScanToggle');
        const scheduleFrom = document.getElementById('scheduleFrom');
        const scheduleTo = document.getElementById('scheduleTo');
        const scheduleInterval = document.getElementById('scheduleInterval');
        const autoScanStatus = document.getElementById('autoScanStatus');

        let autoScanTimerId = null;
        let countdownTimerId = null;
        let nextScanTime = null;

        function loadScheduleSettings() {
            try {
                const saved = JSON.parse(localStorage.getItem(SCHEDULE_STORAGE_KEY));
                if (saved && typeof saved === 'object') {
                    scheduleFrom.value = saved.from ?? 8;
                    scheduleTo.value = saved.to ?? 20;
                    scheduleInterval.value = saved.interval ?? 1;
                    if (saved.enabled) {
                        autoScanToggle.checked = true;
                        startAutoScan();
                    }
                }
            } catch {}
        }

        window.saveScheduleSettings = function() {
            const settings = {
                from: parseInt(scheduleFrom.value) || 8,
                to: parseInt(scheduleTo.value) || 20,
                interval: parseInt(scheduleInterval.value) || 1,
                enabled: autoScanToggle.checked,
            };
            localStorage.setItem(SCHEDULE_STORAGE_KEY, JSON.stringify(settings));
            // Restart auto-scan if active to apply new settings
            if (autoScanToggle.checked) {
                stopAutoScan();
                startAutoScan();
            }
        };

        function getMoscowHour() {
            const now = new Date();
            // UTC+3 for Moscow
            const mskOffset = 3 * 60;
            const utcMinutes = now.getUTCHours() * 60 + now.getUTCMinutes();
            const mskMinutes = utcMinutes + mskOffset;
            return Math.floor(((mskMinutes % 1440) + 1440) % 1440 / 60);
        }

        function isInTimeWindow() {
            const from = parseInt(scheduleFrom.value) || 8;
            const to = parseInt(scheduleTo.value) || 20;
            const hour = getMoscowHour();
            if (from <= to) {
                return hour >= from && hour < to;
            } else {
                // Overnight window, e.g. 22-06
                return hour >= from || hour < to;
            }
        }

        function getNextScanDelay() {
            const intervalHours = parseInt(scheduleInterval.value) || 1;
            return intervalHours * 60 * 60 * 1000;
        }

        function scheduleNextScan() {
            if (!autoScanToggle.checked) return;

            const delayMs = getNextScanDelay();
            nextScanTime = Date.now() + delayMs;

            autoScanTimerId = setTimeout(() => {
                if (!autoScanToggle.checked) return;
                if (isInTimeWindow()) {
                    if (!scanning) {
                        addScanLog('', 'Авто-скан: запуск по расписанию', 'info');
                        scanOnce();
                        // Wait for scan to finish, then schedule next
                        waitForScanEnd().then(() => scheduleNextScan());
                    } else {
                        addScanLog('', 'Авто-скан: пропуск — сканирование уже идёт', 'warn');
                        scheduleNextScan();
                    }
                } else {
                    addScanLog('', 'Авто-скан: пропуск — вне временного окна', 'info');
                    updateAutoStatus('Вне окна');
                    scheduleNextScan();
                }
            }, delayMs);

            startCountdown();
        }

        function waitForScanEnd() {
            return new Promise(resolve => {
                const check = setInterval(() => {
                    if (!scanning) {
                        clearInterval(check);
                        resolve();
                    }
                }, 1000);
            });
        }

        function startCountdown() {
            if (countdownTimerId) clearInterval(countdownTimerId);
            countdownTimerId = setInterval(() => {
                if (!nextScanTime || !autoScanToggle.checked) {
                    clearInterval(countdownTimerId);
                    return;
                }
                const remaining = Math.max(0, nextScanTime - Date.now());
                const totalSec = Math.floor(remaining / 1000);
                const h = Math.floor(totalSec / 3600);
                const m = Math.floor((totalSec % 3600) / 60);
                const s = totalSec % 60;
                const pad = n => String(n).padStart(2, '0');

                let timeStr;
                if (h > 0) {
                    timeStr = `${h}:${pad(m)}:${pad(s)}`;
                } else {
                    timeStr = `${m}:${pad(s)}`;
                }

                const inWindow = isInTimeWindow();
                if (scanning) {
                    updateAutoStatus('Сканирует...');
                } else if (!inWindow) {
                    updateAutoStatus(`Вне окна · след. ${timeStr}`);
                } else {
                    updateAutoStatus(`След. скан: ${timeStr}`);
                }
                cycleInfo.innerHTML = autoScanToggle.checked
                    ? `<span class="countdown-text">${timeStr}</span>`
                    : '';
            }, 1000);
        }

        function updateAutoStatus(text) {
            autoScanStatus.textContent = text;
        }

        function startAutoScan() {
            updateAutoStatus('Активно');
            // If in time window, run scan immediately
            if (isInTimeWindow() && !scanning) {
                scanOnce();
                waitForScanEnd().then(() => scheduleNextScan());
            } else {
                if (!isInTimeWindow()) {
                    updateAutoStatus('Вне окна');
                }
                scheduleNextScan();
            }
        }

        function stopAutoScan() {
            if (autoScanTimerId) {
                clearTimeout(autoScanTimerId);
                autoScanTimerId = null;
            }
            if (countdownTimerId) {
                clearInterval(countdownTimerId);
                countdownTimerId = null;
            }
            nextScanTime = null;
            cycleInfo.textContent = '';
            updateAutoStatus('Выкл');
        }

        window.toggleAutoScan = function() {
            saveScheduleSettings();
            if (autoScanToggle.checked) {
                startAutoScan();
            } else {
                stopAutoScan();
            }
        };

        // Load schedule settings on page load
        loadScheduleSettings();

        // --- Tooltip ---
        const tooltip = document.getElementById('pairTooltip');
        let tooltipVisible = false;

        function buildTooltipHtml(pair, r) {
            const fp = (v) => v == null ? '—' : (v >= 10 ? v.toFixed(2) : v.toFixed(5));
            const trendLabel = r.trend === 'up' ? 'ВОСХОДЯЩИЙ ↑' : r.trend === 'down' ? 'НИСХОДЯЩИЙ ↓' : 'БОКОВИК ↔';
            const trendClass = r.trend === 'up' ? 'up' : r.trend === 'down' ? 'down' : 'neutral';

            let html = `<div class="tt-title">${pair}</div>`;

            // Step 1: Data
            html += `<h4>Данные</h4>`;
            html += `<div class="tt-row"><span class="tt-label">H1 свечей:</span> <span class="tt-val">${r.h1Count}</span></div>`;
            html += `<div class="tt-row"><span class="tt-label">M30 свечей:</span> <span class="tt-val">${r.m30Count}</span></div>`;
            html += `<div class="tt-row"><span class="tt-label">Свинг-точек:</span> <span class="tt-val">${r.swingCount}</span></div>`;

            // Step 2: Trend
            html += `<h4>Тренд H1</h4>`;
            html += `<div><span class="${trendClass}" style="font-weight:600">${trendLabel}</span></div>`;
            if (r.swingHighs.length > 0) {
                html += `<div class="tt-row"><span class="tt-label">Хаи:</span> <span class="tt-val">${r.swingHighs.map(v => fp(v)).join(' → ')}</span></div>`;
            }
            if (r.swingLows.length > 0) {
                html += `<div class="tt-row"><span class="tt-label">Лоу:</span> <span class="tt-val">${r.swingLows.map(v => fp(v)).join(' → ')}</span></div>`;
            }

            // Step 3: Phase
            html += `<h4>Фаза</h4>`;
            html += `<div><span class="tt-val">${r.phase}</span></div>`;
            if (r.lastImp) {
                const dir = r.lastImp.endPrice > r.lastImp.startPrice ? '+' : '';
                html += `<div class="tt-row"><span class="tt-label">Импульс:</span> <span class="tt-val">${fp(r.lastImp.startPrice)} → ${fp(r.lastImp.endPrice)} (${dir}${fp(r.lastImp.size)})</span></div>`;
            }
            if (r.lastCorr) {
                const dir = r.lastCorr.endPrice > r.lastCorr.startPrice ? '+' : '';
                html += `<div class="tt-row"><span class="tt-label">Коррекция:</span> <span class="tt-val">${fp(r.lastCorr.startPrice)} → ${fp(r.lastCorr.endPrice)} (${dir}${fp(r.lastCorr.size)})</span></div>`;
            }
            html += `<div style="color:#787b86;font-size:11px">${r.reversalReason || ''}</div>`;
            if (r.reversal) {
                html += `<div class="tt-warn">⚠ Сигнал разворота!</div>`;
            }

            // Step 4: Levels
            html += `<h4>Уровни H1</h4>`;
            if (r.levels && r.levels.impulseEnd != null) {
                html += `<div class="tt-row"><span class="tt-label">Конец импульса:</span> <span class="tt-val">${fp(r.levels.impulseEnd)}</span></div>`;
                html += `<div class="tt-row"><span class="tt-label">Начало импульса:</span> <span class="tt-val">${fp(r.levels.impulseStart)}</span></div>`;
                if (r.levels.target != null) {
                    html += `<div class="tt-row"><span class="tt-label">Цель:</span> <span class="tt-val tt-ok">${fp(r.levels.target)}</span></div>`;
                }
            } else {
                html += `<div class="tt-wait">Нет данных</div>`;
            }

            // Step 5: SLOM
            html += `<h4>Слом (M30)</h4>`;
            if (r.slom) {
                const s1 = r.slom.signal1;
                const s2 = r.slom.signal2;
                const s3 = r.slom.signal3;
                html += `<div>Сигнал 1: ${s1 ? `<span class="tt-ok">✓ ${s1.label}</span>` : '<span class="tt-wait">—</span>'}</div>`;
                html += `<div>Сигнал 2: ${s2 ? `<span class="tt-ok">✓ ${s2.label}</span>` : '<span class="tt-wait">ожидание...</span>'}</div>`;
                html += `<div>Сигнал 3: ${s3 ? `<span class="tt-ok">✓ ${s3.label}</span>` : '<span class="tt-wait">ожидание...</span>'}</div>`;
            } else {
                html += `<div class="tt-wait">Паттерн не обнаружен</div>`;
            }

            // Step 6: Entry
            if (r.entry) {
                html += `<h4>Вход</h4>`;
                const dir = r.entry.direction === 'up' ? 'LONG ↑' : 'SHORT ↓';
                const dirClass = r.entry.direction === 'up' ? 'up' : 'down';
                html += `<div><span class="${dirClass}" style="font-weight:700">${dir}</span>`;
                if (!r.entry.valid) html += ` <span class="tt-wait">(${r.entry.reason})</span>`;
                html += `</div>`;
                html += `<div class="tt-row"><span class="tt-label">Вход:</span> <span class="tt-val">${fp(r.entry.entry)}</span></div>`;
                html += `<div class="tt-row"><span class="tt-label">Стоп:</span> <span class="down">${fp(r.entry.stop)}</span></div>`;
                html += `<div class="tt-row"><span class="tt-label">Тейк:</span> <span class="up">${fp(r.entry.take)}</span></div>`;
                html += `<div class="tt-row"><span class="tt-label">R:R:</span> <span class="${r.entry.valid ? 'tt-ok' : 'tt-wait'}">1:${r.entry.rr.toFixed(1)}</span></div>`;
            }

            return html;
        }

        function showTooltip(pair, event) {
            const r = pairResults[pair];
            if (!r) return;
            tooltip.innerHTML = buildTooltipHtml(pair, r);
            tooltip.style.display = 'block';
            tooltipVisible = true;
            positionTooltip(event);
        }

        function positionTooltip(event) {
            if (!tooltipVisible) return;
            const pad = 16;
            let x = event.clientX + pad;
            let y = event.clientY + pad;
            const rect = tooltip.getBoundingClientRect();
            if (x + rect.width > window.innerWidth) x = event.clientX - rect.width - pad;
            if (y + rect.height > window.innerHeight) y = event.clientY - rect.height - pad;
            if (x < 0) x = pad;
            if (y < 0) y = pad;
            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
            tooltipVisible = false;
        }

        window.pairMouseEnter = function(pair, event) { showTooltip(pair, event); };
        window.pairMouseMove = function(event) { positionTooltip(event); };
        window.pairMouseLeave = function() { hideTooltip(); };

        // --- Open chart with pair ---
        window.openChart = function(pair, withAnalysis) {
            if (withAnalysis && pairChartData[pair]) {
                try {
                    localStorage.setItem('scannerChartData', JSON.stringify(pairChartData[pair]));
                } catch (e) { console.warn('Failed to cache chart data:', e); }
            }
            const analyze = withAnalysis ? '&analyze=1' : '';
            window.open(`index.html?pair=${encodeURIComponent(pair)}${analyze}`, '_blank');
        };

        // --- Init ---
        function syncSourceUI() {
            dataSourceSelect.value = loadDataSource();
            apiKeyInput.value = getApiKey(loadDataSource());
        }
        syncSourceUI();
        // Sync when returning from settings page
        window.addEventListener('focus', syncSourceUI);
        populateSelectors();
        initTableRows();
    })();
    </script>
</body>
</html>
