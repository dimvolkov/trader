<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Новый пароль — Trader</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #131722; color: #d1d4dc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .card { background: #1e222d; border-radius: 12px; padding: 32px 28px; width: 100%; max-width: 380px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.35); }
        h1 { margin: 0 0 6px; font-size: 22px; color: #fff; }
        p.sub { margin: 0 0 22px; color: #787b86; font-size: 14px; }
        label { display: block; font-size: 12px; color: #787b86; margin-bottom: 6px; }
        input { width: 100%; padding: 11px 12px; background: #2a2e39; color: #d1d4dc;
            border: 1px solid #2a2e39; border-radius: 8px; font-size: 14px; outline: none; }
        input:focus { border-color: #2962ff; }
        .field { margin-bottom: 14px; }
        button { width: 100%; padding: 11px; background: #2962ff; color: #fff; border: 0; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; }
        button:hover { background: #1e54e6; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .links { margin-top: 18px; font-size: 13px; text-align: center; }
        .links a { color: #2962ff; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .msg { margin-top: 14px; padding: 10px 12px; border-radius: 8px; font-size: 13px; display: none; }
        .msg.err { background: rgba(239,83,80,0.12); color: #ef5350; display: block; }
        .msg.ok  { background: rgba(38,166,154,0.12); color: #26a69a; display: block; }
    </style>
</head>
<body>
    <form class="card" id="form">
        <h1>Новый пароль</h1>
        <p class="sub">Установите новый пароль для вашей учётной записи.</p>
        <div class="field">
            <label for="password">Новый пароль</label>
            <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" id="submit">Сохранить пароль</button>
        <div class="msg" id="msg"></div>
        <div class="links"><a href="/login.html">Вернуться ко входу</a></div>
    </form>
    <script>
        const form = document.getElementById('form');
        const msg = document.getElementById('msg');
        const submit = document.getElementById('submit');
        const token = new URLSearchParams(location.search).get('token') || '';

        function showError(t) { msg.className = 'msg err'; msg.textContent = t; }
        function showOk(t)    { msg.className = 'msg ok';  msg.textContent = t; }

        if (!token) showError('Ссылка повреждена: отсутствует токен.');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.className = 'msg'; msg.textContent = '';
            if (!token) { showError('Ссылка повреждена: отсутствует токен.'); return; }
            submit.disabled = true;
            try {
                const res = await fetch('/api/auth/reset/apply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password: document.getElementById('password').value }),
                });
                const data = await res.json().catch(() => ({}));
                if (res.ok && data.ok) {
                    showOk('Пароль обновлён. Сейчас перенаправим ко входу…');
                    setTimeout(() => location.href = '/login.html', 800);
                    return;
                }
                showError(data.error || 'Не удалось обновить пароль');
            } catch (err) {
                showError('Ошибка сети');
            } finally {
                submit.disabled = false;
            }
        });
    </script>
</body>
</html>
