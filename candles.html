<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История свечей — Forex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #131722;
            color: #d1d4dc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px;
            background: #1e222d;
            border-bottom: 1px solid #2a2e39;
        }
        .header-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .header-left h1 { font-size: 18px; font-weight: 700; color: #fff; }
        .header-left a { color: #2962ff; text-decoration: none; font-size: 13px; }
        .header-left a:hover { text-decoration: underline; }
        .content { max-width: 1600px; margin: 0 auto; padding: 16px 20px; }

        .filters {
            background: #1e222d;
            border: 1px solid #2a2e39;
            border-radius: 6px;
            padding: 12px 14px;
            margin-bottom: 14px;
            display: flex; flex-wrap: wrap; gap: 12px; align-items: end;
        }
        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .filter-label { font-size: 11px; color: #787b86; text-transform: uppercase; }
        .filter-input, .filter-select {
            background: #2a2e39; color: #fff;
            border: 1px solid #363a45;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-family: monospace;
            outline: none;
            min-width: 120px;
        }
        .filter-input:focus, .filter-select:focus { border-color: #2962ff; }
        .filter-checkbox {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 10px;
            background: #2a2e39;
            border: 1px solid #363a45;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
            height: 32px;
        }
        .filter-checkbox input { cursor: pointer; }
        .btn {
            background: #2962ff; color: #fff;
            border: none;
            padding: 7px 16px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            height: 32px;
        }
        .btn:hover { background: #1e54e0; }
        .btn:disabled { background: #363a45; cursor: not-allowed; }

        .error {
            background: rgba(239, 83, 80, 0.1);
            border: 1px solid #ef5350;
            color: #ef5350;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 14px;
            font-size: 13px;
        }

        .status-line {
            display: flex; flex-wrap: wrap; gap: 16px;
            background: #1e222d;
            border: 1px solid #2a2e39;
            border-radius: 6px;
            padding: 8px 14px;
            margin-bottom: 14px;
            font-size: 12px;
            color: #787b86;
        }
        .status-line b { color: #d1d4dc; font-weight: 600; }

        .legend {
            display: flex; flex-wrap: wrap; gap: 6px 22px;
            background: #1e222d;
            border: 1px solid #2a2e39;
            border-radius: 6px;
            padding: 8px 14px;
            margin-bottom: 14px;
            font-size: 12px;
            color: #d1d4dc;
            align-items: center;
        }
        .legend-section { display: flex; flex-wrap: wrap; gap: 4px 14px; align-items: center; }
        .legend-title { color: #787b86; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; margin-right: 4px; }
        .legend-item  { display: inline-flex; align-items: center; gap: 6px; }
        .lg-candle    { display: inline-block; width: 8px; height: 14px; border-radius: 1px; }
        .lg-candle.up   { background: #26a69a; }
        .lg-candle.down { background: #ef5350; }
        .lg-arrow {
            display: inline-block; width: 12px;
            font-size: 12px; line-height: 1;
            color: #ffeb3b; text-align: center;
        }
        .lg-line { display: inline-block; width: 26px; height: 0; }
        .lg-line.impulse     { border-top: 3px solid #2962ff; }
        .lg-line.correction  { border-top: 2px dashed #ff9800; }
        .lg-line.target      { border-top: 2px dashed #ffeb3b; }
        .lg-line.imp-end     { border-top: 1px solid #2962ff; }
        .lg-line.imp-start   { border-top: 1px dotted #787b86; }
        .lg-line.h1-target   { border-top: 1px dashed rgba(255, 235, 59, 0.5); }
        .lg-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; }
        .lg-dot.s1 { background: #2962ff; }
        .lg-dot.s2 { background: #ff9800; }
        .lg-dot.s3 { background: #00e676; }

        .chart-wrap {
            background: #1e222d;
            border: 1px solid #2a2e39;
            border-radius: 6px;
            padding: 8px;
        }
        #chart { width: 100%; height: 600px; }

        .table-wrap {
            background: #1e222d;
            border: 1px solid #2a2e39;
            border-radius: 6px;
            overflow: auto;
            max-height: 70vh;
        }
        table.ohlc {
            width: 100%;
            border-collapse: collapse;
            font-family: monospace;
            font-size: 13px;
        }
        table.ohlc thead { position: sticky; top: 0; background: #161a25; z-index: 1; }
        table.ohlc th {
            text-align: right;
            color: #787b86;
            font-weight: 600;
            padding: 8px 12px;
            border-bottom: 1px solid #2a2e39;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        table.ohlc th:first-child { text-align: left; }
        table.ohlc td {
            text-align: right;
            padding: 6px 12px;
            border-bottom: 1px solid #1a1e2a;
        }
        table.ohlc td:first-child { text-align: left; color: #d1d4dc; }
        table.ohlc tbody tr:hover { background: #232733; }
        .up   { color: #26a69a; }
        .down { color: #ef5350; }
        .muted { color: #787b86; }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #787b86;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>История свечей</h1>
            <a href="index.html">&larr; График</a>
            <a href="scanner.html">Сканер</a>
            <a href="journal.html">Журнал</a>
            <a href="strategy.html">Стратегии</a>
            <a href="ai-agent.html">AI-агент</a>
            <a href="settings.html">&#9881; Настройки</a>
        </div>
    </div>

    <div class="content">
        <div id="errorBox"></div>

        <div class="filters">
            <div class="filter-group">
                <label class="filter-label" for="pair">Пара</label>
                <select class="filter-select" id="pair"></select>
            </div>
            <div class="filter-group">
                <label class="filter-label" for="tf">Таймфрейм</label>
                <select class="filter-select" id="tf">
                    <option value="1h">1h</option>
                    <option value="30min">30min</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label" for="viewType">Формат</label>
                <select class="filter-select" id="viewType">
                    <option value="candle">Свечи</option>
                    <option value="bar">Бары (OHLC)</option>
                    <option value="line">Линия (close)</option>
                    <option value="area">Область (close)</option>
                    <option value="table">Таблица</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label" for="limit">Свечей</label>
                <input type="number" class="filter-input" id="limit" value="500" min="10" max="10000" step="50">
            </div>
            <label class="filter-checkbox" title="Показать сетку на графике">
                <input type="checkbox" id="grid" checked>
                Сетка
            </label>
            <label class="filter-checkbox" title="Тренды, swing-точки и уровни поверх графика">
                <input type="checkbox" id="analysisOn" checked>
                Анализ
            </label>
            <div class="filter-group">
                <label class="filter-label" for="refresh">Обновление</label>
                <select class="filter-select" id="refresh">
                    <option value="0">Off</option>
                    <option value="30">30 с</option>
                    <option value="60" selected>1 мин</option>
                    <option value="300">5 мин</option>
                </select>
            </div>
            <button class="btn" id="reloadBtn" onclick="loadCandles()">Загрузить</button>
            <span id="refreshIndicator" style="font-size:11px;color:#787b86;align-self:center;"></span>
        </div>

        <div class="status-line" id="statusLine" style="display:none;"></div>

        <div class="legend" id="legend" style="display:none;">
            <div class="legend-section" id="legSeries">
                <span class="legend-title">Серия</span>
                <span class="legend-item lg-candleItem"><span class="lg-candle up"></span> рост</span>
                <span class="legend-item lg-candleItem"><span class="lg-candle down"></span> падение</span>
                <span class="legend-item lg-lineItem" style="display:none;"><span class="lg-line" style="border-top:2px solid #2962ff;"></span> close</span>
            </div>
            <div class="legend-section" id="legAnalysis">
                <span class="legend-title">Анализ</span>
                <span class="legend-item"><span class="lg-arrow">▼</span> swing high</span>
                <span class="legend-item"><span class="lg-arrow">▲</span> swing low</span>
                <span class="legend-item"><span class="lg-line impulse"></span> импульс</span>
                <span class="legend-item"><span class="lg-line correction"></span> коррекция</span>
            </div>
            <div class="legend-section" id="legLevels">
                <span class="legend-title">Уровни</span>
                <span class="legend-item"><span class="lg-line target"></span> target</span>
                <span class="legend-item"><span class="lg-line imp-end"></span> imp.end</span>
                <span class="legend-item"><span class="lg-line imp-start"></span> imp.start</span>
                <span class="legend-item lg-h1" style="display:none;"><span class="lg-line h1-target"></span> H1 target</span>
            </div>
            <div class="legend-section" id="legSlom" style="display:none;">
                <span class="legend-title">SLOM (M30)</span>
                <span class="legend-item"><span class="lg-dot s1"></span> S1 пробой</span>
                <span class="legend-item"><span class="lg-dot s2"></span> S2 откат</span>
                <span class="legend-item"><span class="lg-dot s3"></span> S3 подтв.</span>
            </div>
        </div>

        <div id="errorOrEmpty"></div>
        <div class="chart-wrap" id="chartWrap"><div id="chart"></div></div>
        <div class="table-wrap" id="tableWrap" style="display:none;">
            <table class="ohlc" id="ohlcTable">
                <thead>
                    <tr>
                        <th>Время (MSK)</th>
                        <th>Open</th>
                        <th>High</th>
                        <th>Low</th>
                        <th>Close</th>
                        <th>Изм.</th>
                        <th>Источник</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="lightweight-charts.js"></script>
    <script>
    const DEFAULT_WATCHLIST = ['EUR/USD','GBP/USD','USD/JPY','USD/CHF'];

    function adminSecret() {
        return localStorage.getItem('scannerAdminSecret') || '';
    }
    function showError(msg) {
        document.getElementById('errorBox').innerHTML = msg
            ? `<div class="error">${msg}</div>` : '';
    }

    function fmtTimeMsk(unixSec) {
        if (!unixSec) return '—';
        // unix seconds → MSK string
        const d = new Date(unixSec * 1000 + 3 * 3600 * 1000);
        const pad = n => String(n).padStart(2, '0');
        return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())} `
             + `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}`;
    }
    function digitsFor(pair) {
        return (pair || '').includes('JPY') ? 3 : 5;
    }
    function fmtNum(v, d) {
        if (v === null || v === undefined || !isFinite(v)) return '—';
        return v.toFixed(d);
    }

    // ─── Pair selector population ───
    async function loadWatchlist() {
        const sel = document.getElementById('pair');
        sel.innerHTML = '';
        let pairs = [];

        // Try scan-state first (gives the active watchlist).
        try {
            if (adminSecret()) {
                const r = await fetch('/api/scan-state', {
                    headers: { 'X-Admin-Secret': adminSecret() },
                });
                if (r.ok) {
                    const data = await r.json();
                    if (Array.isArray(data.watchlist)) pairs = data.watchlist;
                }
            }
        } catch (_) {}

        // Fallback: candles/stats — pairs we already have data for.
        if (pairs.length === 0) {
            try {
                if (adminSecret()) {
                    const r = await fetch('/api/candles/stats', {
                        headers: { 'X-Admin-Secret': adminSecret() },
                    });
                    if (r.ok) {
                        const data = await r.json();
                        if (Array.isArray(data.series)) {
                            pairs = [...new Set(data.series.map(s => s.symbol))];
                        }
                    }
                }
            } catch (_) {}
        }

        if (pairs.length === 0) pairs = DEFAULT_WATCHLIST;

        for (const p of pairs) {
            const opt = document.createElement('option');
            opt.value = p; opt.textContent = p;
            sel.appendChild(opt);
        }

        // Restore last selection.
        const saved = localStorage.getItem('candlesLastPair');
        if (saved && pairs.includes(saved)) sel.value = saved;
    }

    // ─── Chart ───
    let chart = null;
    let series = null;
    let overlaySeries = [];     // line series used for impulse/correction segments
    let overlayPriceLines = []; // price lines (target / impulse start / impulse end)
    let savedTimeRange = null;  // preserve zoom across refetches

    function destroyChart() {
        if (chart) {
            try { savedTimeRange = chart.timeScale().getVisibleLogicalRange(); } catch (_) {}
            try { chart.remove(); } catch (_) {}
            chart = null; series = null;
            overlaySeries = []; overlayPriceLines = [];
        }
    }

    function clearOverlays() {
        for (const s of overlaySeries) {
            try { chart.removeSeries(s); } catch (_) {}
        }
        overlaySeries = [];
        for (const pl of overlayPriceLines) {
            try { series.removePriceLine(pl); } catch (_) {}
        }
        overlayPriceLines = [];
        if (series) {
            try { series.setMarkers([]); } catch (_) {}
        }
    }

    function buildChart(viewType, gridOn) {
        destroyChart();
        const container = document.getElementById('chart');
        container.innerHTML = '';
        chart = LightweightCharts.createChart(container, {
            width: container.clientWidth,
            height: container.clientHeight || 600,
            layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
            grid: {
                vertLines: { color: gridOn ? '#2a2e39' : 'rgba(0,0,0,0)' },
                horzLines: { color: gridOn ? '#2a2e39' : 'rgba(0,0,0,0)' },
            },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#2a2e39' },
            timeScale:       { borderColor: '#2a2e39', timeVisible: true, secondsVisible: false },
        });

        if (viewType === 'bar') {
            series = chart.addBarSeries({
                upColor: '#26a69a', downColor: '#ef5350', thinBars: true,
            });
        } else if (viewType === 'line') {
            series = chart.addLineSeries({ color: '#2962ff', lineWidth: 2 });
        } else if (viewType === 'area') {
            series = chart.addAreaSeries({
                lineColor: '#2962ff',
                topColor: 'rgba(41,98,255,0.4)',
                bottomColor: 'rgba(41,98,255,0)',
                lineWidth: 2,
            });
        } else {
            series = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350',
                borderUpColor: '#26a69a', borderDownColor: '#ef5350',
                wickUpColor: '#26a69a', wickDownColor: '#ef5350',
            });
        }
    }

    function renderChart(candles, viewType, gridOn, pair, restoreRange) {
        buildChart(viewType, gridOn);
        const digits = digitsFor(pair);
        series.applyOptions({ priceFormat: { type: 'price', precision: digits, minMove: Math.pow(10, -digits) } });

        if (viewType === 'line' || viewType === 'area') {
            series.setData(candles.map(c => ({ time: c.time, value: c.close })));
        } else {
            series.setData(candles.map(c => ({
                time: c.time, open: c.open, high: c.high, low: c.low, close: c.close,
            })));
        }
        if (restoreRange && savedTimeRange) {
            try { chart.timeScale().setVisibleLogicalRange(savedTimeRange); } catch (_) {
                chart.timeScale().fitContent();
            }
        } else {
            chart.timeScale().fitContent();
        }
    }

    // ─── Analysis overlay (swings, impulses, levels, SLOM) ───
    function snapToCandleTime(t, candleTimes) {
        if (!candleTimes.length) return t;
        let best = candleTimes[0], bestDiff = Math.abs(t - candleTimes[0]);
        for (const ct of candleTimes) {
            const diff = Math.abs(t - ct);
            if (diff < bestDiff) { best = ct; bestDiff = diff; }
        }
        return best;
    }

    function renderAnalysis(analysis, candles, pair) {
        if (!chart || !series || !analysis) return;
        clearOverlays();

        const digits = digitsFor(pair);
        const fp = (v) => v >= 10 ? v.toFixed(2) : v.toFixed(digits);
        const candleTimes = candles.map(c => c.time);

        // 1) Swing markers
        const markers = [];
        for (const sw of (analysis.swings || [])) {
            markers.push({
                time: snapToCandleTime(sw.time, candleTimes),
                position: sw.type === 'high' ? 'aboveBar' : 'belowBar',
                color: '#ffeb3b',
                shape: sw.type === 'high' ? 'arrowDown' : 'arrowUp',
                size: 1,
                text: fp(sw.price),
            });
        }

        // 2) SLOM signal markers (M30 only)
        if (analysis.slom) {
            const s = analysis.slom;
            if (s.signal1 && s.signal1.time) {
                markers.push({ time: snapToCandleTime(s.signal1.time, candleTimes),
                    position: 'belowBar', color: '#2962ff', shape: 'circle', size: 2, text: 'S1' });
            }
            if (s.signal2 && s.signal2.time) {
                markers.push({ time: snapToCandleTime(s.signal2.time, candleTimes),
                    position: 'belowBar', color: '#ff9800', shape: 'circle', size: 2, text: 'S2' });
            }
            if (s.signal3 && s.signal3.time) {
                markers.push({ time: snapToCandleTime(s.signal3.time, candleTimes),
                    position: 'belowBar', color: '#00e676', shape: 'circle', size: 2, text: 'S3' });
            }
        }

        markers.sort((a, b) => a.time - b.time);
        // Dedupe identical (time, text) markers (snap may collide).
        const seen = new Set();
        const deduped = [];
        for (const m of markers) {
            const k = `${m.time}|${m.text}|${m.position}`;
            if (seen.has(k)) continue;
            seen.add(k); deduped.push(m);
        }
        series.setMarkers(deduped);

        // 3) Impulse / correction line segments
        for (const seg of (analysis.impulses || [])) {
            const isImpulse = seg.type === 'impulse';
            const segSeries = chart.addLineSeries({
                color: isImpulse ? '#2962ff' : '#ff9800',
                lineWidth: isImpulse ? 3 : 2,
                lineStyle: isImpulse ? LightweightCharts.LineStyle.Solid : LightweightCharts.LineStyle.Dashed,
                lastValueVisible: false,
                priceLineVisible: false,
                crosshairMarkerVisible: false,
            });
            segSeries.setData([
                { time: snapToCandleTime(seg.startTime, candleTimes), value: seg.startPrice },
                { time: snapToCandleTime(seg.endTime,   candleTimes), value: seg.endPrice   },
            ]);
            overlaySeries.push(segSeries);
        }

        // 4) Horizontal price levels (target / impulse boundaries)
        const lv = analysis.levels || {};
        if (Number.isFinite(lv.target)) {
            overlayPriceLines.push(series.createPriceLine({
                price: lv.target, color: '#ffeb3b',
                lineStyle: LightweightCharts.LineStyle.Dashed,
                lineWidth: 2, axisLabelVisible: true, title: 'Target',
            }));
        }
        if (Number.isFinite(lv.impulseEnd)) {
            overlayPriceLines.push(series.createPriceLine({
                price: lv.impulseEnd, color: '#2962ff',
                lineStyle: LightweightCharts.LineStyle.Solid,
                lineWidth: 1, axisLabelVisible: true, title: 'Imp.end',
            }));
        }
        if (Number.isFinite(lv.impulseStart)) {
            overlayPriceLines.push(series.createPriceLine({
                price: lv.impulseStart, color: '#787b86',
                lineStyle: LightweightCharts.LineStyle.Dotted,
                lineWidth: 1, axisLabelVisible: true, title: 'Imp.start',
            }));
        }

        // 5) H1 levels overlay when viewing M30 (helpful context).
        const h1 = analysis.h1Levels;
        if (h1 && Number.isFinite(h1.target)) {
            overlayPriceLines.push(series.createPriceLine({
                price: h1.target, color: 'rgba(255, 235, 59, 0.5)',
                lineStyle: LightweightCharts.LineStyle.Dashed,
                lineWidth: 1, axisLabelVisible: true, title: 'H1 Target',
            }));
        }
    }

    function renderTable(candles, pair) {
        const tbody = document.querySelector('#ohlcTable tbody');
        const digits = digitsFor(pair);
        const rows = [];
        // Newest first for readability.
        const ordered = candles.slice().reverse();
        for (let i = 0; i < ordered.length; i++) {
            const c = ordered[i];
            const prevClose = i < ordered.length - 1 ? ordered[i + 1].close : c.open;
            const delta = c.close - prevClose;
            const cls = delta >= 0 ? 'up' : 'down';
            const sign = delta >= 0 ? '+' : '';
            rows.push(`<tr>
                <td>${fmtTimeMsk(c.time)}</td>
                <td>${fmtNum(c.open, digits)}</td>
                <td>${fmtNum(c.high, digits)}</td>
                <td>${fmtNum(c.low, digits)}</td>
                <td class="${c.close >= c.open ? 'up' : 'down'}">${fmtNum(c.close, digits)}</td>
                <td class="${cls}">${sign}${delta.toFixed(digits)}</td>
                <td class="muted">${c.source || '—'}</td>
            </tr>`);
        }
        tbody.innerHTML = rows.join('') || '<tr><td colspan="7" class="muted" style="text-align:center;padding:20px;">Нет данных</td></tr>';
    }

    function updateLegend(viewType, analysisOn, tf, analysis) {
        const legend = document.getElementById('legend');
        if (viewType === 'table') { legend.style.display = 'none'; return; }
        legend.style.display = 'flex';

        // Series row: up/down vs single close line — depends on view type.
        const isLineLike = (viewType === 'line' || viewType === 'area');
        document.querySelectorAll('.lg-candleItem').forEach(el => el.style.display = isLineLike ? 'none' : 'inline-flex');
        document.querySelectorAll('.lg-lineItem').forEach(el => el.style.display = isLineLike ? 'inline-flex' : 'none');

        // Analysis section visible only when overlays are actually drawn.
        const hasAnalysis = !!(analysisOn && analysis && analysis.trend && analysis.trend !== 'range');
        document.getElementById('legAnalysis').style.display = hasAnalysis ? 'flex' : 'none';
        document.getElementById('legLevels').style.display = hasAnalysis ? 'flex' : 'none';

        // H1 target chip — only when we actually overlayed H1 levels (M30 view with valid H1).
        const showH1 = !!(hasAnalysis && tf === '30min' && analysis.h1Levels && Number.isFinite(analysis.h1Levels.target));
        document.querySelectorAll('.lg-h1').forEach(el => el.style.display = showH1 ? 'inline-flex' : 'none');

        // SLOM section — M30 only and when we have at least one signal.
        const hasSlom = !!(hasAnalysis && tf === '30min' && analysis.slom
            && (analysis.slom.signal1 || analysis.slom.signal2 || analysis.slom.signal3));
        document.getElementById('legSlom').style.display = hasSlom ? 'flex' : 'none';
    }

    function setStatus(pair, tf, count, first, last, analysis) {
        const el = document.getElementById('statusLine');
        if (!count) { el.style.display = 'none'; return; }
        el.style.display = 'flex';
        const parts = [
            `<span>Пара: <b>${pair}</b></span>`,
            `<span>ТФ: <b>${tf}</b></span>`,
            `<span>Свечей: <b>${count}</b></span>`,
            `<span>Период: <b>${fmtTimeMsk(first)}</b> → <b>${fmtTimeMsk(last)}</b> MSK</span>`,
        ];
        if (analysis) {
            const t = analysis.trend;
            const trendStr = t === 'up' ? '<span style="color:#26a69a">↑ восходящий</span>'
                          : t === 'down' ? '<span style="color:#ef5350">↓ нисходящий</span>'
                          : '<span class="muted">боковик</span>';
            parts.push(`<span>Тренд: <b>${trendStr}</b></span>`);
            if (analysis.phase && analysis.phase !== '—') parts.push(`<span>Фаза: <b>${analysis.phase}</b></span>`);
            if (analysis.reversal && analysis.reversal.reversal) {
                parts.push(`<span style="color:#ff9800">⚠ Разворот: ${analysis.reversal.reason}</span>`);
            }
            if (analysis.slom) {
                const s = analysis.slom;
                const sigBits = [];
                if (s.signal1) sigBits.push('<span style="color:#2962ff">S1</span>');
                if (s.signal2) sigBits.push('<span style="color:#ff9800">S2</span>');
                if (s.signal3) sigBits.push('<span style="color:#00e676">S3</span>');
                if (sigBits.length) parts.push(`<span>SLOM: ${sigBits.join(' ')}</span>`);
            }
        }
        el.innerHTML = parts.join('');
    }

    let inFlight = false;
    let lastFetchedAt = 0;

    async function loadCandles(opts) {
        const isPoll = !!(opts && opts.poll);
        if (!adminSecret()) {
            showError('Не задан admin secret. Перейди в <a href="settings.html" style="color:#2962ff">настройки</a>, введи его и сохрани.');
            stopPolling();
            return;
        }
        if (inFlight) return;
        inFlight = true;
        showError('');

        const pair = document.getElementById('pair').value;
        const tf   = document.getElementById('tf').value;
        const viewType = document.getElementById('viewType').value;
        const limit = parseInt(document.getElementById('limit').value, 10) || 500;
        const gridOn = document.getElementById('grid').checked;
        const analysisOn = document.getElementById('analysisOn').checked;

        if (!pair) { showError('Не выбрана пара'); inFlight = false; return; }
        localStorage.setItem('candlesLastPair', pair);
        localStorage.setItem('candlesLastTf', tf);
        localStorage.setItem('candlesLastView', viewType);
        localStorage.setItem('candlesLastLimit', String(limit));
        localStorage.setItem('candlesLastGrid', gridOn ? '1' : '0');
        localStorage.setItem('candlesLastAnalysis', analysisOn ? '1' : '0');

        const btn = document.getElementById('reloadBtn');
        if (!isPoll) { btn.disabled = true; btn.textContent = 'Загрузка…'; }

        try {
            const endpoint = analysisOn ? '/api/candles/analyze' : '/api/candles';
            const qs = new URLSearchParams({ pair, tf, limit: String(limit) }).toString();
            const r = await fetch(endpoint + '?' + qs, {
                headers: { 'X-Admin-Secret': adminSecret() },
            });
            if (!r.ok) {
                if (r.status === 401) {
                    showError('Admin secret неверный. <a href="settings.html" style="color:#2962ff">Поправить</a>.');
                    stopPolling();
                    return;
                }
                throw new Error(`HTTP ${r.status}`);
            }
            const data = await r.json();
            if (!data.success) throw new Error(data.error || 'unknown error');

            const candles = data.candles || [];
            const analysis = data.analysis || null;
            const tableWrap = document.getElementById('tableWrap');
            const chartWrap = document.getElementById('chartWrap');
            const emptyBox  = document.getElementById('errorOrEmpty');

            if (candles.length === 0) {
                destroyChart();
                tableWrap.style.display = 'none';
                chartWrap.style.display = 'none';
                document.getElementById('legend').style.display = 'none';
                emptyBox.innerHTML = '<div class="empty">Нет сохранённых свечей для этой пары/ТФ. Подожди ближайший скан-цикл — данные появятся автоматически.</div>';
                setStatus(pair, tf, 0);
                return;
            }
            emptyBox.innerHTML = '';

            setStatus(pair, tf, candles.length, candles[0].time, candles[candles.length - 1].time, analysis);
            updateLegend(viewType, analysisOn, tf, analysis);

            if (viewType === 'table') {
                destroyChart();
                chartWrap.style.display = 'none';
                tableWrap.style.display = '';
                renderTable(candles, pair);
            } else {
                tableWrap.style.display = 'none';
                chartWrap.style.display = '';
                // Preserve zoom on polling refreshes.
                renderChart(candles, viewType, gridOn, pair, isPoll);
                if (analysisOn && analysis) renderAnalysis(analysis, candles, pair);
            }
            lastFetchedAt = Date.now();
            updateRefreshIndicator();
        } catch (err) {
            showError('Ошибка загрузки: ' + err.message);
        } finally {
            inFlight = false;
            if (!isPoll) { btn.disabled = false; btn.textContent = 'Загрузить'; }
        }
    }

    // ─── Realtime polling ───
    let pollTimer = null;
    let indicatorTimer = null;

    function stopPolling() {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }
    function startPolling(intervalSec) {
        stopPolling();
        if (!intervalSec || intervalSec <= 0) {
            document.getElementById('refreshIndicator').textContent = '';
            return;
        }
        pollTimer = setInterval(() => loadCandles({ poll: true }), intervalSec * 1000);
    }
    function updateRefreshIndicator() {
        const el = document.getElementById('refreshIndicator');
        if (!lastFetchedAt) { el.textContent = ''; return; }
        const sec = Math.max(0, Math.round((Date.now() - lastFetchedAt) / 1000));
        const refresh = parseInt(document.getElementById('refreshIndicator').dataset.interval || '0', 10);
        el.textContent = refresh > 0
            ? `обновлено ${sec} с назад · авто каждые ${refresh} с`
            : `обновлено ${sec} с назад`;
    }
    if (!indicatorTimer) {
        indicatorTimer = setInterval(updateRefreshIndicator, 1000);
    }

    function applyRefreshFromSelect() {
        const sel = document.getElementById('refresh');
        const sec = parseInt(sel.value, 10) || 0;
        localStorage.setItem('candlesLastRefresh', String(sec));
        document.getElementById('refreshIndicator').dataset.interval = String(sec);
        startPolling(sec);
        updateRefreshIndicator();
    }

    // ─── Init ───
    (async function init() {
        // Restore saved selections (where possible).
        await loadWatchlist();
        const tf = localStorage.getItem('candlesLastTf');
        if (tf) document.getElementById('tf').value = tf;
        const vt = localStorage.getItem('candlesLastView');
        if (vt) document.getElementById('viewType').value = vt;
        const lim = localStorage.getItem('candlesLastLimit');
        if (lim) document.getElementById('limit').value = lim;
        const gr = localStorage.getItem('candlesLastGrid');
        if (gr !== null) document.getElementById('grid').checked = gr === '1';
        const an = localStorage.getItem('candlesLastAnalysis');
        if (an !== null) document.getElementById('analysisOn').checked = an === '1';
        const rf = localStorage.getItem('candlesLastRefresh');
        if (rf !== null) document.getElementById('refresh').value = rf;

        document.getElementById('grid').addEventListener('change', () => {
            if (document.getElementById('viewType').value !== 'table') loadCandles();
        });
        document.getElementById('analysisOn').addEventListener('change', () => loadCandles());
        document.getElementById('viewType').addEventListener('change', () => loadCandles());
        document.getElementById('pair').addEventListener('change', () => { savedTimeRange = null; loadCandles(); });
        document.getElementById('tf').addEventListener('change', () => { savedTimeRange = null; loadCandles(); });
        document.getElementById('refresh').addEventListener('change', applyRefreshFromSelect);

        window.addEventListener('resize', () => {
            if (chart) {
                const container = document.getElementById('chart');
                chart.applyOptions({ width: container.clientWidth, height: container.clientHeight || 600 });
            }
        });

        // Pause polling when tab is hidden, resume on focus.
        document.addEventListener('visibilitychange', () => {
            const sec = parseInt(document.getElementById('refresh').value, 10) || 0;
            if (document.hidden) stopPolling();
            else if (sec > 0) startPolling(sec);
        });

        await loadCandles();
        applyRefreshFromSelect();
    })();
    </script>
</body>
