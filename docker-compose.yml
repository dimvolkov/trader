services:
  web:
    build: .
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - dokploy-network

  scanner:
    build: ./server-scanner
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      # Telegram (обязательно)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # Источник данных: twelvedata, tradermade, polygon, finnhub, fcsapi, alphavantage, oanda
      - DATA_SOURCE=${DATA_SOURCE:-twelvedata}
      # API ключи (укажите для выбранного источника)
      - API_KEY_TWELVEDATA=${API_KEY_TWELVEDATA:-8694f4e28a974a0eba808458ceb33bfb}
      - API_KEY_TRADERMADE=${API_KEY_TRADERMADE:-}
      - API_KEY_POLYGON=${API_KEY_POLYGON:-}
      - API_KEY_FINNHUB=${API_KEY_FINNHUB:-}
      - API_KEY_FCSAPI=${API_KEY_FCSAPI:-}
      - API_KEY_ALPHAVANTAGE=${API_KEY_ALPHAVANTAGE:-}
      - API_KEY_OANDA=${API_KEY_OANDA:-}
      # Валютные пары (через запятую)
      - WATCHLIST=${WATCHLIST:-EUR/USD,USD/JPY,GBP/USD,USD/CHF,AUD/USD,USD/CAD,NZD/USD}
      # Расписание (московское время UTC+3)
      - SCHEDULE_FROM=${SCHEDULE_FROM:-8}
      - SCHEDULE_TO=${SCHEDULE_TO:-20}
      - SCAN_INTERVAL_HOURS=${SCAN_INTERVAL_HOURS:-1}
      # Управление рисками
      - DEPOSIT=${DEPOSIT:-100000}
      - RISK_PCT=${RISK_PCT:-0.01}
      # Домен для ссылок на график
      - DOMAIN=${DOMAIN:-trader.kachestvobiz-ai.ru}
      # Trade Executor
      - EXECUTOR_URL=${EXECUTOR_URL:-}
      - EXECUTOR_API_SECRET=${EXECUTOR_API_SECRET:-}
      - AUTO_TRADE=${AUTO_TRADE:-false}
      # bybit-trader (Telegram crypto signals → ByBit USDT-perp)
      - BYBIT_TRADER_URL=${BYBIT_TRADER_URL:-http://bybit-trader:8502}
      - BYBIT_EXECUTOR_SECRET=${BYBIT_EXECUTOR_SECRET:-}
      # Admin secret для /api/pending-config (UI настроек pending)
      - SCANNER_ADMIN_SECRET=${SCANNER_ADMIN_SECRET:-}
      # Anthropic Claude (чат-ассистент на странице стратегии)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      # AI-агент-оптимизатор: ежедневный анализ торговой истории → рекомендации
      - AI_AGENT_ENABLED=${AI_AGENT_ENABLED:-false}
      - AI_AGENT_CRON_MSK_HOUR=${AI_AGENT_CRON_MSK_HOUR:-3}
      - AI_AGENT_DATA_ROOT=/data/ai-logs
      # JSON-файл live-конфига отложенных ордеров
      - PENDING_CONFIG_FILE=/data/pending_config.json
      # Auth (login/register/reset)
      - AUTH_SECRET=${AUTH_SECRET:-please-change-me-to-a-long-random-string-please-change}
      - APP_NAME=${APP_NAME:-Trader}
      - APP_BASE_URL=${APP_BASE_URL:-https://trader.kachestvobiz-ai.ru}
      - AUTH_USERS_FILE=/data/auth-users.json
      # Тестовая учётка (создаётся при первом запуске, если в /data/auth-users.json её ещё нет)
      - INITIAL_USER_EMAIL=${INITIAL_USER_EMAIL:-test@trader.local}
      - INITIAL_USER_PASSWORD=${INITIAL_USER_PASSWORD:-trader12345}
      - INITIAL_USER_NAME=${INITIAL_USER_NAME:-Test user}
      # SMTP (если не задано — письма уходят в stdout, удобно для dev)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-Trader <noreply@trader.kachestvobiz-ai.ru>}
    volumes:
      - scanner-data:/data
    networks:
      - dokploy-network

  bybit-trader:
    build: ./bybit-trader
    restart: unless-stopped
    expose:
      - "8502"
    environment:
      # ByBit V5 API
      - BYBIT_API_KEY=${BYBIT_API_KEY:-}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET:-}
      - BYBIT_TESTNET=${BYBIT_TESTNET:-true}
      # Override host if api.bybit.com gets blocked (defaults to testnet/mainnet by flag)
      - BYBIT_API_HOST=${BYBIT_API_HOST:-}
      # Auth secret shared with scanner (scanner uses BYBIT_EXECUTOR_SECRET to call us)
      - BYBIT_EXECUTOR_SECRET=${BYBIT_EXECUTOR_SECRET:-}
      # Telethon (MTProto user-account for reading channels)
      - TELETHON_API_ID=${TELETHON_API_ID:-}
      - TELETHON_API_HASH=${TELETHON_API_HASH:-}
      - TELETHON_SESSION=/data/telethon.session
      # Admin Telegram notifications (open/close/fail events)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # LLM fallback parser (uses the same Anthropic key as the strategy chat)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      # State files
      - CRYPTO_CONFIG_FILE=/data/crypto_config.json
      - SIGNAL_LOG=/data/signals.jsonl
      - TRADE_LOG=/data/trades.jsonl
    volumes:
      - crypto-data:/data
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  scanner-data:
  crypto-data:
