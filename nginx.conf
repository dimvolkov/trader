server {
    listen 3000;
    server_name _;

    # We sit behind Traefik (TLS terminates outside). Make `return 302 /…`
    # emit a relative Location so the browser keeps the original scheme/host
    # instead of leaking the internal listen port (3000) into the redirect.
    absolute_redirect off;
    server_name_in_redirect off;
    port_in_redirect off;

    # Public pages — no session required (marketing landing + auth pages).
    location ~ ^/(landing|login|register|reset|reset-apply|verify)\.html$ {
        root /usr/share/nginx/html;
    }

    # Auth API endpoints — must stay public for login/register/reset to work.
    location ^~ /api/auth/ {
        proxy_pass http://scanner:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    # All other API requests still hit the scanner.
    location /api/ {
        proxy_pass http://scanner:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    # Internal session check used by auth_request below.
    location = /_auth_check {
        internal;
        proxy_pass http://scanner:3001/api/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # Default location: everything else (index, scanner, settings, journal, strategy, lightweight-charts.js, ...).
    # Gate by session — 401 from /_auth_check redirects to /login.html.
    location / {
        auth_request /_auth_check;
        error_page 401 = @login_redirect;
        root /usr/share/nginx/html;
        index index.html;
    }

    location @login_redirect {
        return 302 /login.html;
    }

    location = /favicon.ico {
        return 204;
        access_log off;
        log_not_found off;
    }
}
