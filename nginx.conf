server {
    listen 3000;
    server_name _;
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api/ {
        proxy_pass http://scanner:3001/api/;
        proxy_set_header Host $host;
    }

    location = /favicon.ico {
        return 204;
        access_log off;
        log_not_found off;
    }
}
